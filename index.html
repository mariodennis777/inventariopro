// COPIA DE SEGURIDAD
// ══════════════════════════════════════════
function Backup({products,setProducts,clients,setClients,salesLog,setSalesLog}){
  const [msg,setMsg]=useState("");
  const [msgColor,setMsgColor]=useState(C.green);
  const [backups,setBackups]=useLS("inv_backups",[]);
  const [showRestore,setShowRestore]=useState(false);
  const [restoreIdx,setRestoreIdx]=useState(null);

  const showMsg=(text,color=C.green)=>{setMsg(text);setMsgColor(color);setTimeout(()=>setMsg(""),4000);};

  // ── EXPORTAR JSON (descarga archivo) ──
  const exportJSON=()=>{
    const data={
      version:"InventarioPRO_v2",
      fecha:new Date().toISOString(),
      negocio:"Mi Negocio",
      products,clients,salesLog,
      stats:{
        totalProductos:products.length,
        totalClientes:clients.length,
        totalVentas:salesLog.length,
        gananciaTotal:salesLog.reduce((s,x)=>s+(x.profit||0),0).toFixed(2)
      }
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`InventarioPRO_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showMsg("✅ Copia descargada en tu dispositivo");
  };

  // ── GUARDAR BACKUP LOCAL (en el navegador) ──
  const saveLocal=()=>{
    const backup={
      id:Date.now(),
      fecha:new Date().toLocaleString("es-ES"),
      fechaISO:new Date().toISOString(),
      products:[...products],
      clients:[...clients],
      salesLog:[...salesLog],
      stats:{
        productos:products.length,
        clientes:clients.length,
        ventas:salesLog.length,
        ganancia:salesLog.reduce((s,x)=>s+(x.profit||0),0).toFixed(2)
      }
    };
    setBackups(bs=>[backup,...bs].slice(0,10)); // Guarda máximo 10 backups
    showMsg("✅ Copia de seguridad guardada localmente");
  };

  // ── RESTAURAR DESDE BACKUP LOCAL ──
  const restoreLocal=(backup)=>{
    if(!window.confirm(`¿Restaurar copia del ${backup.fecha}?\n\nEsto reemplazará todos los datos actuales.`))return;
    setProducts(backup.products||[]);
    setClients(backup.clients||[]);
    setSalesLog(backup.salesLog||[]);
    setShowRestore(false);setRestoreIdx(null);
    showMsg("✅ Datos restaurados correctamente");
  };

  // ── IMPORTAR DESDE ARCHIVO JSON ──
  const importJSON=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.products)throw new Error("Archivo inválido");
        if(!window.confirm(`¿Importar backup del ${data.fecha?new Date(data.fecha).toLocaleString("es-ES"):"fecha desconocida"}?\n\nProductos: ${data.products?.length||0}\nVentas: ${data.salesLog?.length||0}\n\nEsto reemplazará todos los datos actuales.`))return;
        setProducts(data.products||[]);
        setClients(data.clients||[]);
        setSalesLog(data.salesLog||[]);
        showMsg("✅ Datos importados correctamente desde archivo");
      }catch{
        showMsg("❌ Error: el archivo no es válido",""+C.red);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // ── EXPORTAR CSV (Excel) ──
  const exportCSV=()=>{
    // Products CSV
    const headers=["Nombre","Categoría","Stock","Stock Mínimo","Precio Venta Bs","Precio Compra Bs","Precio Mayorista Bs","Ventas","Proveedor","Teléfono","Código Barras","Tiene Vencimiento","Fecha Vencimiento"];
    const rows=products.map(p=>[
      `"${p.name}"`,`"${p.category||""}"`,p.stock,p.min_stock,
      p.price,p.cost_price,p.wholesale_price||0,p.sales,
      `"${p.supplier_name||""}"`,`"${p.supplier_phone||""}"`,
      `"${p.barcode||""}"`,p.has_expiry?"Sí":"No",`"${p.expiry_date||""}"`
    ].join(","));
    const csv=[headers.join(","),...rows].join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`Inventario_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showMsg("✅ Inventario exportado como Excel/CSV");
  };

  // ── EXPORTAR VENTAS CSV ──
  const exportSalesCSV=()=>{
    const headers=["Fecha","Producto","Cliente","Cantidad","Precio Venta Bs","Descuento Bs","Ganancia Bs","Motivo Descuento"];
    const rows=salesLog.map(s=>[
      `"${s.sale_date}"`,`"${s.product_name}"`,`"${s.client_name||"General"}"`,
      s.quantity,s.sale_price,s.discount||0,(s.profit||0).toFixed(2),
      `"${s.discount_reason||""}"`
    ].join(","));
    const csv=[headers.join(","),...rows].join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`Ventas_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showMsg("✅ Historial de ventas exportado como Excel/CSV");
  };

  const deleteBackup=(id)=>{
    if(!window.confirm("¿Eliminar esta copia de seguridad?"))return;
    setBackups(bs=>bs.filter(b=>b.id!==id));
  };

  const dataSize=()=>{
    try{
      const data=JSON.stringify({products,clients,salesLog});
      return(data.length/1024).toFixed(1)+"KB";
    }catch{return"?";}
  };

  const fileRef=useRef();

  return(
    <div>
      {/* Status card */}
      <Card style={{marginBottom:16,background:C.hi}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:10,fontSize:15}}>💾 Estado de tus Datos</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
          {[
            ["📦 Productos",products.length,C.blue],
            ["👥 Clientes",clients.length,C.purple],
            ["🛒 Ventas",salesLog.length,C.green],
            ["💾 Tamaño",dataSize(),C.accent],
          ].map(([l,v,c])=>(
            <div key={l} style={{flex:1,minWidth:100,textAlign:"center",background:C.card,borderRadius:10,padding:"10px 6px"}}>
              <div style={{color:C.muted,fontSize:11}}>{l}</div>
              <div style={{color:c,fontWeight:800,fontSize:18}}>{v}</div>
            </div>
          ))}
        </div>
        {msg&&<div style={{marginTop:12,color:msgColor,fontWeight:600,fontSize:14}}>{msg}</div>}
      </Card>

      {/* Export options */}
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>📤 Exportar / Descargar</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>

          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:26}}>📦</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Copia completa (JSON)</div>
              <div style={{color:C.muted,fontSize:12}}>Guarda TODO: productos, ventas, clientes, fotos. Sirve para restaurar.</div>
            </div>
            <Btn small onClick={exportJSON} color={C.green}>⬇️ Descargar</Btn>
          </div>

          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:26}}>📊</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Inventario en Excel (CSV)</div>
              <div style={{color:C.muted,fontSize:12}}>Lista de productos con precios y stock. Abrir con Excel.</div>
            </div>
            <Btn small onClick={exportCSV} color={C.blue}>⬇️ Excel</Btn>
          </div>

          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:26}}>🛒</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Ventas en Excel (CSV)</div>
              <div style={{color:C.muted,fontSize:12}}>Historial completo de ventas con ganancias. Abrir con Excel.</div>
            </div>
            <Btn small onClick={exportSalesCSV} color={C.purple}>⬇️ Excel</Btn>
          </div>

          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:26}}>💾</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Guardar copia local</div>
              <div style={{color:C.muted,fontSize:12}}>Guarda una copia en este dispositivo (máx. 10 copias).</div>
            </div>
            <Btn small onClick={saveLocal} color={C.accent}>💾 Guardar</Btn>
          </div>
        </div>
      </Card>

      {/* Import / Restore */}
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>📥 Importar / Restaurar</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>

          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:26}}>📂</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Importar desde archivo JSON</div>
              <div style={{color:C.muted,fontSize:12}}>Restaura una copia que descargaste antes.</div>
            </div>
            <Btn small onClick={()=>fileRef.current?.click()} color={C.orange}>📂 Importar</Btn>
            <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
          </div>

          {backups.length>0&&(
            <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
              <span style={{fontSize:26}}>🔄</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700}}>Restaurar copia local</div>
                <div style={{color:C.muted,fontSize:12}}>{backups.length} copia(s) guardada(s) en este dispositivo.</div>
              </div>
              <Btn small onClick={()=>setShowRestore(s=>!s)} color={C.blue}>Ver copias</Btn>
            </div>
          )}
        </div>
      </Card>

      {/* Local backups list */}
      {showRestore&&backups.length>0&&(
        <Card style={{marginBottom:14}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>🔄 Copias Locales Guardadas</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {backups.map((b,i)=>(
              <div key={b.id} style={{background:C.hi,borderRadius:10,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>📦 Copia #{backups.length-i}</div>
                    <div style={{color:C.muted,fontSize:12}}>📅 {b.fecha}</div>
                    <div style={{color:C.muted,fontSize:11,marginTop:2}}>
                      {b.stats?.productos||0} productos · {b.stats?.ventas||0} ventas · Gan: Bs. {b.stats?.ganancia||0}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <Btn small onClick={()=>restoreLocal(b)} color={C.green}>🔄 Restaurar</Btn>
                    <Btn small onClick={()=>deleteBackup(b.id)} color={C.red} outline>🗑️</Btn>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Tips */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>💡 Consejos de respaldo</div>
        {[
          ["📅","Descarga una copia JSON cada semana"],
          ["☁️","Guárdala en Google Drive o WhatsApp para tenerla segura"],
          ["📊","El archivo CSV lo puedes abrir en Excel para ver reportes"],
          ["🔄","Si cambias de celular, importa el JSON para recuperar todo"],
          ["💾","Las copias locales se pierden si limpias el navegador — descarga el JSON para estar seguro"],
        ].map(([ic,txt],i)=>(
          <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:i<4?`1px solid ${C.border}`:"",alignItems:"flex-start"}}>
            <span style={{fontSize:16,flexShrink:0}}>{ic}</span>
            <span style={{color:C.text,fontSize:13}}>{txt}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

// WHATSAPP
// ══════════════════════════════════════════
function WhatsAppHub({products,salesLog}){
  const [config,setConfig]=useLS("inv_wa",{grupoTienda:"",grupoProveedores:"",telefono:""});
  const [editing,setEditing]=useState(false);
  const [temp,setTemp]=useState(config);

  const low=products.filter(p=>p.stock<p.min_stock);
  const now=new Date();
  const ventasHoy=salesLog.filter(s=>s.sale_date===now.toISOString().split("T")[0]);
  const totalHoy=ventasHoy.reduce((s,x)=>s+(x.sale_price*x.quantity),0);
  const gananciaHoy=ventasHoy.reduce((s,x)=>s+(x.profit||0),0);

  const openWA=(phone,msg)=>{
    const clean=phone.replace(/\D/g,"");
    const url=`https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
  };

  const openGroup=(link,msg)=>{
    if(!link){alert("Configura el enlace del grupo primero.");return;}
    // If it's a group invite link, just open it
    if(link.includes("chat.whatsapp.com")||link.includes("wa.me")){
      window.open(link,"_blank");
    }else{
      openWA(link,msg);
    }
  };

  const resumenDia=`📦 *RESUMEN DEL DÍA — ${now.toLocaleDateString("es-ES")}*\n\n💰 Ventas: Bs. ${totalHoy.toLocaleString()}\n📈 Ganancia: Bs. ${gananciaHoy.toLocaleString()}\n🛒 Transacciones: ${ventasHoy.length}\n\n${low.length>0?`⚠️ Stock bajo: ${low.map(p=>p.name).join(", ")}\n\n`:"✅ Stock en orden\n\n"}Generado por InventarioPRO 📦`;

  const alertaStock=`🚨 *ALERTA DE STOCK BAJO*\n\n${low.map(p=>`• ${p.name}: ${p.stock} uds (mín ${p.min_stock})\n  📞 Proveedor: ${p.supplier_name||"—"} ${p.supplier_phone||""}`).join("\n\n")}\n\n¡Necesitamos reponer urgente! 📦`;

  const msgCatalogo=`📋 *CATÁLOGO DISPONIBLE*\n\nTenemos ${products.filter(p=>p.stock>0).length} productos disponibles.\n\nEscríbenos para recibir nuestro catálogo completo con precios 👆\n\n_InventarioPRO_ 📦`;

  const messages=[
    {label:"📊 Enviar Resumen del Día",msg:resumenDia,target:"grupo",icon:"📊",color:C.blue},
    {label:"🚨 Alerta Stock Bajo",msg:alertaStock,target:"grupo",icon:"🚨",color:C.red,disabled:low.length===0},
    {label:"📋 Compartir Catálogo",msg:msgCatalogo,target:"grupo",icon:"📋",color:C.green},
    {label:"🛒 Pedir a Proveedor",msg:`Hola, necesito reponer:\n\n${low.map(p=>`• ${p.name} — stock actual: ${p.stock} uds`).join("\n")}\n\n¿Pueden enviarme precios y disponibilidad? Gracias.`,target:"proveedor",icon:"🛒",color:C.accent},
  ];

  return(
    <div>
      {/* Config */}
      <Card style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editing?12:0}}>
          <div style={{color:C.accent,fontWeight:700}}>⚙️ Configuración WhatsApp</div>
          <Btn small onClick={()=>{setTemp(config);setEditing(s=>!s);}} outline color={C.blue}>{editing?"Cancelar":"✏️ Editar"}</Btn>
        </div>
        {editing&&(
          <div>
            <div style={{color:C.muted,fontSize:12,marginBottom:10,marginTop:8}}>
              Para el grupo, pega el enlace de invitación (chat.whatsapp.com/...) o el número con código de país (ej: 59171234567)
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <Inp label="📱 Enlace/Número Grupo Tienda" value={temp.grupoTienda} onChange={e=>setTemp(t=>({...t,grupoTienda:e.target.value}))} placeholder="chat.whatsapp.com/... o 591XXXXXXXX"/>
              <Inp label="🏭 Número Proveedor Principal" value={temp.grupoProveedores} onChange={e=>setTemp(t=>({...t,grupoProveedores:e.target.value}))} placeholder="591XXXXXXXXX"/>
              <Inp label="📞 Tu número de contacto" value={temp.telefono} onChange={e=>setTemp(t=>({...t,telefono:e.target.value}))} placeholder="591XXXXXXXXX"/>
            </div>
            <div style={{marginTop:12}}><Btn onClick={()=>{setConfig(temp);setEditing(false);}} color={C.green}>💾 Guardar</Btn></div>
          </div>
        )}
        {!editing&&(
          <div style={{marginTop:8,display:"flex",gap:12,flexWrap:"wrap"}}>
            <div style={{color:C.text,fontSize:13}}>📱 Grupo: <span style={{color:config.grupoTienda?C.green:C.muted}}>{config.grupoTienda?"Configurado ✓":"Sin configurar"}</span></div>
            <div style={{color:C.text,fontSize:13}}>🏭 Proveedor: <span style={{color:config.grupoProveedores?C.green:C.muted}}>{config.grupoProveedores?"Configurado ✓":"Sin configurar"}</span></div>
          </div>
        )}
      </Card>

      {/* Quick messages */}
      <div style={{color:C.accent,fontWeight:700,marginBottom:12,fontSize:15}}>💬 Mensajes Rápidos</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
        {messages.map((m,i)=>(
          <Card key={i} style={{border:`1px solid ${m.color}33`,opacity:m.disabled?0.5:1}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <span style={{fontSize:26}}>{m.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{m.label}</div>
                <div style={{background:C.hi,borderRadius:8,padding:"8px 10px",fontSize:12,color:C.muted,lineHeight:1.5,maxHeight:60,overflow:"hidden"}}>{m.msg.slice(0,120)}...</div>
              </div>
              <Btn small
                onClick={()=>{
                  if(m.disabled)return;
                  if(m.target==="grupo")openGroup(config.grupoTienda,m.msg);
                  else openWA(config.grupoProveedores,m.msg);
                }}
                color={m.color}
                disabled={m.disabled}>
                Enviar →
              </Btn>
            </div>
          </Card>
        ))}
      </div>

      {/* Individual provider buttons */}
      {low.length>0&&(
        <Card>
          <div style={{color:C.red,fontWeight:700,marginBottom:12}}>🚨 Contactar Proveedores — Stock Bajo</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {low.filter(p=>p.supplier_phone).map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:C.hi,borderRadius:10}}>
                <span style={{fontSize:20}}>📦</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700}}>{p.name}</div>
                  <div style={{color:C.red,fontSize:12}}>Stock: {p.stock} uds · Proveedor: {p.supplier_name}</div>
                </div>
                <Btn small onClick={()=>openWA(p.supplier_phone,`Hola ${p.supplier_name}, necesito reponer *${p.name}*.\nStock actual: ${p.stock} unidades.\n¿Precio y disponibilidad? Gracias 🙏`)} color={C.green}>📱 WhatsApp</Btn>
              </div>
            ))}
            {low.filter(p=>!p.supplier_phone).length>0&&(
              <div style={{color:C.muted,fontSize:12,marginTop:4}}>
                ⚠️ {low.filter(p=>!p.supplier_phone).length} proveedor(es) sin número guardado. Agrégalos en Inventario.
              </div>
            )}
          </div>
        </Card>
      )}

      {low.length===0&&(
        <Card style={{textAlign:"center",padding:30}}>
          <div style={{fontSize:40,marginBottom:8}}>✅</div>
          <div style={{color:C.green,fontWeight:700}}>¡Todo el stock está en orden!</div>
          <div style={{color:C.muted,fontSize:13,marginTop:4}}>No hay productos con stock bajo en este momento.</div>
        </Card>
      )}
    </div>
  );
}

// MOTOR IA OFFLINE — NÚCLEO INTELIGENTE
// ══════════════════════════════════════════
const IA = {
  analizar(products, salesLog) {
    const now = new Date();
    const low = products.filter(p => p.stock < p.min_stock);
    const sinStock = products.filter(p => p.stock === 0);
    const top = [...products].sort((a,b) => b.sales - a.sales);
    const monthSales = salesLog.filter(s => { const d=new Date(s.sale_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
    const yearSales = salesLog.filter(s => new Date(s.sale_date).getFullYear()===now.getFullYear());
    const monthProfit = monthSales.reduce((s,x)=>s+(x.profit||0),0);
    const yearProfit = yearSales.reduce((s,x)=>s+(x.profit||0),0);
    const totalInv = products.reduce((s,p)=>s+p.stock*(p.cost_price||0),0);
    const avgMargin = products.length ? Math.round(products.reduce((s,p)=>s+(p.price&&p.cost_price?((p.price-p.cost_price)/p.price)*100:0),0)/products.length) : 0;
    return { low, sinStock, top, monthSales, yearSales, monthProfit, yearProfit, totalInv, avgMargin, now };
  },

  responder(q, products, salesLog) {
    const t = q.toLowerCase();
    const d = this.analizar(products, salesLog);
    const upcoming = getUpcoming(30);

    if (t.includes("reponer")||t.includes("stock bajo")||t.includes("urgente")||t.includes("comprar")) {
      if (!d.low.length) return "✅ ¡Todo el stock está en orden! No necesitas reponer nada por ahora.";
      let r=`🚨 Tienes ${d.low.length} producto(s) con stock bajo:\n\n`;
      d.low.forEach(p=>{r+=`📦 *${p.name}*\n   Stock: ${p.stock} / Mínimo: ${p.min_stock}\n   Reponer: ${p.min_stock-p.stock+5} uds\n`;if(p.supplier_name)r+=`   🏭 ${p.supplier_name}\n`;if(p.supplier_phone)r+=`   📞 ${p.supplier_phone}\n`;r+="\n";});
      r+="💡 Pide el doble del mínimo para tener colchón.";
      return r;
    }
    if (t.includes("ganancia")||t.includes("gané")||t.includes("gane")||t.includes("cuánto")||t.includes("cuanto")) {
      return `💰 *Ganancias:*\n\n📅 Este mes: Bs. ${d.monthProfit.toLocaleString()}\n📆 Este año: Bs. ${d.yearProfit.toLocaleString()}\n💼 Capital invertido: Bs. ${d.totalInv.toLocaleString()}\n📊 Margen promedio: ${d.avgMargin}%\n\n${d.monthProfit>0?"📈 ¡Vas bien! Sigue registrando tus ventas.":"💡 Registra tus ventas diarias para ver tus ganancias."}`;
    }
    if (t.includes("venta")||t.includes("vendí")||t.includes("vendido")) {
      const total=d.monthSales.reduce((s,x)=>s+(x.sale_price*x.quantity),0);
      return `🛒 *Ventas este mes:*\n\n💵 Total: Bs. ${total.toLocaleString()}\n📋 Transacciones: ${d.monthSales.length}\n💰 Ganancia: Bs. ${d.monthProfit.toLocaleString()}\n\n⭐ Top productos:\n${d.top.slice(0,3).map((p,i)=>`${i+1}. ${p.name} — ${p.sales} vendidos`).join("\n")}`;
    }
    if (t.includes("rentable")||t.includes("mejor producto")||t.includes("más vende")) {
      const cm=products.map(p=>({...p,margen:p.price&&p.cost_price?((p.price-p.cost_price)/p.price)*100:0})).sort((a,b)=>b.margen-a.margen);
      return `🏆 *Más rentables:*\n\n${cm.slice(0,5).map((p,i)=>`${i+1}. ${p.name}\n   Margen: ${Math.round(p.margen)}% | Precio: Bs. {p.price} | Ventas: ${p.sales}`).join("\n\n")}\n\n💡 Promociona los de mayor margen.`;
    }
    if (t.includes("precio")||t.includes("subir")||t.includes("bajar")) {
      const bm=products.filter(p=>p.price&&p.cost_price&&((p.price-p.cost_price)/p.price)*100<20);
      if(bm.length>0) return `💲 *Precios con margen bajo (<20%):*\n\n${bm.map(p=>`• ${p.name}: ${Math.round(((p.price-p.cost_price)/p.price)*100)}%\n  Actual: Bs. {p.price} | Sugerido: Bs. {Math.round(p.cost_price*1.35)}`).join("\n\n")}\n\n💡 Considera subir estos precios un 10-15%.`;
      return `✅ Tus precios están bien. Margen promedio: ${d.avgMargin}%\n\n${d.avgMargin>40?"🟢 Excelente margen. Puedes ofrecer descuentos.":d.avgMargin>25?"🟡 Buen margen. Cuida los descuentos.":"🔴 Margen bajo. Revisa costos."}`;
    }
    if (t.includes("fecha")||t.includes("feriado")||t.includes("bolivia")||t.includes("próximo")||t.includes("proximo")) {
      if(!upcoming.length) return "📅 No hay fechas importantes en los próximos 30 días.";
      let r=`🇧🇴 *Próximas fechas de Bolivia:*\n\n`;
      upcoming.slice(0,3).forEach(ev=>{r+=`${ev.emoji} *${ev.name}* — en ${ev.daysLeft} días\n${ev.tip}\n\n`;});
      return r;
    }
    if (t.includes("inventario")||t.includes("productos")||t.includes("cuántos")||t.includes("cuantos")) {
      return `📦 *Inventario:*\n\n✅ Total: ${products.length} productos\n⚠️ Stock bajo: ${d.low.length}\n❌ Agotados: ${d.sinStock.length}\n💰 Valor: Bs. ${d.totalInv.toLocaleString()}\n\n${d.sinStock.length>0?`🚨 Sin stock: ${d.sinStock.map(p=>p.name).join(", ")}`:"✅ Ningún producto agotado"}`;
    }
    if (t.includes("idea")||t.includes("mejorar")||t.includes("estrategia")||t.includes("consejo")) {
      const ideas=this.generarIdeas(products,salesLog);
      return `💡 *Ideas para tu negocio:*\n\n${ideas.slice(0,4).map(i=>`${i.emoji} *${i.titulo}* [${i.impacto}]\n${i.desc}\n▶ ${i.accion}`).join("\n\n")}`;
    }
    if (t.includes("hola")||t.includes("buenos")||t.includes("buenas")) {
      return `¡Hola! 👋 Soy ARIA, tu asistente offline.\n\nPuedo ayudarte con:\n📦 Stock · 💰 Ganancias · 💡 Ideas\n🇧🇴 Fechas Bolivia · 📊 Diagnóstico · 💲 Precios\n\n¿Qué necesitas?`;
    }
    if (t.includes("diagnóstico")||t.includes("diagnostico")||t.includes("salud")||t.includes("cómo estoy")) {
      return this.textoDiagnostico(products,salesLog);
    }
    return `🤖 Resumen rápido:\n\n📦 Productos: ${products.length} | ⚠️ Stock bajo: ${d.low.length}\n💰 Ganancia mes: Bs. ${d.monthProfit.toLocaleString()}\n📈 Ganancia año: Bs. ${d.yearProfit.toLocaleString()}\n\n${d.low.length>0?`🚨 Reponer: ${d.low.map(p=>p.name).join(", ")}`:"✅ Stock en orden"}\n\nPregúntame: stock, ganancias, ventas, precios, ideas, fechas, diagnóstico.`;
  },

  generarIdeas(products, salesLog) {
    const d=this.analizar(products,salesLog);
    const upcoming=getUpcoming(30);
    const ideas=[];
    if(d.low.length>0) ideas.push({emoji:"🚨",titulo:"Reponer Stock Urgente",desc:`${d.low.length} productos bajo el mínimo. Cada día sin stock es ventas perdidas.`,impacto:"Alto",accion:`Contacta a ${d.low[0]?.supplier_name||"tu proveedor"} hoy mismo. Tel: ${d.low[0]?.supplier_phone||"—"}`});
    if(d.sinStock.length>0) ideas.push({emoji:"❌",titulo:"Productos Agotados",desc:`${d.sinStock.map(p=>p.name).join(", ")} están agotados.`,impacto:"Alto",accion:"Reponer inmediatamente — estás perdiendo ventas ahora mismo"});
    if(upcoming.length>0) ideas.push({emoji:upcoming[0].emoji,titulo:`Preparate — ${upcoming[0].name}`,desc:`Faltan ${upcoming[0].daysLeft} días. ${upcoming[0].tip}`,impacto:"Alto",accion:`Aumentar stock antes del ${upcoming[0].day}/${upcoming[0].month}`});
    const bm=products.filter(p=>p.price&&p.cost_price&&((p.price-p.cost_price)/p.price)*100<20);
    if(bm.length>0) ideas.push({emoji:"💲",titulo:"Precios con Margen Bajo",desc:`${bm.map(p=>p.name).join(", ")} tienen margen menor al 20%.`,impacto:"Medio",accion:"Subir precios 10-15% o negociar mejor con proveedores"});
    if(d.top[0]) ideas.push({emoji:"⭐",titulo:"Potencia tu Producto Estrella",desc:`"${d.top[0].name}" es tu campeón con ${d.top[0].sales} ventas.`,impacto:"Medio",accion:"Siempre tener stock doble y ponerlo en lugar visible"});
    ideas.push({emoji:"📱",titulo:"Catálogo por WhatsApp",desc:"Comparte tu catálogo PDF con clientes para aumentar ventas.",impacto:"Medio",accion:"Catálogo → Descarga PDF → Comparte en tus grupos de WhatsApp"});
    ideas.push({emoji:"🇧🇴",titulo:"Estrategia Fechas Bolivia",desc:"24 fechas clave de ventas. Prepararse con 30 días multiplica ganancias.",impacto:"Alto",accion:"Ve a ARIA → Fechas Bolivia → selecciona la próxima fecha"});
    if(d.avgMargin<25) ideas.push({emoji:"📊",titulo:"Margen Promedio Bajo",desc:`Tu margen es ${d.avgMargin}%. Lo ideal es más del 30%.`,impacto:"Alto",accion:"Revisa costos y negocia descuentos por volumen con proveedores"});
    return ideas;
  },

  textoDiagnostico(products, salesLog) {
    const d=this.analizar(products,salesLog);
    let score=100;const p=[];const f=[];
    if(d.low.length>0){score-=d.low.length*8;p.push(`⚠️ ${d.low.length} producto(s) con stock bajo`);}
    if(d.sinStock.length>0){score-=d.sinStock.length*12;p.push(`❌ ${d.sinStock.length} agotado(s)`);}
    if(d.avgMargin<20){score-=15;p.push(`📉 Margen bajo: ${d.avgMargin}%`);}
    if(d.monthSales.length===0){score-=10;p.push("🛒 Sin ventas registradas este mes");}
    if(d.monthProfit>0) f.push(`💰 Ganancia positiva: Bs. ${d.monthProfit.toLocaleString()}`);
    if(d.low.length===0) f.push("✅ Stock en buen estado");
    if(d.avgMargin>=30) f.push(`📈 Buen margen: ${d.avgMargin}%`);
    if(products.length>=5) f.push(`📦 Buen catálogo: ${products.length} productos`);
    score=Math.max(10,Math.min(100,score));
    const salud=score>=80?"Excelente 🟢":score>=60?"Buena 🟡":score>=40?"Regular 🟠":"Crítica 🔴";
    return `📊 *DIAGNÓSTICO*\n\n🏆 Salud: ${salud}\n📊 Puntuación: ${score}/100\n\n✅ Fortalezas:\n${f.length?f.join("\n"):"• Registra datos para ver fortalezas"}\n\n⚠️ Mejorar:\n${p.length?p.join("\n"):"• ¡Todo en orden!"}\n\n🎯 Recomendación:\n${score>=80?"Tu negocio va bien. Aprovecha las fechas de Bolivia para crecer.":score>=60?"Buen negocio. Prioriza reponer stock bajo.":"Atención urgente. Repón stock y registra ventas diarias."}`;
  },

  estrategiaEvento(ev, products, salesLog) {
    const d=this.analizar(products,salesLog);
    const top3=d.top.slice(0,3);
    return {
      resumen:`Estrategia para ${ev.name} en ${ev.daysLeft} días. ${ev.tip}`,
      urgencia:ev.daysLeft<=7?"alta":ev.daysLeft<=15?"media":"baja",
      productos_estrella:top3.map(p=>({nombre:p.name,accion:"Aumentar stock y poner en lugar visible",razon:`Top vendido con ${p.sales} ventas`})),
      productos_comprar:d.low.map(p=>({nombre:p.name,cantidad_sugerida:(p.min_stock-p.stock)*2+5,razon:`Stock bajo: ${p.stock}/${p.min_stock} — urgente antes del evento`})),
      estrategia_precio:{
        descuentos:`Ofrece 10-15% en productos principales durante ${ev.name}`,
        combos:"Crea paquetes de 2-3 productos con 10% de descuento",
        precio_especial:`Precio especial válido los días del evento`
      },
      marketing:[
        "Decora tu local para la ocasión",
        "Publica en tus grupos de WhatsApp 3 días antes",
        "Prepara combos y paquetes especiales",
        "Atiende con horario extendido",
        "Ofrece servicio de envoltorio gratis"
      ],
      timeline:[
        {dias_antes:30,accion:"Hacer pedido a proveedores para tener stock extra"},
        {dias_antes:15,accion:"Confirmar llegada de productos pedidos"},
        {dias_antes:7,accion:"Decorar local y preparar promociones"},
        {dias_antes:3,accion:"Publicar en WhatsApp y redes sociales"},
        {dias_antes:1,accion:"Revisar stock final y organizar el local"},
      ].filter(t=>t.dias_antes<=ev.daysLeft+5),
      meta_ventas:`Meta: duplicar ventas del día promedio`,
      consejo_clave:`${ev.tip} Con ${ev.daysLeft} días${ev.daysLeft>=15?", tienes tiempo suficiente para prepararte bien":ev.daysLeft>=7?", actúa esta semana":"¡actúa HOY mismo!"}.`
    };
  }
};

// FOTO IA — OFFLINE
// ══════════════════════════════════════════
function FotoIA({products, setProducts}){
  const [photo,setPhoto]=useState(null);
  const [editForm,setEditForm]=useState(null);
  const [saved,setSaved]=useState(false);
  const camRef=useRef();const galRef=useRef();
  const ef=k=>e=>setEditForm(f=>({...f,[k]:e.target.value}));

  const handleImg=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{setPhoto(ev.target.result);setEditForm(null);setSaved(false);};
    r.readAsDataURL(file);
  };

  const save=()=>{
    if(!editForm?.name)return;
    setProducts(ps=>[...ps,{...editForm,id:Date.now(),stock:+editForm.stock,min_stock:+editForm.min_stock,price:+editForm.price,wholesale_price:+editForm.wholesale_price,cost_price:+editForm.cost_price,sales:0,image:photo}]);
    setSaved(true);
    setTimeout(()=>{setPhoto(null);setEditForm(null);setSaved(false);},2000);
  };

  return(
    <div>
      <Card style={{marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>📷</div>
        <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:6}}>Agregar Producto con Foto</div>
        <div style={{color:C.muted,fontSize:13,marginBottom:16}}>Saca una foto al producto y llena los datos — 100% offline</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn onClick={()=>camRef.current?.click()} color={C.accent}>📸 Cámara</Btn>
          <Btn onClick={()=>galRef.current?.click()} color={C.blue} outline>🖼️ Galería</Btn>
        </div>
        <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleImg}/>
        <input ref={galRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImg}/>
      </Card>

      {photo&&!editForm&&(
        <Card style={{marginBottom:16}}>
          <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
            <img src={photo} alt="" style={{width:100,height:100,objectFit:"cover",borderRadius:12,border:`2px solid ${C.accent}`,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{color:C.green,fontWeight:700,marginBottom:8}}>✅ Foto lista</div>
              <Btn onClick={()=>setEditForm({name:"",category:"",description:"",price:"",wholesale_price:"",cost_price:"",stock:"1",min_stock:"5",supplier_name:"",supplier_phone:""})} color={C.green}>✏️ Ingresar Datos</Btn>
            </div>
          </div>
        </Card>
      )}

      {editForm&&(
        <Card style={{background:C.hi}}>
          {photo&&<div style={{textAlign:"center",marginBottom:14}}><img src={photo} alt="" style={{width:80,height:80,objectFit:"cover",borderRadius:10,border:`2px solid ${C.accent}`}}/></div>}
          <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>✏️ Datos del Producto</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Inp label="Nombre *" value={editForm.name} onChange={ef("name")} placeholder="ej: Coca Cola 2L"/>
            <Inp label="Categoría" value={editForm.category} onChange={ef("category")} placeholder="ej: Bebidas"/>
            <Inp label="Descripción" value={editForm.description} onChange={ef("description")} style={{minWidth:200}}/>
            <Inp label="Stock inicial" value={editForm.stock} onChange={ef("stock")} type="number"/>
            <Inp label="Stock mínimo" value={editForm.min_stock} onChange={ef("min_stock")} type="number"/>
            <Inp label="Precio Minorista Bs." value={editForm.price} onChange={ef("price")} type="number"/>
            <Inp label="Precio Mayorista Bs." value={editForm.wholesale_price} onChange={ef("wholesale_price")} type="number"/>
            <Inp label="Precio Compra Bs." value={editForm.cost_price} onChange={ef("cost_price")} type="number"/>
            <Inp label="Proveedor" value={editForm.supplier_name} onChange={ef("supplier_name")}/>
            <Inp label="📞 Tel. Proveedor" value={editForm.supplier_phone} onChange={ef("supplier_phone")}/>
          </div>
          <div style={{marginTop:14}}>
            {saved?<div style={{color:C.green,fontWeight:700}}>✅ ¡Guardado con foto!</div>
            :<div style={{display:"flex",gap:8}}><Btn onClick={save} color={C.green}>💾 Guardar</Btn><Btn onClick={()=>{setPhoto(null);setEditForm(null);}} outline color={C.muted}>Cancelar</Btn></div>}
          </div>
        </Card>
      )}

      {!photo&&(
        <Card>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>💡 Cómo usar</div>
          {[["📸","Toca Cámara para sacar foto desde el celular"],["🖼️","O selecciona desde la galería"],["✏️","Llena nombre, precios y proveedor"],["💾","El producto queda con foto en el inventario y catálogo"],["✅","Funciona 100% sin internet"]].map(([ic,txt],i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<4?`1px solid ${C.border}`:""}}>
              <span style={{fontSize:18}}>{ic}</span><span style={{color:C.text,fontSize:13}}>{txt}</span>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// VOZ — OFFLINE
// ══════════════════════════════════════════
function VozVentas({products,setProducts,salesLog,setSalesLog}){
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState("");
  const [processing,setProcessing]=useState(false);
  const [result,setResult]=useState(null);
  const [history,setHistory]=useLS("inv_voz_history",[]);
  const [supported,setSupported]=useState(true);
  const recRef=useRef(null);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setSupported(false);return;}
    const r=new SR();r.lang="es-ES";r.continuous=false;r.interimResults=true;
    r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join("");setTranscript(t);};
    r.onend=()=>setListening(false);r.onerror=()=>setListening(false);
    recRef.current=r;
  },[]);

  const speak=txt=>{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt.replace(/[*_]/g,""));u.lang="es-ES";u.rate=1.05;window.speechSynthesis.speak(u);};

  const interpretar=texto=>{
    const t=texto.toLowerCase();
    const numW={"un":1,"una":1,"uno":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7,"ocho":8,"nueve":9,"diez":10};
    let qty=1;const nm=t.match(/\d+/);if(nm)qty=parseInt(nm[0]);else Object.entries(numW).forEach(([w,n])=>{if(t.includes(w))qty=n;});
    let desc=0;const dm=t.match(/(\d+)\s*(de\s+)?descuento/);if(dm)desc=parseInt(dm[1]);
    const findProd=()=>{let best=null,bs=0;products.forEach(p=>{let sc=0;p.name.toLowerCase().split(" ").forEach(w=>{if(w.length>2&&t.includes(w))sc+=w.length;});if(sc>bs){bs=sc;best=p;}});return bs>2?best:null;};
    const esVenta=t.includes("vend")||t.includes("cobr")||t.includes("despach")||t.includes("salió")||t.includes("salio");
    const esConsulta=t.includes("cuánto")||t.includes("cuanto")||t.includes("hay")||t.includes("queda")||t.includes("stock")||t.includes("tiene");
    if(esConsulta){const p=findProd();if(p)return{accion:"consulta",mensaje:`📦 ${p.name}: ${p.stock} unidades${p.stock<p.min_stock?" ⚠️ STOCK BAJO":" ✅"}`,producto_nombre:p.name};return{accion:"consulta",mensaje:`📦 Tienes ${products.length} productos. Stock bajo: ${products.filter(p=>p.stock<p.min_stock).length}`,producto_nombre:""};}
    if(esVenta){const p=findProd();if(!p)return{accion:"desconocido",mensaje:"No encontré ese producto. Di el nombre más claramente.",ejecutar:false};return{accion:"venta",ejecutar:true,producto_id:p.id,producto_nombre:p.name,cantidad:qty,descuento:desc,precio_venta:Math.max(0,p.price-desc),mensaje:`✅ Venta: ${qty} ${p.name}${desc>0?` con Bs. {desc} descuento`:""}. Stock: ${p.stock-qty}`};}
    return{accion:"desconocido",mensaje:"No entendí. Intenta: 'Vendí 2 laptops' o '¿Cuántas laptops hay?'",ejecutar:false};
  };

  const process=txt=>{
    if(!txt.trim())return;setProcessing(true);setResult(null);
    setTimeout(()=>{
      const res=interpretar(txt);setResult(res);
      if(res.accion==="venta"&&res.ejecutar&&res.producto_id){
        const p=products.find(x=>x.id===res.producto_id);
        if(p){
          const e={id:Date.now(),product_id:p.id,product_name:p.name,quantity:res.cantidad,original_price:p.price,sale_price:res.precio_venta,discount:res.descuento||0,discount_reason:"Voz",cost_price:p.cost_price,profit:(res.precio_venta-p.cost_price)*res.cantidad,sale_date:new Date().toISOString().split("T")[0]};
          setSalesLog(s=>[e,...s]);
          setProducts(ps=>ps.map(x=>x.id===p.id?{...x,stock:Math.max(0,x.stock-res.cantidad),sales:(x.sales||0)+res.cantidad}:x));
        }
      }
      setHistory(h=>[{texto:txt,resultado:res.mensaje,fecha:new Date().toLocaleTimeString("es-ES")},...h.slice(0,19)]);
      speak(res.mensaje);setProcessing(false);
    },400);
  };

  const [msgs,setMsgs]=useLS("inv_ai_msgs",[{role:"assistant",text:"¡Hola! Soy ARIA 🤖\n\n✅ Funciono 100% SIN INTERNET\n\nAnalizo tu inventario en tiempo real:\n\n📦 Stock y reposición urgente\n💰 Ganancias y ventas\n💡 Ideas para tu negocio\n🇧🇴 Estrategias fechas Bolivia\n📊 Diagnóstico completo\n💲 Análisis de precios\n\n¿Qué necesitas?"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [activeTab,setActiveTab]=useState("chat");
  const [ideas,setIdeas]=useState([]);
  const [analysis,setAnalysis]=useState(null);
  const [eventStrategy,setEventStrategy]=useState(null);
  const [selectedEvent,setSelectedEvent]=useState(null);
  const [loadingEvent,setLoadingEvent]=useState(false);
  const endRef=useRef();
  const upcomingEvents=getUpcoming(90);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const send=cm=>{
    const m=(cm||input).trim();if(!m||loading)return;
    setInput("");setMsgs(prev=>[...prev,{role:"user",text:m}]);setLoading(true);
    setTimeout(()=>{const r=IA.responder(m,products,salesLog);setMsgs(prev=>[...prev,{role:"assistant",text:r}]);setLoading(false);},300);
  };

  const genIdeas=()=>{setIdeas([]);setTimeout(()=>setIdeas(IA.generarIdeas(products,salesLog)),300);};

  const genAnalysis=()=>{
    setAnalysis(null);
    setTimeout(()=>{
      const d=IA.analizar(products,salesLog);
      let score=100;const probs=[];const forts=[];const alertas=[];const opps=[];
      if(d.low.length>0){score-=d.low.length*8;probs.push(`${d.low.length} producto(s) con stock bajo`);alertas.push({nivel:"alta",mensaje:`Reponer: ${d.low.map(p=>p.name).join(", ")}`});}
      if(d.sinStock.length>0){score-=d.sinStock.length*12;alertas.push({nivel:"alta",mensaje:`Agotados: ${d.sinStock.map(p=>p.name).join(", ")}`});}
      if(d.avgMargin<20){score-=15;alertas.push({nivel:"media",mensaje:`Margen bajo: ${d.avgMargin}%`});}
      if(d.monthSales.length===0){score-=10;alertas.push({nivel:"baja",mensaje:"Sin ventas registradas este mes"});}
      if(d.monthProfit>0)forts.push(`Ganancia positiva: Bs. ${d.monthProfit.toLocaleString()}`);
      if(d.low.length===0)forts.push("Stock en buen estado");
      if(d.avgMargin>=30)forts.push(`Buen margen: ${d.avgMargin}%`);
      if(products.length>=5)forts.push(`Catálogo de ${products.length} productos`);
      if(d.top[0])forts.push(`Estrella: ${d.top[0].name} (${d.top[0].sales} ventas)`);
      const up=getUpcoming(30);
      if(up.length>0)opps.push(`${up[0].emoji} ${up[0].name} en ${up[0].daysLeft} días — ¡prepárate!`);
      opps.push("Compartir catálogo PDF por WhatsApp");
      if(d.avgMargin<30)opps.push("Negociar mejores precios con proveedores");
      score=Math.max(10,Math.min(100,score));
      const salud=score>=80?"Excelente":score>=60?"Buena":score>=40?"Regular":"Crítica";
      setAnalysis({salud,score,fortalezas:forts,debilidades:probs,oportunidades:opps,alertas,recomendacion_principal:score>=80?"Tu negocio va bien. Aprovecha las fechas de Bolivia.":score>=60?"Buen negocio. Repón stock bajo y registra ventas.":"Acción urgente: repón stock agotado y registra cada venta.",prediccion:d.monthProfit>0?`A este ritmo, terminarás el año con ~Bs. ${(d.yearProfit+d.monthProfit*(12-d.now.getMonth())).toLocaleString()} de ganancia.`:"Registra ventas para ver una predicción."});
    },400);
  };

}
function AlarmsManager({products,salesLog}){
  const [alarms,setAlarms]=useLS("inv_alarms",[]);
  const [form,setForm]=useState({title:"",time:"08:00",days:[],message:""});
  const [showAdd,setShowAdd]=useState(false);
  const [triggered,setTriggered]=useState([]);
  const [alarmTab,setAlarmTab]=useState("active");
  const daysNames=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const upcoming=getUpcoming(90);
  const now=new Date();

  // Auto-create expiry alarms for products with expiry dates
  useEffect(()=>{
    const withExpiry=products.filter(p=>p.has_expiry&&p.expiry_date);
    withExpiry.forEach(p=>{
      const key=`expiry_alarm_${p.id}_${p.expiry_date}`;
      if(localStorage.getItem(key))return;
      const expDate=new Date(p.expiry_date);
      const daysLeft=Math.ceil((expDate-now)/(1000*60*60*24));
      if(daysLeft>0&&daysLeft<=365){
        // 30-day warning alarm
        const alarm30={
          id:Date.now()+Math.random(),active:true,
          title:`📅 Vence en 30 días — ${p.name}`,
          time:"09:00",days:[1,2,3,4,5],
          message:`¡Atención! ${p.name} vence el ${p.expiry_date}. Quedan aprox. 30 días. Asegúrate de vender o reponer a tiempo.`,
          type:"expiry",productId:p.id
        };
        // Day-of warning alarm
        const alarm1={
          id:Date.now()+Math.random()*1000,active:true,
          title:`🚨 ¡Vence HOY! — ${p.name}`,
          time:"07:00",days:[],
          message:`¡URGENTE! ${p.name} vence hoy ${p.expiry_date}. Revisa el producto inmediatamente.`,
          type:"expiry_urgent",productId:p.id
        };
        setAlarms(a=>[...a,alarm30,alarm1]);
        localStorage.setItem(key,"1");
      }
    });
  },[products]);

  // Auto-create Bolivia event alarms (once)
  useEffect(()=>{
    const key="bolivia_alarms_created_v2";
    if(localStorage.getItem(key))return;
    const autoAlarms=[];
    BOLIVIA_DATES.forEach(ev=>{
      const d30=getDaysUntil(ev.month,ev.day);
      if(d30>0&&d30<=365){
        autoAlarms.push({id:Date.now()+Math.random(),active:true,title:`📅 Faltan 30 días — ${ev.name}`,time:"09:00",days:[],message:`Prepara tu negocio para ${ev.name} ${ev.emoji}. ${ev.tip.slice(0,80)}...`,type:"bolivia_30",eventName:ev.name});
        autoAlarms.push({id:Date.now()+Math.random()*1000,active:true,title:`⚡ ¡Faltan 7 días! — ${ev.name}`,time:"09:00",days:[],message:`¡Última semana! ${ev.name} ${ev.emoji}`,type:"bolivia_7",eventName:ev.name});
      }
    });
    setAlarms(a=>[...a,...autoAlarms.slice(0,10)]);
    localStorage.setItem(key,"1");
  },[]);

  // Check alarms every 30s
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const hhmm=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      const dayIdx=now.getDay();
      alarms.forEach(a=>{
        if(!a.active)return;
        if(a.time!==hhmm)return;
        if(a.days.length>0&&!a.days.includes(dayIdx))return;
        setTriggered(t=>{
          const key=`${a.id}-${hhmm}-${now.toDateString()}`;
          if(t.find(x=>x.key===key))return t;
          if(Notification.permission==="granted")
            new Notification(`⏰ ${a.title}`,{body:a.message||"Recordatorio InventarioPRO",icon:"📦"});
          try{
            const ctx=new(window.AudioContext||window.webkitAudioContext)();
            [0,300,600].forEach(d=>setTimeout(()=>{
              const o=ctx.createOscillator(),g=ctx.createGain();
              o.connect(g);g.connect(ctx.destination);
              o.frequency.value=880;g.gain.value=0.3;o.start();
              setTimeout(()=>o.stop(),200);
            },d));
          }catch{}
          return [...t,{key,alarm:a}];
        });
      });
    };
    check();const iv=setInterval(check,30000);return()=>clearInterval(iv);
  },[alarms]);

  useEffect(()=>{if(Notification.permission==="default")Notification.requestPermission();},[]);

  const low=products.filter(p=>p.stock<p.min_stock);
  const basicSuggestions=[
    {title:"📦 Revisar Stock Diario",time:"09:00",message:`${low.length} productos con stock bajo`,days:[1,2,3,4,5]},
    {title:"💰 Cierre del Día",time:"18:30",message:"Registra las ventas de hoy",days:[1,2,3,4,5]},
    {title:"🛒 Día de Compras",time:"10:00",message:"Reponer inventario semanal",days:[1]},
    {title:"📊 Reporte Semanal",time:"08:00",message:"Revisa el desempeño de la semana",days:[5]},
    {title:"🔔 Revisión Mensual",time:"09:00",message:"Análisis mensual de ganancias y stock",days:[1]},
  ];

  const addAlarm=data=>{
    setAlarms(a=>[...a,{...data,id:Date.now(),active:true}]);
    setShowAdd(false);setForm({title:"",time:"08:00",days:[],message:""});
  };
  const toggleDay=d=>setForm(f=>({...f,days:f.days.includes(d)?f.days.filter(x=>x!==d):[...f.days,d]}));

  const urgencyColor=d=>d<=7?C.red:d<=15?C.orange:d<=30?C.accent:C.green;
  const urgencyLabel=d=>d===0?"¡HOY!":d===1?"¡MAÑANA!":d<=7?`¡${d} días!`:d<=30?`${d} días`:d<=60?`${d} días`:`${d} días`;

  return(
    <div>
      {triggered.length>0&&(
        <div style={{background:"#065F4622",border:`2px solid ${C.green}`,borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{color:C.green,fontWeight:700,fontSize:15}}>⏰ ¡{triggered.length} Alarma(s) Activada(s)!</div>
            <Btn small onClick={()=>setTriggered([])} color={C.green}>✓ Cerrar</Btn>
          </div>
          {triggered.map((t,i)=><div key={i} style={{color:C.text,fontSize:13,padding:"4px 0"}}>🔔 <b>{t.alarm.title}</b>{t.alarm.message&&` — ${t.alarm.message}`}</div>)}
        </div>
      )}

      {/* Sub tabs */}
      <div style={{display:"flex",gap:4,marginBottom:14,background:C.hi,borderRadius:10,padding:3,flexWrap:"wrap"}}>
        {[{id:"active",label:"🔔 Alarmas"},{id:"expiry",label:"📅 Vencimientos"},{id:"bolivia",label:"🇧🇴 Bolivia"},{id:"add",label:"➕ Nueva"}].map(t=>(
          <button key={t.id} onClick={()=>setAlarmTab(t.id)} style={{flex:1,background:alarmTab===t.id?C.accent:"transparent",color:alarmTab===t.id?"#fff":C.muted,border:"none",borderRadius:8,padding:"7px 4px",cursor:"pointer",fontWeight:alarmTab===t.id?700:400,fontSize:11}}>{t.label}</button>
        ))}
      </div>

      {/* VENCIMIENTOS */}
      {alarmTab==="expiry"&&(
        <div>
          <div style={{color:C.muted,fontSize:12,marginBottom:14}}>📅 Productos con fecha de vencimiento — se crean alarmas automáticas 30 días antes</div>
          {(()=>{
            const withExpiry=products.filter(p=>p.has_expiry&&p.expiry_date).sort((a,b)=>new Date(a.expiry_date)-new Date(b.expiry_date));
            if(!withExpiry.length) return(
              <Card style={{textAlign:"center",padding:30}}>
                <div style={{fontSize:36,marginBottom:8}}>📅</div>
                <div style={{color:C.muted}}>No hay productos con fecha de vencimiento.</div>
                <div style={{color:C.muted,fontSize:12,marginTop:6}}>Ve a Inventario → agregar producto → activa el switch de vencimiento.</div>
              </Card>
            );
            return withExpiry.map(p=>{
              const days=Math.ceil((new Date(p.expiry_date)-now)/(1000*60*60*24));
              const col=days<=0?C.red:days<=7?C.red:days<=30?C.orange:C.green;
              const label=days<=0?"☠️ VENCIDO":days===1?"¡Vence mañana!":days<=7?`🔴 ¡${days} días!`:days<=30?`⏰ ${days} días`:`✅ ${days} días`;
              return(
                <Card key={p.id} style={{marginBottom:10,border:`1px solid ${col}44`}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    {p.image?<img src={p.image} style={{width:46,height:46,borderRadius:8,objectFit:"cover",flexShrink:0}}/>:<span style={{fontSize:28}}>📦</span>}
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
                      <div style={{color:C.muted,fontSize:12}}>{p.category} · Stock: {p.stock} uds</div>
                      <div style={{color:col,fontSize:13,fontWeight:700,marginTop:3}}>📅 Vence: {p.expiry_date}</div>
                    </div>
                    <div style={{textAlign:"center",minWidth:80}}>
                      <div style={{color:col,fontWeight:900,fontSize:18}}>{label}</div>
                      <div style={{color:C.muted,fontSize:10,marginTop:2}}>para vencer</div>
                    </div>
                  </div>
                  {days<=30&&days>0&&(
                    <div style={{marginTop:10,background:col+"11",borderRadius:8,padding:"8px 12px",fontSize:12,color:C.text}}>
                      💡 <b>Consejo:</b> {days<=7?"¡Urgente! Retira o liquida este producto inmediatamente.":days<=15?"Ofrece descuento especial para liquidar antes de que venza.":"Planifica promociones para vender este producto pronto."}
                    </div>
                  )}
                  {days<=0&&(
                    <div style={{marginTop:10,background:C.red+"22",borderRadius:8,padding:"8px 12px",fontSize:12,color:C.red,fontWeight:600}}>
                      ☠️ Este producto ya venció. Retíralo de la venta inmediatamente.
                    </div>
                  )}
                </Card>
              );
            });
          })()}
        </div>
      )}

      {/* FECHAS BOLIVIA */}
      {alarmTab==="bolivia"&&(
        <div>
          <div style={{color:C.muted,fontSize:12,marginBottom:12}}>📅 Próximas fechas importantes de Bolivia — haz clic para agregar alarma recordatorio</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {upcoming.map((ev,i)=>(
              <Card key={i} style={{border:`1px solid ${urgencyColor(ev.daysLeft)}44`,padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:28}}>{ev.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{ev.name}</div>
                    <div style={{color:C.muted,fontSize:11}}>{ev.cat} · {ev.day}/{ev.month}</div>
                    <div style={{color:C.text,fontSize:12,marginTop:4,lineHeight:1.5}}>{ev.tip}</div>
                  </div>
                  <div style={{textAlign:"center",minWidth:80}}>
                    <div style={{color:urgencyColor(ev.daysLeft),fontWeight:900,fontSize:18}}>{urgencyLabel(ev.daysLeft)}</div>
                    <div style={{color:C.muted,fontSize:10}}>para {ev.name}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:6}}>
                      <Btn small onClick={()=>addAlarm({title:`${ev.emoji} 30 días — ${ev.name}`,time:"09:00",days:[],message:ev.tip.slice(0,100)})} color={C.blue}>+30 días</Btn>
                      <Btn small onClick={()=>addAlarm({title:`⚡ 7 días — ${ev.name}`,time:"09:00",days:[],message:`¡Última semana! ${ev.tip.slice(0,80)}`})} color={C.accent}>+7 días</Btn>
                    </div>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      )}

      {/* NUEVA ALARMA */}
      {alarmTab==="add"&&(
        <div>
          <Card style={{marginBottom:14,background:C.hi}}>
            <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>➕ Crear Alarma Personalizada</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <Inp label="Título *" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="ej: Revisar stock urgente"/>
              <Inp label="Hora *" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} type="time"/>
              <Inp label="Mensaje" value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} placeholder="Descripción del recordatorio" style={{minWidth:220}}/>
            </div>
            <div style={{marginTop:12}}>
              <div style={{color:C.muted,fontSize:11,marginBottom:8}}>Días (vacío = todos los días):</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {daysNames.map((d,i)=>(
                  <button key={i} onClick={()=>toggleDay(i)} style={{background:form.days.includes(i)?C.accent:C.card,color:form.days.includes(i)?"#000":C.muted,border:`1px solid ${form.days.includes(i)?C.accent:C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:form.days.includes(i)?700:400,fontSize:13}}>{d}</button>
                ))}
              </div>
            </div>
            <div style={{marginTop:14}}><Btn onClick={()=>addAlarm(form)} color={C.green}>💾 Guardar Alarma</Btn></div>
          </Card>

          <Card>
            <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>💡 Alarmas Sugeridas para tu Negocio</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {basicSuggestions.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:C.hi,borderRadius:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14}}>{s.title}</div>
                    <div style={{color:C.muted,fontSize:12}}>{s.time} · {s.days.length>0?s.days.map(d=>daysNames[d]).join(", "):"Diario"}</div>
                    <div style={{color:C.muted,fontSize:11}}>{s.message}</div>
                  </div>
                  <Btn small onClick={()=>addAlarm(s)} color={C.blue}>+ Agregar</Btn>
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}

      {/* MIS ALARMAS */}
      {alarmTab==="active"&&(
        <Card>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>🔔 Mis Alarmas ({alarms.length})</div>
          {alarms.length===0&&<div style={{color:C.muted,textAlign:"center",padding:30}}>Sin alarmas. Ve a "Fechas Bolivia" o "Nueva" para crear una.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {alarms.map(a=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:a.active?C.hi:C.card,borderRadius:10,border:`1px solid ${a.active?C.border:"transparent"}`,opacity:a.active?1:0.5}}>
                <span style={{fontSize:18}}>{a.active?"🔔":"🔕"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13}}>{a.title}</div>
                  <div style={{color:C.accent,fontWeight:800}}>{a.time} · <span style={{color:C.muted,fontWeight:400,fontSize:11}}>{a.days?.length>0?a.days.map(d=>daysNames[d]).join(", "):"Todos los días"}</span></div>
                  {a.message&&<div style={{color:C.muted,fontSize:11,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.message}</div>}
                </div>
                <Btn small onClick={()=>setAlarms(al=>al.map(x=>x.id===a.id?{...x,active:!x.active}:x))} color={a.active?C.green:C.muted} outline>{a.active?"ON":"OFF"}</Btn>
                <Btn small onClick={()=>setAlarms(al=>al.filter(x=>x.id!==a.id))} color={C.red} outline>🗑️</Btn>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

// ── APP PRINCIPAL ──
function App(){
  const [role,setRole]=useState(null);
  const [storeId,setStoreId]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [stores,setStores]=useLS("inv_stores",DEFAULT_STORES);
  const [online,setOnline]=useState(false);
  const [loading,setLoading]=useState(false);

  // Per-store data
  const [products1,setProducts1]=useLS("inv_products_tienda1",DEMO_P);
  const [products2,setProducts2]=useLS("inv_products_tienda2",[]);
  const [products3,setProducts3]=useLS("inv_products_tienda3",[]);
  const [sales1,setSales1]=useLS("inv_sales_tienda1",[]);
  const [sales2,setSales2]=useLS("inv_sales_tienda2",[]);
  const [sales3,setSales3]=useLS("inv_sales_tienda3",[]);
  const [clients1,setClients1]=useLS("inv_clients_tienda1",DEMO_C);
  const [clients2,setClients2]=useLS("inv_clients_tienda2",[]);
  const [clients3,setClients3]=useLS("inv_clients_tienda3",[]);

  const storeData={
    tienda1:{products:products1,setProducts:setProducts1,salesLog:sales1,setSalesLog:setSales1,clients:clients1,setClients:setClients1},
    tienda2:{products:products2,setProducts:setProducts2,salesLog:sales2,setSalesLog:setSales2,clients:clients2,setClients:setClients2},
    tienda3:{products:products3,setProducts:setProducts3,salesLog:sales3,setSalesLog:setSales3,clients:clients3,setClients:setClients3},
  };

  // Active store data
  const activeStore=storeId==="all"?null:stores.find(s=>s.id===storeId);
  const sd=storeId&&storeId!=="all"?storeData[storeId]:storeData.tienda1;
  const {products,setProducts,salesLog,setSalesLog,clients,setClients}=sd;

  // All-stores combined data (for owner overview)
  const allProducts=[...products1,...products2,...products3];
  const allSales=[...sales1,...sales2,...sales3];

  const low=products.filter(p=>p.stock<p.min_stock);
  const allLow=allProducts.filter(p=>p.stock<p.min_stock);

  if(!role)return <Login onLogin={(r,s)=>{setRole(r);setStoreId(s);setTab("dashboard");}}/>;

  const ownerTabs=[
    {id:"dashboard",label:"Dashboard",icon:"📊",section:"main"},
    {id:"stores",label:"Mis Tiendas",icon:"🏪",section:"main"},
    {id:"inventory",label:"Inventario",icon:"📦",section:"main"},
    {id:"catalog",label:"Catálogo",icon:"📋",section:"main"},
    {id:"sales",label:"Ventas",icon:"🛒",section:"main"},
    {id:"reports",label:"Reportes",icon:"📈",section:"main"},
    {id:"receipts",label:"Recibos",icon:"🧾",section:"main"},
    {id:"debts",label:"Deudas",icon:"💳",section:"gestion"},
    {id:"clients",label:"Clientes",icon:"👥",section:"gestion"},
    {id:"metas",label:"Metas",icon:"🎯",section:"gestion"},
    {id:"caja",label:"Caja Chica",icon:"💰",section:"gestion"},
    {id:"whatsapp",label:"WhatsApp",icon:"💬",section:"gestion"},
    {id:"profits",label:"Gráficas",icon:"📊",section:"analisis"},
    {id:"prices",label:"Compras",icon:"💲",section:"analisis"},
    {id:"activity",label:"Actividad",icon:"📋",section:"analisis"},
    {id:"voz",label:"Voz",icon:"🎤",section:"tools"},
    {id:"foto",label:"Foto",icon:"📷",section:"tools"},
    {id:"ai",label:"ARIA — IA",icon:"🤖",section:"tools"},
    {id:"drive",label:"Google Drive",icon:"☁️",section:"sistema"},
    {id:"notifs",label:"Notificaciones",icon:"🔔",section:"sistema"},
    {id:"backup",label:"Respaldo",icon:"💾",section:"sistema"},
    {id:"settings",label:"Configuración",icon:"⚙️",section:"sistema"},
  ];
  const empTabs=[
    {id:"dashboard",label:"Dashboard",icon:"📊",section:"main"},
    {id:"inventory",label:"Inventario",icon:"📦",section:"main"},
    {id:"catalog",label:"Catálogo",icon:"📋",section:"main"},
    {id:"sales",label:"Ventas",icon:"🛒",section:"main"},
    {id:"voz",label:"Voz",icon:"🎤",section:"tools"},
    {id:"ai",label:"ARIA — IA",icon:"🤖",section:"tools"},
  ];
  const tabs=role==="owner"?ownerTabs:empTabs;
  const sections={main:"Principal",gestion:"Gestión",analisis:"Análisis",tools:"Herramientas",sistema:"Sistema"};
  const tabLabels={dashboard:"Dashboard",stores:"Mis Tiendas",inventory:"Inventario",catalog:"Catálogo",sales:"Ventas",reports:"Reportes",receipts:"Recibos",debts:"Deudas",clients:"Clientes",metas:"Metas",caja:"Caja Chica",whatsapp:"WhatsApp",profits:"Gráficas",prices:"Compras",activity:"Actividad",voz:"Voz",foto:"Foto",ai:"ARIA — IA",drive:"Google Drive",notifs:"Notificaciones",backup:"Respaldo",settings:"Configuración"};
  const tabIcons={dashboard:"📊",stores:"🏪",inventory:"📦",catalog:"📋",sales:"🛒",reports:"📈",receipts:"🧾",debts:"💳",clients:"👥",metas:"🎯",caja:"💰",whatsapp:"💬",profits:"📊",prices:"💲",activity:"📋",voz:"🎤",foto:"📷",ai:"🤖",drive:"☁️",notifs:"🔔",backup:"💾",settings:"⚙️"};

  // Store switcher for owner
  const StoreSwitcher=()=>(
    <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"8px 12px"}}>
      <button onClick={()=>setStoreId("all")}
        style={{flex:1,background:storeId==="all"?"#E91E8C22":"transparent",border:`1px solid ${storeId==="all"?"#E91E8C":"#1f2d45"}`,borderRadius:8,padding:"6px 8px",cursor:"pointer",color:storeId==="all"?"#E91E8C":"#6B7280",fontSize:11,fontWeight:storeId==="all"?700:400,fontFamily:"inherit"}}>
        🏠 Todas
      </button>
      {stores.map(s=>(
        <button key={s.id} onClick={()=>setStoreId(s.id)}
          style={{flex:1,background:storeId===s.id?s.color+"22":"transparent",border:`1px solid ${storeId===s.id?s.color:"#1f2d45"}`,borderRadius:8,padding:"6px 4px",cursor:"pointer",color:storeId===s.id?s.color:"#6B7280",fontSize:11,fontWeight:storeId===s.id?700:400,fontFamily:"inherit"}}>
          {s.icon} {s.name}
        </button>
      ))}
    </div>
  );

  // Multi-store dashboard overview
  const MultiStoreDashboard=()=>{
    const now=new Date();
    const getMonthProfit=sales=>sales.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,x)=>s+(x.profit||0),0);
    const storeStats=stores.map(s=>{
      const sd2=storeData[s.id];
      return{...s,products:sd2.products.length,low:sd2.products.filter(p=>p.stock<p.min_stock).length,profit:getMonthProfit(sd2.salesLog),sales:sd2.salesLog.length,clients:sd2.clients.length};
    });
    const totalProfit=storeStats.reduce((s,x)=>s+x.profit,0);
    const totalLow=storeStats.reduce((s,x)=>s+x.low,0);
    return(
      <div>
        {/* Total summary */}
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
          {[["🏪 Total Tiendas",stores.length,C.blue],["⚠️ Stock Bajo",totalLow,C.red],["💰 Ganancia Mes Total",`Bs. ${totalProfit.toLocaleString()}`,C.green]].map(([l,v,c])=>(
            <Card key={l} style={{flex:1,minWidth:140}}>
              <div style={{color:C.muted,fontSize:12}}>{l}</div>
              <div style={{color:c,fontWeight:800,fontSize:22}}>{v}</div>
            </Card>
          ))}
        </div>
        {/* Per-store cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14,marginBottom:20}}>
          {storeStats.map(s=>(
            <Card key={s.id} style={{border:`2px solid ${s.color}44`,cursor:"pointer"}} onClick={()=>setStoreId(s.id)}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:44,height:44,background:s.color+"22",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{s.icon}</div>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:s.color}}>{s.name}</div>
                  <div style={{color:C.muted,fontSize:11}}>Toca para gestionar →</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[["📦 Productos",s.products,C.blue],["⚠️ Stock Bajo",s.low,s.low>0?C.red:C.green],["💰 Ganancia Mes",`Bs. ${s.profit.toLocaleString()}`,C.green],["👥 Clientes",s.clients,C.purple]].map(([l,v,c])=>(
                  <div key={l} style={{background:C.hi,borderRadius:8,padding:"8px 10px"}}>
                    <div style={{color:C.muted,fontSize:10}}>{l}</div>
                    <div style={{color:c,fontWeight:700,fontSize:14}}>{v}</div>
                  </div>
                ))}
              </div>
            </Card>
          ))}
        </div>
        {/* Alert if any store has low stock */}
        {totalLow>0&&(
          <div style={{background:C.red+"11",border:`1px solid ${C.red}33`,borderRadius:12,padding:"12px 18px"}}>
            <div style={{color:C.red,fontWeight:700,marginBottom:6}}>🚨 Alertas de Stock Bajo</div>
            {storeStats.filter(s=>s.low>0).map(s=>(
              <div key={s.id} style={{color:C.text,fontSize:13,marginBottom:2}}>
                <span style={{color:s.color}}>{s.icon} {s.name}:</span> {s.low} producto(s) bajo mínimo
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // Stores management tab
  const StoresManager=()=>{
    const [editId,setEditId]=useState(null);
    const [tempName,setTempName]=useState("");
    const icons=["🏪","🏬","🛒","🏭","🛍️","🏷️","🎁","🏠","⭐","💼"];
    const colors=["#E91E8C","#3B82F6","#10B981","#F97316","#8B5CF6","#EF4444","#F59E0B","#14B8A6"];
    return(
      <div>
        <Card style={{marginBottom:14,background:C.hi}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:4}}>🏪 Gestionar Mis Tiendas</div>
          <div style={{color:C.muted,fontSize:13,marginBottom:14}}>Personaliza el nombre e ícono de cada tienda. Los datos de inventario son completamente separados.</div>
          {stores.map(s=>(
            <div key={s.id} style={{background:C.card,borderRadius:12,padding:14,marginBottom:10,border:`1px solid ${s.color}33`}}>
              {editId===s.id?(
                <div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                    <input value={tempName} onChange={e=>setTempName(e.target.value)}
                      style={{flex:1,background:C.hi,border:`2px solid ${s.color}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:14,fontWeight:700}}/>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                    {icons.map(ic=>(
                      <button key={ic} onClick={()=>setStores(ss=>ss.map(x=>x.id===s.id?{...x,icon:ic}:x))}
                        style={{background:s.icon===ic?s.color+"33":C.hi,border:`1px solid ${s.icon===ic?s.color:C.border}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:18}}>
                        {ic}
                      </button>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                    {colors.map(col=>(
                      <button key={col} onClick={()=>setStores(ss=>ss.map(x=>x.id===s.id?{...x,color:col}:x))}
                        style={{width:28,height:28,background:col,borderRadius:"50%",border:s.color===col?"3px solid #fff":"2px solid transparent",cursor:"pointer"}}>
                      </button>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <Btn small onClick={()=>{setStores(ss=>ss.map(x=>x.id===s.id?{...x,name:tempName}:x));setEditId(null);}} color={C.green}>💾 Guardar</Btn>
                    <Btn small onClick={()=>setEditId(null)} outline color={C.muted}>Cancelar</Btn>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,background:s.color+"22",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{s.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:16,color:s.color}}>{s.name}</div>
                    <div style={{color:C.muted,fontSize:12}}>{storeData[s.id].products.length} productos · {storeData[s.id].salesLog.length} ventas</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <Btn small onClick={()=>setStoreId(s.id)} color={s.color}>Entrar →</Btn>
                    <Btn small onClick={()=>{setEditId(s.id);setTempName(s.name);}} outline color={C.blue}>✏️</Btn>
                  </div>
                </div>
              )}
            </div>
          ))}
        </Card>
        <Card>
          <div style={{color:C.accent,fontWeight:700,marginBottom:8}}>💡 Cómo funciona</div>
          {[["🏪","Cada tienda tiene su propio inventario, ventas y clientes separados"],["👑","Como Jefe puedes ver todas las tiendas o entrar a una específica"],["📊","El Dashboard general muestra el resumen de todas las tiendas juntas"],["👤","Los empleados solo ven la tienda que seleccionaron al entrar"],].map(([ic,txt],i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<3?`1px solid ${C.border}`:"",fontSize:13}}>
              <span>{ic}</span><span style={{color:C.text}}>{txt}</span>
            </div>
          ))}
        </Card>
      </div>
    );
  };

  const Content=()=>(
    <div>
      {/* Store indicator for owner */}
      {role==="owner"&&storeId!=="all"&&tab!=="stores"&&tab!=="dashboard"&&(
        <div style={{display:"flex",alignItems:"center",gap:10,background:activeStore?.color+"11",border:`1px solid ${activeStore?.color}33`,borderRadius:10,padding:"8px 14px",marginBottom:14}}>
          <span style={{fontSize:20}}>{activeStore?.icon}</span>
          <span style={{color:activeStore?.color,fontWeight:700}}>{activeStore?.name}</span>
          <span style={{color:C.muted,fontSize:12}}>· Viendo datos de esta tienda</span>
          <button onClick={()=>setStoreId("all")} style={{marginLeft:"auto",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Ver todas</button>
        </div>
      )}
      {tab==="dashboard"&&role==="owner"&&storeId==="all"?<MultiStoreDashboard/>:tab==="dashboard"?<Dashboard products={products} salesLog={salesLog} role={role}/>:null}
      {tab==="stores"&&role==="owner"&&<StoresManager/>}
      {tab==="inventory"&&<Inventory products={products} setProducts={setProducts} role={role} online={online} currentStore={storeId||"tienda1"}/>}
      {tab==="catalog"&&<Catalog products={products}/>}
      {tab==="sales"&&<SalesRegister products={products} setProducts={setProducts} salesLog={salesLog} setSalesLog={setSalesLog} clients={clients} setClients={setClients} role={role} online={online}/>}
      {tab==="reports"&&role==="owner"&&<Reports salesLog={salesLog} products={products}/>}
      {tab==="receipts"&&role==="owner"&&<Receipts products={products} salesLog={salesLog}/>}
      {tab==="debts"&&role==="owner"&&<Creditos salesLog={salesLog}/>}
      {tab==="voz"&&<VozVentas products={products} setProducts={setProducts} salesLog={salesLog} setSalesLog={setSalesLog}/>}
      {tab==="foto"&&role==="owner"&&<FotoIA products={products} setProducts={setProducts}/>}
      {tab==="metas"&&role==="owner"&&<MetasVentas salesLog={salesLog} products={products}/>}
      {tab==="caja"&&role==="owner"&&<CajaChica/>}
      {tab==="profits"&&role==="owner"&&<Profits salesLog={salesLog}/>}
      {tab==="prices"&&role==="owner"&&<PurchasePrices products={products}/>}
      {tab==="whatsapp"&&role==="owner"&&<WhatsAppHub products={products} salesLog={salesLog}/>}
      {tab==="clients"&&role==="owner"&&<Clients clients={clients} setClients={setClients} role={role} online={online}/>}
      {tab==="activity"&&role==="owner"&&<ActivityLog/>}

          <div className="app-topbar">
            <span style={{fontSize:20}}>📦</span>
            <span style={{color:C.accent,fontWeight:900,fontSize:16}}>InventarioPRO</span>
            <Badge color={role==="owner"?C.accent:C.blue}>{role==="owner"?"👑 Jefe":"👤 Empleado"}</Badge>
            <Badge color={online?C.green:C.orange}>{online?"☁️ Nube":"💾 Local"}</Badge>
            <div style={{flex:1}}/>
            {/* Current page label (PC) */}
            <span style={{color:C.muted,fontSize:13,display:"none"}} className="pc-page-label">{tabIcons[tab]} {tabLabels[tab]}</span>
            {low.length>0&&<div style={{background:`${C.red}22`,border:`1px solid ${C.red}55`,borderRadius:20,padding:"4px 12px"}}><span style={{color:C.red,fontWeight:700,fontSize:12}}>🔴 {low.length} alertas</span></div>}
            <button onClick={()=>setRole(null)} style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}} className="mobile-only">Salir</button>
          </div>

          {/* Mobile tabs */}
          <div className="app-tabs">
            {tabs.map(t=>(
              <button key={t.id} className={`app-tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div className="app-content">
            {/* PC breadcrumb */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18,color:C.muted,fontSize:13}} className="pc-breadcrumb">
              <span>🏠</span>
              <span>›</span>
              <span style={{color:C.accent,fontWeight:600}}>{tabIcons[tab]} {tabLabels[tab]}</span>
            </div>
            <div className="app-content-inner">
              <Content/>
            </div>
          </div>
        </div>
      </div>

      <style>{`
        @media(max-width:768px){.pc-breadcrumb{display:none!important;}.mobile-only{display:block!important;}}
        @media(min-width:769px){.mobile-only{display:none!important;}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
