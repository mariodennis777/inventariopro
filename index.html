function getDaysUntil(month,day){
 const now=new Date();
 let target=new Date(now.getFullYear(),month-1,day);
 if(target<=now)target=new Date(now.getFullYear()+1,month-1,day);
 return Math.ceil((target-now)/(1000*60*60*24));
}
function getUpcoming(maxDays=90){
 return BOLIVIA_DATES.map(e=>({...e,daysLeft:getDaysUntil(e.month,e.day)}))
 .filter(e=>e.daysLeft<=maxDays).sort((a,b)=>a.daysLeft-b.daysLeft);
}
function useLS(key,init){
 const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
 useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
 return [v,setV];
}

function Dashboard({products,salesLog,role}){

 if(!p.has_expiry||!p.expiry_date)return false;

 return days<=30&&days>=0;

 p.category?.toLowerCase().includes(search.toLowerCase())||

 const save=async()=>{
 if(!form.name.trim())return;
 const data={...form,stock:+form.stock,min_stock:+form.min_stock,price:+form.price,cost_price:+form.cost_price,image:newImage||null,has_expiry:form.has_expiry,expiry_date:form.has_expiry?form.expiry_date:""};

 if(online)await sb.from("products").update(data).eq("id",editId);
 setProducts(ps=>ps.map(p=>p.id===editId?{...p,...data}:p));
 setEditId(null);
 }else{
 if(online){const{data:ins}=await sb.from("products").insert([{...data,sales:0}]).select().single();if(ins)setProducts(ps=>[...ps,ins]);}
 else setProducts(ps=>[...ps,{...data,id:Date.now(),sales:0}]);
 setShowAdd(false);
 }
 setForm(empty);setNewImage(null);
 };
 const del=async(id)=>{
 if(!window.confirm("¿Eliminar este producto?"))return;
 if(online)await sb.from("products").delete().eq("id",id);
 setProducts(ps=>ps.filter(p=>p.id!==id));
 };
 const updStock=async(id,delta)=>{
 const p=products.find(x=>x.id===id);
 const ns=Math.max(0,p.stock+delta);
 if(online)await sb.from("products").update({stock:ns}).eq("id",id);
 setProducts(ps=>ps.map(x=>x.id===id?{...x,stock:ns}:x));
 };
 const uploadImg=(id,e)=>{
 const file=e.target.files[0];if(!file)return;
 const r=new FileReader();
 r.onload=async ev=>{
 const img=ev.target.result;
 if(online)await sb.from("products").update({image:img}).eq("id",id);
 setProducts(ps=>ps.map(p=>p.id===id?{...p,image:img}:p));
 };
 r.readAsDataURL(file);
 };
 const uploadNewImg=e=>{
 const file=e.target.files[0];if(!file)return;
 const r=new FileReader();
 r.onload=ev=>setNewImage(ev.target.result);
 r.readAsDataURL(file);
 };
 const handleBarcodeScan=e=>{
 const val=e.target.value;
 setForm(v=>({...v,barcode:val}));
 if(val.length>=8){
 const existing=products.find(p=>p.barcode===val);
 if(existing){
 setMsg(`✅ Encontrado: ${existing.name}`);
 setEditId(existing.id);
 setForm({name:existing.name,category:existing.category||"",stock:existing.stock,min_stock:existing.min_stock,price:existing.price,cost_price:existing.cost_price,supplier_name:existing.supplier_name||"",supplier_phone:existing.supplier_phone||"",barcode:val,has_expiry:existing.has_expiry||false,expiry_date:existing.expiry_date||""});
 setShowAdd(false);setBarcodeMode(false);
 }
 }
 };
 const Switch=({value,onChange,label,color=C.green})=>(
 <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>onChange(!value)}>
 <div style={{width:42,height:24,background:value?color:C.border,borderRadius:12,position:"relative",transition:"all .25s",flexShrink:0}}>
 <div style={{position:"absolute",top:3,left:value?20:3,width:18,height:18,background:"#fff",borderRadius:"50%",transition:"all .25s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>
 </div>
 <span style={{color:value?color:C.muted,fontSize:13,fontWeight:value?600:400}}>{label}</span>
 </div>
 );
 const [aiDescLoading,setAiDescLoading]=useState(false);
 const [aiSuggest,setAiSuggest]=useState(null);
 const generateAIDesc=async()=>{
 if(!form.name.trim()){setMsg("❌ Escribe primero el nombre del producto");return;}
 setAiDescLoading(true);setAiSuggest(null);
 const businessContext=products.slice(0,10).map(p=>`${p.name}(${p.category||"?"},Bs.${p.price})`).join(",");
 try{
 const res=await fetch("https://api.anthropic.com/v1/messages",{
 method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
 model:"claude-sonnet-4-20250514",max_tokens:600,
 messages:[{role:"user",content:`Eres asistente de un negocio boliviano. El dueño está agregando este producto al inventario:
Nombre: "${form.name}"
Categoría: "${form.category||"no especificada"}"
Precio venta: Bs. ${form.price||"no definido"}
Otros productos del negocio: ${businessContext}
Genera en JSON:
{
 "descripcion": "descripción atractiva de 1-2 líneas para el catálogo, sin mencionar precio ni fecha de vencimiento",
 "categoria_sugerida": "categoría si no está definida",
 "precio_sugerido": número en bolivianos si el precio parece bajo o alto para Bolivia,
 "precio_ok": true/false,
 "min_stock_sugerido": número,
 "tags": ["etiqueta1","etiqueta2"],
 "consejo": "un consejo corto de venta o marketing para este producto específico en Bolivia"
}
Responde SOLO el JSON.`}]
 })
 });
 const data=await res.json();
 const text=data.content?.[0]?.text||"{}";
 const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
 setAiSuggest(parsed);
 }catch{
 setAiSuggest({
 descripcion:`${form.name} de alta calidad${form.category?` para ${form.category}`:""}. Producto disponible en stock.`,
 categoria_sugerida:form.category||"General",
 precio_ok:true,
 min_stock_sugerido:5,
 consejo:"Coloca este producto en un lugar visible y ofrece descuento por volumen para aumentar ventas."
 });
 }
 setAiDescLoading(false);
 };
 const applyAISuggest=()=>{
 if(!aiSuggest)return;
 setForm(f=>({
 ...f,
 description:aiSuggest.descripcion||f.description,
 category:(!f.category&&aiSuggest.categoria_sugerida)?aiSuggest.categoria_sugerida:f.category,
 min_stock:(!f.min_stock&&aiSuggest.min_stock_sugerido)?aiSuggest.min_stock_sugerido:f.min_stock,
 price:(!f.price&&aiSuggest.precio_sugerido)?aiSuggest.precio_sugerido:f.price,
 }));
 setAiSuggest(null);
 };

 <Card style={{marginBottom:14}}>
 <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
 <div style={{color:C.accent,fontWeight:700,flex:1}}>📊 Gráficas del Negocio</div>
 {/* Chart type */}
 <div style={{display:"flex",background:C.hi,borderRadius:8,padding:2,gap:2}}>
 {[{v:"bar",l:"📊"},{v:"line",l:"📈"},{v:"area",l:"🌊"}].map(({v,l})=>(
 <button key={v} onClick={()=>setChartType(v)} style={{background:chartType===v?C.accent:"transparent",color:chartType===v?"#fff":C.muted,border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>{l}</button>
 ))}
 </div>
 {/* Metric */}
 <div style={{display:"flex",background:C.hi,borderRadius:8,padding:2,gap:2}}>
 {[{v:"profit",l:"💰"},{v:"sales",l:"🛒"},{v:"transactions",l:"🔢"}].map(({v,l})=>(
 <button key={v} onClick={()=>setMetric(v)} style={{background:metric===v?metricColor[v]:"transparent",color:metric===v?"#fff":C.muted,border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>{l}</button>
 ))}
 </div>
 </div>
 {/* Monthly chart */}
 <div style={{color:C.muted,fontSize:12,marginBottom:8,fontWeight:600}}>📅 {metricLabel[metric]} — Mensual {now.getFullYear()}</div>
 {chartType==="bar"&&(
 <div>
 <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100,paddingBottom:4}}>
 {byMonth.map((m,i)=>{
 const h=Math.max(4,(m[metric]/maxVal)*90);
 const isCur=i===now.getMonth();
 return(
 <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
 <div style={{fontSize:8,color:isCur?metricColor[metric]:C.muted,fontWeight:isCur?700:400,textAlign:"center"}}>
 {m[metric]>0?(metric==="transactions"?m[metric]:`${Math.round(m[metric]/1000)}k`||""):""}
 </div>
 <div style={{width:"100%",height:h,background:isCur?metricColor[metric]:metricColor[metric]+"66",borderRadius:"3px 3px 0 0",transition:"height .5s"}}/>
 </div>
 );
 })}
 </div>
 <div style={{display:"flex",gap:3}}>
 {byMonth.map((m,i)=>(
 <div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:i===now.getMonth()?metricColor[metric]:C.muted,fontWeight:i===now.getMonth()?700:400}}>{m.month}</div>
 ))}
 </div>
 </div>
 )}
 {(chartType==="line"||chartType==="area")&&(
 <div>
 <ChartSVG data={byMonth} metric={metric} color={metricColor[metric]}/>
 <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
 {byMonth.filter((_,i)=>i%3===0||i===11).map((m,i)=>(
 <span key={i} style={{fontSize:9,color:C.muted}}>{m.month}</span>
 ))}
 </div>
 </div>
 )}
 </Card>
 {/* Weekly chart */}
 <Card style={{marginBottom:14}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:10}}>📅 Últimas 8 Semanas</div>
 <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,paddingBottom:4}}>
 {byWeek.map((w,i)=>{
 const maxW=Math.max(...byWeek.map(x=>x[metric]),1);
 const h=Math.max(4,(w[metric]/maxW)*70);
 const isLast=i===byWeek.length-1;
 return(
 <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
 <div style={{fontSize:8,color:isLast?metricColor[metric]:C.muted}}>{w[metric]>0?(metric==="transactions"?w[metric]:`${Math.round(w[metric])}`):"" }</div>
 <div style={{width:"100%",height:h,background:isLast?metricColor[metric]:metricColor[metric]+"55",borderRadius:"3px 3px 0 0"}}/>
 </div>
 );
 })}
 </div>
 <div style={{display:"flex",gap:4}}>
 {byWeek.map((w,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:C.muted}}>{w.label}</div>)}
 </div>
 </Card>
 {/* Top products chart */}
 {topProds.length>0&&(
 <Card style={{marginBottom:14}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>🏆 Top Productos — Ganancia Total</div>
 {topProds.map((p,i)=>{
 const maxPr=topProds[0].profit||1;
 const pct=Math.round((p.profit/maxPr)*100);
 return(
 <div key={i} style={{marginBottom:10}}>
 <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
 <div style={{display:"flex",gap:6,alignItems:"center"}}>
 <span style={{color:accentColors[i],fontWeight:800,fontSize:13}}>#{i+1}</span>
 <span style={{color:C.text,fontSize:13,fontWeight:600}}>{p.name}</span>
 </div>
 <div style={{textAlign:"right"}}>
 <div style={{color:C.green,fontWeight:700,fontSize:13}}>Bs. {p.profit.toFixed(0)}</div>
 <div style={{color:C.muted,fontSize:10}}>{p.qty} uds · Bs. {p.sales.toFixed(0)}</div>
 </div>
 </div>
 <div style={{height:6,background:C.border,borderRadius:3}}>
 <div style={{width:`${pct}%`,height:"100%",background:accentColors[i],borderRadius:3,transition:"width .8s"}}/>
 </div>
 </div>
 );
 })}
 </Card>
 )}
 {/* Monthly detail table */}
 <Card>
 <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>📋 Detalle Mensual {now.getFullYear()}</div>
 <div style={{overflowX:"auto"}}>
 <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
 <thead><tr>{["Mes","Ventas","Ganancia","Trans.","Margen"].map(h=><th key={h} style={{color:C.muted,padding:"6px 8px",textAlign:"right",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
 <tbody>
 {byMonth.map((m,i)=>{
 const margin=m.sales>0?Math.round((m.profit/m.sales)*100):0;
 const isCur=i===now.getMonth();
 return(
 <tr key={i} style={{background:isCur?C.accent+"11":"",borderBottom:`1px solid ${C.border}22`}}>
 <td style={{padding:"7px 8px",color:isCur?C.accent:C.text,fontWeight:isCur?700:400}}>{m.month}{isCur?" ✦":""}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:C.blue}}>Bs. {m.sales.toLocaleString()}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:m.profit>0?C.green:C.muted,fontWeight:700}}>Bs. {m.profit.toLocaleString()}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:C.muted}}>{m.transactions}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:margin>=30?C.green:margin>=15?C.accent:C.red}}>{margin}%</td>
 </tr>
 );
 })}
 <tr style={{borderTop:`2px solid ${C.border}`,fontWeight:700}}>
 <td style={{padding:"7px 8px",color:C.accent}}>TOTAL</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:C.blue}}>Bs. {yearS.toLocaleString()}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:C.green}}>Bs. {yearP.toLocaleString()}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:C.muted}}>{byMonth.reduce((s,m)=>s+m.transactions,0)}</td>
 <td style={{padding:"7px 8px",textAlign:"right",color:C.accent}}>{yearS>0?Math.round((yearP/yearS)*100):0}%</td>
 </tr>
 </tbody>
 </table>
 </div>
 </Card>
 </div>
 );
}
const POINTS_RATE = 15; 
const MIN_REDEEM = 100; 
function Clients({clients,setClients,role,online}){
 const [showAdd,setShowAdd]=useState(false);
 const [showDetail,setShowDetail]=useState(null);
 const [redeemId,setRedeemId]=useState(null);
 const [redeemQty,setRedeemQty]=useState("100");
 const [search,setSearch]=useState("");
 const [redeemMsg,setRedeemMsg]=useState("");
 const [negocioName]=useLS("inv_negocio_name","Mi Negocio");
 const [negocioPhone]=useLS("inv_negocio_phone","");
 const [form,setForm]=useState({name:"",phone:"",total:"",orders:"",last_order:"",birthday:"",points:0,points_history:[]});
 const f=k=>e=>setForm(v=>({...v,[k]:e.target.value}));
 const now=new Date();
 const todayMMDD=`${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
 const isBirthday=c=>{if(!c.birthday)return false;return c.birthday.slice(5)===todayMMDD;};
 const birthdayToday=clients.filter(isBirthday);
 const calcPoints=total=>Math.floor((+total)/POINTS_RATE);
 const add=async()=>{
 if(!form.name.trim())return;
 const pts=calcPoints(form.total);
 const entry={...form,total:+form.total,orders:+form.orders,points:pts,points_used:0,
 points_history:pts>0?[{date:new Date().toISOString().split("T")[0],action:"Registro inicial",pts_earned:pts,balance:pts}]:[]};
 if(online){const{data}=await sb.from("clients").insert([entry]).select().single();if(data)setClients(c=>[...c,data]);}
 else setClients(c=>[...c,{...entry,id:Date.now()}]);
 setForm({name:"",phone:"",total:"",orders:"",last_order:"",birthday:"",points:0,points_history:[]});setShowAdd(false);
 };
 const del=async(id)=>{if(!window.confirm("¿Eliminar?"))return;if(online)await sb.from("clients").delete().eq("id",id);setClients(c=>c.filter(x=>x.id!==id));};
 const addPoints=(id,amount)=>{
 const earned=calcPoints(amount);if(earned<=0)return;
 setClients(cs=>cs.map(c=>{
 if(c.id!==id)return c;
 const nb=(c.points||0)+earned;
 return{...c,total:(+c.total||0)+(+amount),orders:(c.orders||0)+1,last_order:now.toISOString().split("T")[0],points:nb,
 points_history:[...(c.points_history||[]),{date:now.toISOString().split("T")[0],action:`Compra Bs. ${amount}`,pts_earned:earned,balance:nb}]};
 }));
 };
 const redeemPoints=(id)=>{
 const qty=+redeemQty;
 const client=clients.find(c=>c.id===id);if(!client)return;
 if(qty<MIN_REDEEM){setRedeemMsg(`❌ Mínimo ${MIN_REDEEM} puntos para canjear`);return;}
 if(qty>(client.points||0)){setRedeemMsg(`❌ Solo tiene ${client.points||0} puntos`);return;}
 setClients(cs=>cs.map(c=>{
 if(c.id!==id)return c;
 const nb=(c.points||0)-qty;
 return{...c,points:nb,points_used:(c.points_used||0)+qty,
 points_history:[...(c.points_history||[]),{date:now.toISOString().split("T")[0],action:`Canje ${qty} pts = Bs. ${qty} desc.`,pts_earned:-qty,balance:nb}]};
 }));
 setRedeemMsg(`✅ Canjeados ${qty} pts = Bs. ${qty} de descuento`);
 setTimeout(()=>{setRedeemMsg("");setRedeemId(null);setRedeemQty("100");},3000);
 };
 const sendBirthdayWA=(c)=>{
 const msg=`🎂 ¡Feliz Cumpleaños ${c.name}! 🎉\n\n`+
 `De parte de todo el equipo de *${negocioName}* te deseamos un día lleno de alegría. 🎁\n\n`+
 `🎀 Como regalo especial tienes un *15% de descuento* en tu próxima compra hoy. ¡Solo por hoy!\n`+
 ((c.points||0)>=MIN_REDEEM?`⭐ Además tienes *${c.points} puntos* = *Bs. ${c.points} de descuento* disponibles.\n\n`:"")+
 `¡Te esperamos! 😊\n_${negocioName}_${negocioPhone?" · 📞 "+negocioPhone:""}`;
 const phone=(c.phone||"").replace(/\D/g,"");
 window.open((phone?`https://wa.me/${phone}`:"https://wa.me")+"?text="+encodeURIComponent(msg),"_blank");
 };
 const sendPointsWA=(c)=>{
 const canR=(c.points||0)>=MIN_REDEEM;
 const msg=`¡Hola ${c.name}! 👋\n\n`+
 `Tienes *${c.points||0} puntos* acumulados en *${negocioName}* = *Bs. ${c.points||0} de descuento*.\n`+
 (canR?`✅ ¡Ya puedes canjearlos! Mínimo ${MIN_REDEEM} puntos.\n`:`⏳ Te faltan ${MIN_REDEEM-(c.points||0)} pts para canjear.\n`)+
 `\n🛍️ ¡Te esperamos en ${negocioName}!${negocioPhone?"\n📞 "+negocioPhone:""}`;
 const phone=(c.phone||"").replace(/\D/g,"");
 window.open((phone?`https://wa.me/${phone}`:"https://wa.me")+"?text="+encodeURIComponent(msg),"_blank");
 };
 const getLevelInfo=pts=>{
 if(pts>=500)return{name:"💎 Diamante",color:"#06B6D4",next:null,needed:0};
 if(pts>=200)return{name:"🥇 Oro",color:"#F59E0B",next:"Diamante",needed:500-pts};
 if(pts>=50) return{name:"🥈 Plata",color:"#9CA3AF",next:"Oro",needed:200-pts};
 return{name:"🥉 Bronce",color:"#CD7C2F",next:"Plata",needed:50-pts};
 };
 const filtered=[...clients].filter(c=>c.name?.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>(b.points||0)-(a.points||0));
 const totalPoints=clients.reduce((s,c)=>s+(c.points||0),0);
 const totalRedeemed=clients.reduce((s,c)=>s+(c.points_used||0),0);
 const canRedeemCount=clients.filter(c=>(c.points||0)>=MIN_REDEEM).length;
 return(
 <div>
 {/* Birthday alert */}
 {birthdayToday.length>0&&(
 <div style={{background:"#7C3AED22",border:"1px solid #7C3AED66",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",gap:12,alignItems:"flex-start"}}>
 <span style={{fontSize:26}}>🎂</span>
 <div style={{flex:1}}>
 <div style={{color:"#7C3AED",fontWeight:700,marginBottom:6}}>¡Cumpleaños hoy! ({birthdayToday.length})</div>
 {birthdayToday.map(c=>(
 <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
 <span style={{color:C.text,fontSize:13}}>🎉 <b>{c.name}</b> · ⭐{c.points||0} pts</span>
 {c.phone&&<Btn small onClick={()=>sendBirthdayWA(c)} color="#7C3AED">📱 Felicitar WA</Btn>}
 </div>
 ))}
 </div>
 </div>
 )}
 {/* Stats */}
 <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
 {[["👥 Clientes",clients.length,C.blue],["⭐ Puntos activos",totalPoints,C.accent],["🎁 Canjeados",totalRedeemed,C.green],["🔓 Pueden canjear",canRedeemCount,C.purple]].map(([l,v,c])=>(
 <Card key={l} style={{flex:1,minWidth:110}}><div style={{color:C.muted,fontSize:11}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div></Card>
 ))}
 </div>
 {/* Rules */}
 <Card style={{marginBottom:14,background:C.accent+"11",border:`1px solid ${C.accent}44`}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:6}}>⭐ Sistema de Puntos</div>
 <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:13}}>
 <span>💰 Bs. {POINTS_RATE} = <b>1 punto</b></span>
 <span>🎁 1 punto = <b>Bs. 1</b> descuento</span>
 <span>🔒 Mínimo <b>{MIN_REDEEM} pts</b> para canjear</span>
 <span>🎂 Cumpleaños = <b>15% descuento especial</b></span>
 </div>
 <div style={{color:C.muted,fontSize:11,marginTop:4}}>💡 El cliente puede acumular más de {MIN_REDEEM} puntos para obtener mayor descuento antes de canjear.</div>
 </Card>
 {/* Search + Add */}
 <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}>
 <input placeholder="🔍 Buscar cliente..." value={search} onChange={e=>setSearch(e.target.value)}
 style={{flex:1,background:C.hi,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",color:C.text,fontSize:14}}/>
 {role==="owner"&&<Btn small onClick={()=>setShowAdd(s=>!s)}>+ Cliente</Btn>}
 </div>
 {/* Add form */}
 {showAdd&&(
 <Card style={{marginBottom:14,background:C.hi}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:14,fontSize:15}}>➕ Nuevo Cliente</div>
 <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
 {/* Columna izquierda */}
 <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
 <Inp label="👤 Nombre completo *" value={form.name} onChange={f("name")} placeholder="ej: Juan Mamani"/>
 <div>
 <div style={{color:C.muted,fontSize:11,marginBottom:4}}>📞 Número de Celular</div>
 <div style={{display:"flex",gap:6}}>
 <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.muted,fontSize:13,flexShrink:0}}>+591</div>
 <input value={(form.phone||"").replace("+591","")} onChange={e=>setForm(v=>({...v,phone:"+591"+e.target.value.replace(/\D/g,"").slice(0,8)}))}
 placeholder="77712345" maxLength={8}
 style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}/>
 </div>
 <div style={{color:C.muted,fontSize:10,marginTop:3}}>Para enviar mensajes por WhatsApp</div>
 </div>
 <div>
 <div style={{color:C.muted,fontSize:11,marginBottom:4}}>🎂 Fecha de Nacimiento</div>
 <input type="date" value={form.birthday} onChange={f("birthday")}
 style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,boxSizing:"border-box"}}/>
 <div style={{color:C.muted,fontSize:10,marginTop:3}}>Para enviar descuento especial de cumpleaños</div>
 </div>
 </div>
 {/* Columna derecha */}
 <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
 <Inp label="💰 Total Bs. comprado (historial)" value={form.total} onChange={f("total")} type="number"/>
 <Inp label="🛒 Órdenes anteriores" value={form.orders} onChange={f("orders")} type="number"/>
 <Inp label="📅 Última compra" value={form.last_order} onChange={f("last_order")} type="date"/>
 {form.total&&(
 <div style={{background:C.accent+"11",border:`1px solid ${C.accent}33`,borderRadius:10,padding:"10px 12px"}}>
 <div style={{color:C.accent,fontSize:13,fontWeight:700}}>
 ⭐ Recibirá {calcPoints(form.total)} puntos iniciales
 </div>
 <div style={{color:C.muted,fontSize:11,marginTop:3}}>
 {calcPoints(form.total)>=MIN_REDEEM?"✅ Ya puede canjear desde el inicio":`Necesita ${MIN_REDEEM-calcPoints(form.total)} pts más para canjear`}
 </div>
 <div style={{color:C.muted,fontSize:11,marginTop:2}}>
 = Bs. {calcPoints(form.total)} de descuento disponible
 </div>
 </div>
 )}
 </div>
 </div>
 <div style={{display:"flex",gap:8,marginTop:14}}>
 <Btn onClick={add} color={C.green}>💾 Guardar Cliente</Btn>
 <Btn onClick={()=>setShowAdd(false)} outline color={C.muted}>Cancelar</Btn>
 </div>
 </Card>
 )}
 {/* Client cards */}
 <div style={{display:"flex",flexDirection:"column",gap:10}}>
 {filtered.map((c,i)=>{
 const level=getLevelInfo(c.points||0);
 const pct=Math.min(100,Math.round(((c.points||0)/500)*100));
 const isDetail=showDetail===c.id;
 const birthday=isBirthday(c);
 const canRedeem=(c.points||0)>=MIN_REDEEM;
 return(
 <Card key={c.id} style={{border:`1px solid ${birthday?"#7C3AED":canRedeem?C.green:level.color}33`}}>
 <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
 <div style={{width:36,height:36,borderRadius:"50%",background:level.color+"33",display:"flex",alignItems:"center",justifyContent:"center",color:level.color,fontWeight:800,fontSize:12,flexShrink:0}}>#{i+1}</div>
 <div style={{flex:1,minWidth:150}}>
 <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
 <span style={{fontWeight:700,fontSize:14}}>{c.name}</span>
 {birthday&&<Badge color="#7C3AED">🎂 ¡Hoy!</Badge>}
 <Badge color={level.color}>{level.name}</Badge>
 {canRedeem&&<Badge color={C.green}>🔓 Puede canjear</Badge>}
 </div>
 <div style={{color:C.muted,fontSize:11}}>{c.orders||0} compras · {c.last_order||"—"}{c.phone&&` · 📞 ${c.phone}`}</div>
 {c.birthday&&<div style={{color:"#7C3AED",fontSize:11,marginTop:1}}>🎂 {new Date(c.birthday+"T12:00").toLocaleDateString("es-ES",{day:"numeric",month:"long"})}</div>}
 {/* Points bar */}
 <div style={{marginTop:6}}>
 <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
 <span style={{color:canRedeem?C.green:level.color,fontWeight:700,fontSize:12}}>
 ⭐ {c.points||0} pts {canRedeem?`= Bs. ${c.points} disponible`:`(faltan ${MIN_REDEEM-(c.points||0)} para canjear)`}
 </span>
 </div>
 <div style={{height:6,background:C.border,borderRadius:3,position:"relative"}}>
 <div style={{width:`${pct}%`,height:"100%",background:canRedeem?C.green:level.color,borderRadius:3}}/>
 <div style={{position:"absolute",top:-2,left:`${(MIN_REDEEM/500)*100}%`,width:2,height:10,background:C.green,borderRadius:1}}/>
 </div>
 <div style={{display:"flex",justifyContent:"space-between",marginTop:1,fontSize:9,color:C.muted}}>
 <span>0</span><span style={{color:C.green}}>🔓{MIN_REDEEM}</span><span>500💎</span>
 </div>
 </div>
 </div>
 <div style={{textAlign:"right",minWidth:75}}>
 <div style={{color:C.green,fontWeight:800,fontSize:14}}>Bs. {(+c.total||0).toLocaleString()}</div>
 <div style={{color:C.muted,fontSize:10}}>total gastado</div>
 </div>
 <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
 <Btn small onClick={()=>setShowDetail(isDetail?null:c.id)} color={C.blue} outline>📋</Btn>
 {role==="owner"&&<Btn small onClick={()=>setRedeemId(redeemId===c.id?null:c.id)} color={canRedeem?C.green:C.muted} outline={!canRedeem}>🎁</Btn>}
 {c.phone&&<Btn small onClick={()=>birthday?sendBirthdayWA(c):sendPointsWA(c)} color={birthday?"#7C3AED":C.green} outline>{birthday?"🎂":"📱"}</Btn>}
 {role==="owner"&&<Btn small onClick={()=>del(c.id)} color={C.red} outline>🗑️</Btn>}
 </div>
 </div>
 {/* Redeem panel */}
 {redeemId===c.id&&(

function MetasVentas({salesLog,products}){
 const [metas,setMetas]=useLS("inv_metas",{mensual:0,semanal:0,diaria:0});
 const [editing,setEditing]=useState(false);
 const [tempMetas,setTempMetas]=useState(metas);
 const now=new Date();
 const hoy=now.toISOString().split("T")[0];
 const startWeek=new Date(now);
 startWeek.setDate(now.getDate()-now.getDay());
 const ventasDia=salesLog.filter(s=>s.sale_date===hoy).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 const ventasSemana=salesLog.filter(s=>{const d=new Date(s.sale_date);return d>=startWeek&&d<=now;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 const ventasMes=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 const gananciaMes=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,x)=>s+(x.profit||0),0);
 const pct=(actual,meta)=>meta>0?Math.min(100,Math.round((actual/meta)*100)):0;
 const statusColor=p=>p>=100?C.green:p>=70?C.accent:p>=40?C.orange:C.red;
 const statusLabel=p=>p>=100?"🏆 ¡Meta lograda!":p>=70?"💪 Muy bien":p>=40?"📈 En camino":"⚡ Necesita impulso";
 const ProgressBar=({label,actual,meta,color})=>{
 const p=pct(actual,meta);
 return(
 <Card style={{marginBottom:12}}>
 <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
 <div style={{fontWeight:700,fontSize:15}}>{label}</div>
 <div style={{textAlign:"right"}}>
 <div style={{color:color||statusColor(p),fontWeight:800,fontSize:18}}>Bs. {actual.toLocaleString()}</div>
 <div style={{color:C.muted,fontSize:11}}>meta: ${meta.toLocaleString()}</div>
 </div>
 </div>
 {/* Progress bar */}
 <div style={{height:14,background:C.border,borderRadius:7,marginBottom:8,overflow:"hidden"}}>
 <div style={{width:`${p}%`,height:"100%",background:statusColor(p),borderRadius:7,transition:"width 1s ease",position:"relative"}}>
 {p>15&&<span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,fontWeight:700,color:"#fff"}}>{p}%</span>}
 </div>
 </div>
 <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
 <span style={{color:statusColor(p),fontSize:12,fontWeight:600}}>{statusLabel(p)}</span>
 {meta>0&&actual<meta&&<span style={{color:C.muted,fontSize:11}}>Faltan: ${(meta-actual).toLocaleString()}</span>}
 </div>
 </Card>
 );
 };
 const save=()=>{setMetas(tempMetas);setEditing(false);};
 const topThisMonth=[...products].sort((a,b)=>{
 const av=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&s.product_id===a.id;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 const bv=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&s.product_id===b.id;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 return bv-av;
 }).slice(0,3);
 return(
 <div>
 {/* Edit metas */}
 <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
 <div style={{color:C.accent,fontWeight:700,fontSize:16}}>🎯 Metas de Ventas</div>
 <Btn small onClick={()=>{setTempMetas(metas);setEditing(s=>!s);}} color={editing?C.muted:C.blue} outline={editing}>{editing?"Cancelar":"✏️ Editar Metas"}</Btn>
 </div>
 {editing&&(
 <Card style={{marginBottom:16,background:C.hi}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>✏️ Configura tus Metas</div>
 <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
 <Inp label="Meta Diaria Bs." value={tempMetas.diaria} onChange={e=>setTempMetas(m=>({...m,diaria:+e.target.value}))} type="number"/>
 <Inp label="Meta Semanal Bs." value={tempMetas.semanal} onChange={e=>setTempMetas(m=>({...m,semanal:+e.target.value}))} type="number"/>
 <Inp label="Meta Mensual Bs." value={tempMetas.mensual} onChange={e=>setTempMetas(m=>({...m,mensual:+e.target.value}))} type="number"/>
 </div>
 <div style={{marginTop:12}}><Btn onClick={save} color={C.green}>💾 Guardar Metas</Btn></div>
 </Card>
 )}
 {/* Progress bars */}
 <ProgressBar label="📅 Ventas de Hoy" actual={ventasDia} meta={metas.diaria}/>
 <ProgressBar label="📆 Ventas de la Semana" actual={ventasSemana} meta={metas.semanal}/>
 <ProgressBar label="🗓️ Ventas del Mes" actual={ventasMes} meta={metas.mensual}/>
 {/* Ganancia del mes */}
 <Card style={{marginBottom:12,background:C.green+"11",border:`1px solid ${C.green}44`}}>
 <div style={{color:C.muted,fontSize:12}}>💰 Ganancia neta este mes</div>
 <div style={{color:C.green,fontWeight:800,fontSize:28}}>Bs. {gananciaMes.toLocaleString()}</div>
 <div style={{color:C.muted,fontSize:11,marginTop:4}}>Después de descontar costos de productos</div>
 </Card>
 {/* Motivational message */}
 {metas.mensual>0&&(
 <Card style={{background:C.accent+"11",border:`1px solid ${C.accent}44`,marginBottom:12}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:6}}>🤖 Consejo ARIA</div>
 <div style={{color:C.text,fontSize:13,lineHeight:1.6}}>
 {pct(ventasMes,metas.mensual)>=100
 ? `¡Felicidades! 🏆 Superaste tu meta mensual de Bs. ${metas.mensual.toLocaleString()}. Considera aumentarla para el próximo mes.`
 : pct(ventasMes,metas.mensual)>=70
 ? `¡Vas muy bien! Te faltan Bs. ${(metas.mensual-ventasMes).toLocaleString()} para tu meta mensual. ¡Sigue así!`
 : `Para alcanzar tu meta mensual de Bs. ${metas.mensual.toLocaleString()}, necesitas vender Bs. ${Math.round((metas.mensual-ventasMes)/(30-now.getDate()+1)).toLocaleString()} por día los días restantes del mes.`
 }
 </div>
 </Card>
 )}
 {/* Top products this month */}
 <Card>
 <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>⭐ Top Productos este Mes</div>
 {topThisMonth.length===0
 ?<div style={{color:C.muted,textAlign:"center",padding:20}}>Sin ventas registradas este mes.</div>
 :topThisMonth.map((p,i)=>{
 const venta=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&s.product_id===p.id;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 return(
 <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:i<2?`1px solid ${C.border}`:""}}>
 <span style={{color:C.accent,fontWeight:800,width:24}}>#{i+1}</span>
 {p.image&&<img src={p.image} style={{width:32,height:32,borderRadius:6,objectFit:"cover"}}/>}
 <span style={{flex:1,fontWeight:600}}>{p.name}</span>
 <Badge color={C.green}>Bs. {venta.toLocaleString()}</Badge>
 </div>
 );
 })
 }
 </Card>
 </div>
 );
}
function Creditos({salesLog}){
 const [debts,setDebts]=useLS("inv_debts",[]);
 const [form,setForm]=useState({client:"",concept:"",amount:"",date:new Date().toISOString().split("T")[0],due_date:"",notes:""});
 const [showAdd,setShowAdd]=useState(false);
 const [filter,setFilter]=useState("pending");
 const f=k=>e=>setForm(v=>({...v,[k]:e.target.value}));
 const add=()=>{
 if(!form.client||!form.amount)return;
 setDebts(d=>[...d,{...form,id:Date.now(),amount:+form.amount,paid:false,paid_date:"",paid_amount:0}]);
 setForm({client:"",concept:"",amount:"",date:new Date().toISOString().split("T")[0],due_date:"",notes:""});
 setShowAdd(false);
 };
 const markPaid=(id,partial=false)=>{
 if(partial){
 const amt=prompt("¿Cuánto pagó? (Bs.)");
 if(!amt||isNaN(+amt))return;
 setDebts(d=>d.map(x=>x.id===id?{...x,paid_amount:(x.paid_amount||0)+(+amt),paid:(x.paid_amount||0)+(+amt)>=x.amount,paid_date:new Date().toISOString().split("T")[0]}:x));
 }else{
 setDebts(d=>d.map(x=>x.id===id?{...x,paid:true,paid_amount:x.amount,paid_date:new Date().toISOString().split("T")[0]}:x));
 }
 };
 const openWA=(debt)=>{
 const msg=encodeURIComponent(`Hola ${debt.client}, te recuerdo que tienes una deuda pendiente de Bs. ${debt.amount} por concepto de "${debt.concept}". ${debt.due_date?`Fecha límite: ${debt.due_date}.`:""} Por favor comunícate para coordinar el pago. Gracias 🙏`);
 window.open(`https://wa.me/?text=${msg}`,"_blank");
 };
 const now=new Date();
 const filtered=debts.filter(d=>filter==="all"||filter==="pending"?!d.paid:d.paid);
 const totalPending=debts.filter(d=>!d.paid).reduce((s,d)=>s+(d.amount-(d.paid_amount||0)),0);
 const totalCollected=debts.filter(d=>d.paid).reduce((s,d)=>s+d.amount,0);
 const overdue=debts.filter(d=>!d.paid&&d.due_date&&new Date(d.due_date)<now);
 return(
 <div>
 {/* Summary */}
 <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
 {[["💸 Por Cobrar",`Bs. ${totalPending.toLocaleString()}`,C.red],["✅ Cobrado",`Bs. ${totalCollected.toLocaleString()}`,C.green],["⚠️ Vencidas",overdue.length,C.orange]].map(([l,v,c])=>(
 <Card key={l} style={{flex:1,minWidth:120}}><div style={{color:C.muted,fontSize:12}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div></Card>
 ))}
 </div>
 {overdue.length>0&&(
 <div style={{background:C.orange+"22",border:`1px solid ${C.orange}55`,borderRadius:12,padding:"10px 16px",marginBottom:14}}>
 <div style={{color:C.orange,fontWeight:700,marginBottom:4}}>⚠️ Deudas vencidas — {overdue.length}</div>
 {overdue.map(d=><div key={d.id} style={{color:C.text,fontSize:13}}>• <b>{d.client}</b>: Bs. {d.amount-(d.paid_amount||0)} (venció {d.due_date})</div>)}
 </div>
 )}
 <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
 <div style={{display:"flex",background:C.hi,borderRadius:10,padding:3,gap:3}}>
 {[{v:"pending",l:"⏳ Pendientes"},{v:"paid",l:"✅ Cobradas"},{v:"all",l:"Todas"}].map(({v,l})=>(
 <button key={v} onClick={()=>setFilter(v)} style={{background:filter===v?C.accent:"transparent",color:filter===v?"#fff":C.muted,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:filter===v?700:400,fontSize:12}}>{l}</button>
 ))}
 </div>
 <div style={{flex:1}}/>
 <Btn small onClick={()=>setShowAdd(s=>!s)}>+ Agregar Deuda</Btn>
 </div>
 {showAdd&&(
 <Card style={{marginBottom:14,background:C.hi}}>
 <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>➕ Nueva Deuda por Cobrar</div>
 <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
 <Inp label="Cliente *" value={form.client} onChange={f("client")} placeholder="Nombre del cliente"/>
 <Inp label="Concepto *" value={form.concept} onChange={f("concept")} placeholder="ej: Mercadería fiada"/>
 <Inp label="Monto Bs. *" value={form.amount} onChange={f("amount")} type="number"/>
 <Inp label="Fecha" value={form.date} onChange={f("date")} type="date"/>
 <Inp label="Fecha límite pago" value={form.due_date} onChange={f("due_date")} type="date"/>
 <Inp label="Notas" value={form.notes} onChange={f("notes")} placeholder="opcional" style={{minWidth:200}}/>
 </div>
 <div style={{display:"flex",gap:8,marginTop:12}}>
 <Btn onClick={add} color={C.green}>💾 Guardar</Btn>
 <Btn onClick={()=>setShowAdd(false)} outline color={C.muted}>Cancelar</Btn>
 </div>
 </Card>
 )}
 <div style={{display:"flex",flexDirection:"column",gap:10}}>
 {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:30}}>No hay deudas en esta sección.</div>}
 {filtered.map(d=>{
 const pending=d.amount-(d.paid_amount||0);
 const pct=Math.round(((d.paid_amount||0)/d.amount)*100);
 const isOverdue=d.due_date&&!d.paid&&new Date(d.due_date)<now;
 return(
 <Card key={d.id} style={{border:`1px solid ${d.paid?C.green:isOverdue?C.orange:C.border}44`}}>
 <div style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>
 <div style={{flex:1,minWidth:160}}>
 <div style={{fontWeight:700,fontSize:15}}>{d.client}</div>
 <div style={{color:C.muted,fontSize:12}}>{d.concept}</div>
 <div style={{color:C.muted,fontSize:11,marginTop:2}}>📅 {d.date}{d.due_date&&<span style={{color:isOverdue?C.orange:C.muted}}> · Límite: {d.due_date}</span>}</div>
 {d.notes&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>📝 {d.notes}</div>}
 {(d.paid_amount||0)>0&&d.amount>0&&(
 <div style={{marginTop:6}}>
 <div style={{height:5,background:C.border,borderRadius:3}}>
 <div style={{width:`${pct}%`,height:"100%",background:d.paid?C.green:C.accent,borderRadius:3}}/>
 </div>
 <div style={{color:C.muted,fontSize:10,marginTop:2}}>Pagado: Bs. {d.paid_amount||0} de Bs. {d.amount} ({pct}%)</div>
 </div>
 )}
 </div>
 <div style={{textAlign:"right"}}>
 <div style={{color:d.paid?C.green:C.red,fontWeight:900,fontSize:18}}>Bs. {pending.toLocaleString()}</div>
 <div style={{color:C.muted,fontSize:11}}>Total: Bs. {d.amount}</div>
 {d.paid&&<Badge color={C.green}>✅ COBRADO</Badge>}
 {isOverdue&&!d.paid&&<Badge color={C.orange}>⚠️ VENCIDA</Badge>}
 </div>
 </div>
 {!d.paid&&(
 <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
 <Btn small onClick={()=>markPaid(d.id)} color={C.green}>✅ Cobrado total</Btn>
 <Btn small onClick={()=>markPaid(d.id,true)} color={C.blue} outline>💰 Cobro parcial</Btn>
 <Btn small onClick={()=>openWA(d)} color={C.green} outline>📱 WhatsApp</Btn>
 <Btn small onClick={()=>setDebts(ds=>ds.filter(x=>x.id!==d.id))} color={C.red} outline>🗑️</Btn>
 </div>
 )}
 {d.paid&&(
 <div style={{display:"flex",gap:6,marginTop:10}}>
 <div style={{color:C.muted,fontSize:12}}>✅ Cobrado el {d.paid_date}</div>
 <Btn small onClick={()=>setDebts(ds=>ds.filter(x=>x.id!==d.id))} color={C.red} outline>🗑️</Btn>
 </div>
 )}
 </Card>
 );
 })}
 </div>
 </div>
 );
}

function GoogleDriveSync({products,setProducts,clients,setClients,salesLog,setSalesLog}){
 const [driveStatus,setDriveStatus]=useLS("inv_drive_status",{connected:false,email:"",lastSync:""});
 const [loading,setLoading]=useState(false);
 const [msg,setMsg]=useState("");
 const [msgColor,setMsgColor]=useState(C.green);
 const CLIENT_ID="YOUR_GOOGLE_CLIENT_ID"; 
 const API_KEY="YOUR_GOOGLE_API_KEY";
 const FOLDER_NAME="InventarioPRO";
 const FILE_NAME="inventariopro_data.json";
 const showMsg=(text,color=C.green)=>{setMsg(text);setMsgColor(color);setTimeout(()=>setMsg(""),4000);};
 const loadGAPI=()=>new Promise((resolve,reject)=>{
 if(window.gapi){resolve();return;}
 const s=document.createElement("script");
 s.src="https://apis.google.com/js/api.js";
 s.onload=()=>{
 window.gapi.load("client:auth2",async()=>{
 try{
 await window.gapi.client.init({apiKey:API_KEY,clientId:CLIENT_ID,scope:"https://www.googleapis.com/auth/drive.file",discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
 resolve();
 }catch(e){reject(e);}
 });
 };
 s.onerror=reject;
 document.body.appendChild(s);
 });
 const connectDrive=async()=>{
 setLoading(true);
 try{
 await loadGAPI();
 const auth=window.gapi.auth2.getAuthInstance();
 const user=await auth.signIn();
 const email=user.getBasicProfile().getEmail();
 setDriveStatus({connected:true,email,lastSync:""});
 showMsg(`✅ Conectado como ${email}`);
 }catch(e){
 showMsg("❌ Error al conectar. Verifica tu conexión.",""+C.red);
 }
 setLoading(false);
 };
 const disconnectDrive=()=>{
 try{window.gapi?.auth2?.getAuthInstance()?.signOut();}catch{}
 setDriveStatus({connected:false,email:"",lastSync:""});
 showMsg("✅ Desconectado de Google Drive");
 };
 const manualBackupDrive=()=>{
 const data={version:"InventarioPRO_v2",fecha:new Date().toISOString(),products,clients,salesLog};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;a.download=`InventarioPRO_${new Date().toISOString().slice(0,10)}.json`;
 a.click();URL.revokeObjectURL(url);
 setDriveStatus(s=>({...s,lastSync:new Date().toLocaleString("es-ES")}));
 showMsg("✅ Archivo descargado — súbelo manualmente a tu Google Drive");
 };
 const restoreFromFile=(e)=>{
 const file=e.target.files[0];if(!file)return;
 const reader=new FileReader();
 reader.onload=ev=>{
 try{
 const data=JSON.parse(ev.target.result);
 if(!data.products)throw new Error();
 if(!window.confirm(`¿Restaurar backup del ${data.fecha?new Date(data.fecha).toLocaleString("es-ES"):"?"}?\n\nProductos: ${data.products?.length}\nVentas: ${data.salesLog?.length}\n\n⚠️ Reemplazará todos los datos actuales.`))return;
 setProducts(data.products||[]);
 setClients(data.clients||[]);
 setSalesLog(data.salesLog||[]);
 showMsg("✅ Datos restaurados correctamente");
 }catch{showMsg("❌ Archivo inválido",""+C.red);}
 };
 reader.readAsText(file);e.target.value="";
 };
 const fileRef=useRef();
 return(
 <div>

function PushNotifications({products,salesLog,clients}){
 const [permission,setPermission]=useState(Notification?.permission||"default");
 const [notifSettings,setNotifSettings]=useLS("inv_notif_settings",{
 stock_low:true, expiry:true, birthday:true,
 daily_summary:true, daily_time:"08:00",
 weekly_summary:true,
 });
 const [msg,setMsg]=useState("");
 const [testLoading,setTestLoading]=useState(false);
 const ns=k=>e=>setNotifSettings(s=>({...s,[k]:typeof e==="boolean"?e:e.target.type==="checkbox"?e.target.checked:e.target.value}));
 const requestPermission=async()=>{
 if(!("Notification" in window)){setMsg("❌ Tu navegador no soporta notificaciones");return;}
 const result=await Notification.requestPermission();
 setPermission(result);
 if(result==="granted")setMsg("✅ ¡Notificaciones activadas!");
 else setMsg("❌ Permiso denegado. Actívalo en configuración del navegador.");
 };
 const sendNotif=(title,body,icon="📦")=>{
 if(permission!=="granted")return false;
 try{new Notification(title,{body,icon:"https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f4e6.png"});return true;}
 catch{return false;}
 };
 const testNotif=()=>{
 setTestLoading(true);
 const sent=sendNotif("🧪 InventarioPRO — Prueba","¡Las notificaciones funcionan correctamente! ✅");
 setTimeout(()=>{
 setMsg(sent?"✅ Notificación enviada — revisa tu barra de notificaciones":"❌ Activa los permisos primero");
 setTestLoading(false);
 },500);
 };
 const checkAndNotify=useRef(null);
 useEffect(()=>{
 if(permission!=="granted")return;
 const check=()=>{
 const now=new Date();
 const today=now.toISOString().split("T")[0];
 const todayMMDD=`${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
 const lastKey="inv_last_notif_check";
 const last=localStorage.getItem(lastKey)||"";
 if(last===today)return; 
 if(notifSettings.stock_low){
 const low=products.filter(p=>p.stock<p.min_stock);
 if(low.length>0)sendNotif(`🚨 Stock Bajo — ${low.length} producto(s)`,low.slice(0,3).map(p=>`${p.name}: ${p.stock}/${p.min_stock}`).join(", "));
 }
 if(notifSettings.expiry){
 const exp=products.filter(p=>{if(!p.has_expiry||!p.expiry_date)return false;const d=Math.ceil((new Date(p.expiry_date)-now)/(1000*60*60*24));return d<=7&&d>=0;});
 if(exp.length>0)sendNotif(`⏰ Productos por vencer — ${exp.length}`,exp.map(p=>`${p.name}: ${p.expiry_date}`).join(", "));
 }
 if(notifSettings.birthday){
 const bdays=clients.filter(c=>{if(!c.birthday)return false;return c.birthday.slice(5)===todayMMDD;});
 if(bdays.length>0)sendNotif(`🎂 Cumpleaños hoy!`,bdays.map(c=>c.name).join(", ")+" cumplen años hoy");
 }
 if(notifSettings.daily_summary){
 const todaySales=salesLog.filter(s=>s.sale_date===today);
 const profit=todaySales.reduce((s,x)=>s+(x.profit||0),0);
 if(todaySales.length>0)sendNotif(`📊 Resumen del día`,`${todaySales.length} ventas · Ganancia: Bs. ${profit.toFixed(2)}`);
 }
 localStorage.setItem(lastKey,today);
 };
 check();
 checkAndNotify.current=setInterval(check,1000*60*60); 
 return()=>clearInterval(checkAndNotify.current);
 },[permission,notifSettings,products,salesLog,clients]);

function Backup({products,setProducts,clients,setClients,salesLog,setSalesLog}){
 const [msg,setMsg]=useState("");
 const [msgColor,setMsgColor]=useState(C.green);
 const [backups,setBackups]=useLS("inv_backups",[]);
 const [showRestore,setShowRestore]=useState(false);
 const [restoreIdx,setRestoreIdx]=useState(null);
 const showMsg=(text,color=C.green)=>{setMsg(text);setMsgColor(color);setTimeout(()=>setMsg(""),4000);};
 const exportJSON=()=>{
 const data={
 version:"InventarioPRO_v2",
 fecha:new Date().toISOString(),
 negocio:"Mi Negocio",
 products,clients,salesLog,
 stats:{
 totalProductos:products.length,
 totalClientes:clients.length,
 totalVentas:salesLog.length,
 gananciaTotal:salesLog.reduce((s,x)=>s+(x.profit||0),0).toFixed(2)
 }
 };
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;
 a.download=`InventarioPRO_backup_${new Date().toISOString().slice(0,10)}.json`;
 a.click();
 URL.revokeObjectURL(url);
 showMsg("✅ Copia descargada en tu dispositivo");
 };
 const saveLocal=()=>{
 const backup={
 id:Date.now(),
 fecha:new Date().toLocaleString("es-ES"),
 fechaISO:new Date().toISOString(),
 products:[...products],
 clients:[...clients],
 salesLog:[...salesLog],
 stats:{
 productos:products.length,
 clientes:clients.length,
 ventas:salesLog.length,
 ganancia:salesLog.reduce((s,x)=>s+(x.profit||0),0).toFixed(2)
 }
 };
 setBackups(bs=>[backup,...bs].slice(0,10)); 
 showMsg("✅ Copia de seguridad guardada localmente");
 };
 const restoreLocal=(backup)=>{
 if(!window.confirm(`¿Restaurar copia del ${backup.fecha}?\n\nEsto reemplazará todos los datos actuales.`))return;
 setProducts(backup.products||[]);
 setClients(backup.clients||[]);
 setSalesLog(backup.salesLog||[]);
 setShowRestore(false);setRestoreIdx(null);
 showMsg("✅ Datos restaurados correctamente");
 };
 const importJSON=(e)=>{
 const file=e.target.files[0];if(!file)return;
 const reader=new FileReader();
 reader.onload=ev=>{
 try{
 const data=JSON.parse(ev.target.result);
 if(!data.products)throw new Error("Archivo inválido");
 if(!window.confirm(`¿Importar backup del ${data.fecha?new Date(data.fecha).toLocaleString("es-ES"):"fecha desconocida"}?\n\nProductos: ${data.products?.length||0}\nVentas: ${data.salesLog?.length||0}\n\nEsto reemplazará todos los datos actuales.`))return;
 setProducts(data.products||[]);
 setClients(data.clients||[]);
 setSalesLog(data.salesLog||[]);
 showMsg("✅ Datos importados correctamente desde archivo");
 }catch{
 showMsg("❌ Error: el archivo no es válido",""+C.red);
 }
 };
 reader.readAsText(file);
 e.target.value="";
 };

const IA = {
 analizar(products, salesLog) {
 const now = new Date();
 const low = products.filter(p => p.stock < p.min_stock);
 const sinStock = products.filter(p => p.stock === 0);
 const top = [...products].sort((a,b) => b.sales - a.sales);
 const monthSales = salesLog.filter(s => { const d=new Date(s.sale_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
 const yearSales = salesLog.filter(s => new Date(s.sale_date).getFullYear()===now.getFullYear());
 const monthProfit = monthSales.reduce((s,x)=>s+(x.profit||0),0);
 const yearProfit = yearSales.reduce((s,x)=>s+(x.profit||0),0);
 const totalInv = products.reduce((s,p)=>s+p.stock*(p.cost_price||0),0);
 const avgMargin = products.length ? Math.round(products.reduce((s,p)=>s+(p.price&&p.cost_price?((p.price-p.cost_price)/p.price)*100:0),0)/products.length) : 0;
 return { low, sinStock, top, monthSales, yearSales, monthProfit, yearProfit, totalInv, avgMargin, now };
 },
 responder(q, products, salesLog) {
 const t = q.toLowerCase();
 const d = this.analizar(products, salesLog);
 const upcoming = getUpcoming(30);
 if (t.includes("reponer")||t.includes("stock bajo")||t.includes("urgente")||t.includes("comprar")) {
 if (!d.low.length) return "✅ ¡Todo el stock está en orden! No necesitas reponer nada por ahora.";
 let r=`🚨 Tienes ${d.low.length} producto(s) con stock bajo:\n\n`;
 d.low.forEach(p=>{r+=`📦 *${p.name}*\n Stock: ${p.stock} / Mínimo: ${p.min_stock}\n Reponer: ${p.min_stock-p.stock+5} uds\n`;if(p.supplier_name)r+=` 🏭 ${p.supplier_name}\n`;if(p.supplier_phone)r+=` 📞 ${p.supplier_phone}\n`;r+="\n";});
 r+="💡 Pide el doble del mínimo para tener colchón.";
 return r;
 }
 if (t.includes("ganancia")||t.includes("gané")||t.includes("gane")||t.includes("cuánto")||t.includes("cuanto")) {
 return `💰 *Ganancias:*\n\n📅 Este mes: Bs. ${d.monthProfit.toLocaleString()}\n📆 Este año: Bs. ${d.yearProfit.toLocaleString()}\n💼 Capital invertido: Bs. ${d.totalInv.toLocaleString()}\n📊 Margen promedio: ${d.avgMargin}%\n\n${d.monthProfit>0?"📈 ¡Vas bien! Sigue registrando tus ventas.":"💡 Registra tus ventas diarias para ver tus ganancias."}`;
 }
 if (t.includes("venta")||t.includes("vendí")||t.includes("vendido")) {
 const total=d.monthSales.reduce((s,x)=>s+(x.sale_price*x.quantity),0);
 return `🛒 *Ventas este mes:*\n\n💵 Total: Bs. ${total.toLocaleString()}\n📋 Transacciones: ${d.monthSales.length}\n💰 Ganancia: Bs. ${d.monthProfit.toLocaleString()}\n\n⭐ Top productos:\n${d.top.slice(0,3).map((p,i)=>`${i+1}. ${p.name} — ${p.sales} vendidos`).join("\n")}`;
 }
 if (t.includes("rentable")||t.includes("mejor producto")||t.includes("más vende")) {
 const cm=products.map(p=>({...p,margen:p.price&&p.cost_price?((p.price-p.cost_price)/p.price)*100:0})).sort((a,b)=>b.margen-a.margen);
 return `🏆 *Más rentables:*\n\n${cm.slice(0,5).map((p,i)=>`${i+1}. ${p.name}\n Margen: ${Math.round(p.margen)}% | Precio: Bs. {p.price} | Ventas: ${p.sales}`).join("\n\n")}\n\n💡 Promociona los de mayor margen.`;
 }
 if (t.includes("precio")||t.includes("subir")||t.includes("bajar")) {
 const bm=products.filter(p=>p.price&&p.cost_price&&((p.price-p.cost_price)/p.price)*100<20);
 if(bm.length>0) return `💲 *Precios con margen bajo (<20%):*\n\n${bm.map(p=>`• ${p.name}: ${Math.round(((p.price-p.cost_price)/p.price)*100)}%\n Actual: Bs. {p.price} | Sugerido: Bs. {Math.round(p.cost_price*1.35)}`).join("\n\n")}\n\n💡 Considera subir estos precios un 10-15%.`;
 return `✅ Tus precios están bien. Margen promedio: ${d.avgMargin}%\n\n${d.avgMargin>40?"🟢 Excelente margen. Puedes ofrecer descuentos.":d.avgMargin>25?"🟡 Buen margen. Cuida los descuentos.":"🔴 Margen bajo. Revisa costos."}`;
 }
 if (t.includes("fecha")||t.includes("feriado")||t.includes("bolivia")||t.includes("próximo")||t.includes("proximo")) {
 if(!upcoming.length) return "📅 No hay fechas importantes en los próximos 30 días.";
 let r=`🇧🇴 *Próximas fechas de Bolivia:*\n\n`;
 upcoming.slice(0,3).forEach(ev=>{r+=`${ev.emoji} *${ev.name}* — en ${ev.daysLeft} días\n${ev.tip}\n\n`;});
 return r;
 }
 if (t.includes("inventario")||t.includes("productos")||t.includes("cuántos")||t.includes("cuantos")) {
 return `📦 *Inventario:*\n\n✅ Total: ${products.length} productos\n⚠️ Stock bajo: ${d.low.length}\n❌ Agotados: ${d.sinStock.length}\n💰 Valor: Bs. ${d.totalInv.toLocaleString()}\n\n${d.sinStock.length>0?`🚨 Sin stock: ${d.sinStock.map(p=>p.name).join(", ")}`:"✅ Ningún producto agotado"}`;
 }
 if (t.includes("idea")||t.includes("mejorar")||t.includes("estrategia")||t.includes("consejo")) {

 return `💡 *Ideas para tu negocio:*\n\n${ideas.slice(0,4).map(i=>`${i.emoji} *${i.titulo}* [${i.impacto}]\n${i.desc}\n▶ ${i.accion}`).join("\n\n")}`;
 }
 if (t.includes("hola")||t.includes("buenos")||t.includes("buenas")) {
 return `¡Hola! 👋 Soy ARIA, tu asistente offline.\n\nPuedo ayudarte con:\n📦 Stock · 💰 Ganancias · 💡 Ideas\n🇧🇴 Fechas Bolivia · 📊 Diagnóstico · 💲 Precios\n\n¿Qué necesitas?`;
 }
 if (t.includes("diagnóstico")||t.includes("diagnostico")||t.includes("salud")||t.includes("cómo estoy")) {
 return this.textoDiagnostico(products,salesLog);
 }
 return `🤖 Resumen rápido:\n\n📦 Productos: ${products.length} | ⚠️ Stock bajo: ${d.low.length}\n💰 Ganancia mes: Bs. ${d.monthProfit.toLocaleString()}\n📈 Ganancia año: Bs. ${d.yearProfit.toLocaleString()}\n\n${d.low.length>0?`🚨 Reponer: ${d.low.map(p=>p.name).join(", ")}`:"✅ Stock en orden"}\n\nPregúntame: stock, ganancias, ventas, precios, ideas, fechas, diagnóstico.`;
 },
 generarIdeas(products, salesLog) {
 const d=this.analizar(products,salesLog);
 const upcoming=getUpcoming(30);
 const ideas=[];
 if(d.low.length>0) ideas.push({emoji:"🚨",titulo:"Reponer Stock Urgente",desc:`${d.low.length} productos bajo el mínimo. Cada día sin stock es ventas perdidas.`,impacto:"Alto",accion:`Contacta a ${d.low[0]?.supplier_name||"tu proveedor"} hoy mismo. Tel: ${d.low[0]?.supplier_phone||"—"}`});

 useEffect(()=>{
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){setSupported(false);return;}
 const r=new SR();r.lang="es-ES";r.continuous=false;r.interimResults=true;
 r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join("");setTranscript(t);};

 },[]);
 const speak=txt=>{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt.replace(/[*_]/g,""));u.lang="es-ES";u.rate=1.05;window.speechSynthesis.speak(u);};
 const interpretar=texto=>{
 const t=texto.toLowerCase();
 const numW={"un":1,"una":1,"uno":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7,"ocho":8,"nueve":9,"diez":10};
 let qty=1;const nm=t.match(/\d+/);if(nm)qty=parseInt(nm[0]);else Object.entries(numW).forEach(([w,n])=>{if(t.includes(w))qty=n;});

 };
