function Catalog({products}){
  const [type,setType]=useState("retail");
  const [search,setSearch]=useState("");
  const [catFilter,setCatFilter]=useState("all");
  const [negocioName,setNegocioName]=useLS("inv_negocio_name","Mi Negocio");
  const [editingName,setEditingName]=useState(false);
  const [tempName,setTempName]=useState(negocioName);

  const cats=["all",...new Set(products.map(p=>p.category).filter(Boolean)).values()].sort();
  const filtered=products
    .filter(p=>p.name.toLowerCase().includes(search.toLowerCase())&&(catFilter==="all"||p.category===catFilter))
    .sort((a,b)=>{
      // Sort by category first, then by name
      const catA=(a.category||"").toLowerCase();
      const catB=(b.category||"").toLowerCase();
      if(catA!==catB)return catA.localeCompare(catB);
      return a.name.localeCompare(b.name);
    });

  const isW=type==="wholesale";
  const pf=isW?"wholesale_price":"price";
  const ac=isW?C.blue:C.accent;
  const acHex=isW?"#3B82F6":"#E91E8C";

  const genPDF=()=>{
    const date=new Date().toLocaleDateString("es-ES",{year:"numeric",month:"long",day:"numeric"});

    // Group by category for PDF
    const groups={};
    filtered.forEach(p=>{
      const cat=p.category||"Sin Categoría";
      if(!groups[cat])groups[cat]=[];
      groups[cat].push(p);
    });

    // Sort categories alphabetically
    const sortedCats=Object.keys(groups).sort();

    // Build rows grouped by category
    const groupedRows=sortedCats.map(cat=>{
      const catRows=groups[cat].map(p=>`
        <tr style="border-bottom:1px solid #f3f4f6;">
          <td style="padding:10px 12px;vertical-align:middle;width:56px;">
            ${p.image
              ?`<img src="${p.image}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid #e5e7eb;"/>`
              :`<div style="width:48px;height:48px;background:#f9fafb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid #e5e7eb;">📦</div>`}
          </td>
          <td style="padding:10px 12px;vertical-align:middle;">
            <div style="font-weight:700;font-size:14px;color:#111827;">${p.name}</div>
            ${p.description?`<div style="font-size:12px;color:#6b7280;margin-top:2px;">${p.description}</div>`:""}
          </td>
          <td style="padding:10px 12px;vertical-align:middle;text-align:center;color:#6b7280;font-size:13px;">
            ${p.stock>0?`<span style="color:#059669;font-weight:600;">✓ Disponible</span>`:`<span style="color:#dc2626;font-weight:600;">✗ Agotado</span>`}
          </td>
          <td style="padding:10px 12px;vertical-align:middle;text-align:right;">
            <div style="font-size:18px;font-weight:800;color:${acHex};">Bs. ${(p[pf]||p.price||0).toLocaleString()}</div>
            ${isW&&p.price?`<div style="font-size:11px;color:#9ca3af;text-decoration:line-through;">Bs. ${p.price.toLocaleString()}</div>`:""}
          </td>
        </tr>`).join("");

      return `
        <tr>
          <td colspan="4" style="padding:16px 12px 8px;background:#f9fafb;border-top:2px solid ${acHex}33;">
            <div style="font-weight:800;font-size:15px;color:${acHex};text-transform:uppercase;letter-spacing:1px;">
              📁 ${cat} <span style="font-size:12px;font-weight:400;color:#9ca3af;">(${groups[cat].length} producto${groups[cat].length!==1?"s":""})</span>
            </div>
          </td>
        </tr>
        ${catRows}`;
    }).join("");

    const html=`<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
<meta name="app-version" content="20260524_020033"/>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
  <title>${isW?"Catálogo Mayorista":"Catálogo Minorista"} — ${negocioName}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;color:#111827;}
    @media print{
      @page{margin:12mm 15mm;}
      body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .no-break{page-break-inside:avoid;}
    }
  </style>
</head>
<body>
<div style="max-width:820px;margin:0 auto;padding:24px 20px;">

  
  <div style="background:linear-gradient(135deg,${acHex} 0%,${acHex}bb 100%);border-radius:16px;padding:28px 32px;margin-bottom:24px;color:white;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:30px;font-weight:900;letter-spacing:-1px;">📦 ${negocioName}</div>
        <div style="font-size:17px;opacity:0.9;margin-top:4px;">${isW?"Catálogo Mayorista — Precios Especiales":"Catálogo de Productos"}</div>
      </div>
      <div style="text-align:right;opacity:0.85;">
        <div style="font-size:13px;">📅 ${date}</div>
        <div style="font-size:13px;margin-top:3px;">📦 ${filtered.length} producto${filtered.length!==1?"s":""}</div>
        <div style="font-size:13px;margin-top:3px;">📁 ${sortedCats.length} categoría${sortedCats.length!==1?"s":""}</div>
        ${catFilter!=="all"?`<div style="margin-top:6px;background:rgba(255,255,255,0.25);border-radius:6px;padding:3px 10px;font-size:12px;">Categoría: ${catFilter}</div>`:""}
      </div>
    </div>
  </div>

  
  <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
    <thead>
      <tr style="background:${acHex};color:white;">
        <th style="padding:12px;text-align:left;font-size:13px;width:70px;">Foto</th>
        <th style="padding:12px;text-align:left;font-size:13px;">Producto y Descripción</th>
        <th style="padding:12px;text-align:center;font-size:13px;width:100px;">Disponibilidad</th>
        <th style="padding:12px;text-align:right;font-size:13px;width:130px;">${isW?"Precio Mayorista":"Precio"}</th>
      </tr>
    </thead>
    <tbody>
      ${groupedRows}
    </tbody>
  </table>

  
  <div style="margin-top:24px;padding:16px 20px;background:#f9fafb;border-radius:12px;border:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <div style="font-size:13px;color:#6b7280;">📞 Contáctanos para realizar tu pedido</div>
    ${isW?`<div style="font-size:12px;color:#9ca3af;">Los precios mayoristas aplican con pedidos acordados</div>`:""}
    <div style="font-size:11px;color:#d1d5db;">Generado con InventarioPRO · ${date}</div>
  </div>

</div>
<script>window.onload=()=>{window.print();setTimeout(()=>window.close(),1200);}<\/script>
</body>
</html>`;

    const w=window.open("","_blank");
    if(w){w.document.write(html);w.document.close();}
    else alert("Permite ventanas emergentes para generar el PDF.");
  };

  return(
    <div>
      <Card style={{marginBottom:16}}>
        {/* Nombre del negocio editable */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          {editingName?(
            <div style={{display:"flex",gap:8,flex:1,alignItems:"center"}}>
              <input value={tempName} onChange={e=>setTempName(e.target.value)}
                style={{flex:1,background:C.hi,border:`2px solid ${C.accent}`,borderRadius:8,padding:"6px 10px",color:C.text,fontSize:14,fontWeight:700}}/>
              <Btn small onClick={()=>{setNegocioName(tempName);setEditingName(false);}} color={C.green}>✓</Btn>
              <Btn small onClick={()=>{setTempName(negocioName);setEditingName(false);}} outline color={C.muted}>✕</Btn>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
              <span style={{color:C.text,fontWeight:700,fontSize:15}}>🏪 {negocioName}</span>
              <button onClick={()=>setEditingName(true)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>✏️ editar</button>
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          {/* Tipo minorista/mayorista */}
          <div style={{display:"flex",background:C.hi,borderRadius:10,padding:3,gap:3}}>
            {[{v:"retail",l:"🏪 Minorista"},{v:"wholesale",l:"🏭 Mayorista"}].map(({v,l})=>(
              <button key={v} onClick={()=>setType(v)} style={{background:type===v?ac:"transparent",color:type===v?"#fff":C.muted,border:"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontWeight:type===v?700:400,fontSize:13}}>{l}</button>
            ))}
          </div>

          {/* Búsqueda */}
          <input placeholder="🔍 Buscar producto..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{flex:1,minWidth:150,background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13}}/>

          {/* Filtro categoría - con opción "Todo el inventario" */}
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
            style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,minWidth:160}}>
            <option value="all">📦 Todo el inventario</option>
            {cats.filter(c=>c!=="all").map(c=><option key={c} value={c}>📁 {c}</option>)}
          </select>

          {/* Descargar PDF */}
          <Btn onClick={genPDF} color={ac}>📄 Descargar PDF</Btn>
        </div>

        <div style={{marginTop:10,display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{color:C.muted,fontSize:12}}>{isW?"💼 Precios mayoristas":"🏪 Precios minoristas"}</span>
          <span style={{color:C.muted,fontSize:12}}>·</span>
          <span style={{color:C.muted,fontSize:12}}>{filtered.length} producto{filtered.length!==1?"s":""}</span>
          <span style={{color:C.muted,fontSize:12}}>·</span>
          <span style={{color:C.muted,fontSize:12}}>Ordenado por categoría A→Z</span>
          {catFilter==="all"&&<Badge color={C.green}>📦 Todo el inventario</Badge>}
        </div>
      </Card>

      {/* Vista previa agrupada por categoría */}
      {(()=>{
        const groups={};
        filtered.forEach(p=>{
          const cat=p.category||"Sin Categoría";
          if(!groups[cat])groups[cat]=[];
          groups[cat].push(p);
        });
        const sortedCats=Object.keys(groups).sort();
        return sortedCats.map(cat=>(
          <div key={cat} style={{marginBottom:20}}>
            {/* Category header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,paddingBottom:6,borderBottom:`2px solid ${ac}44`}}>
              <span style={{color:ac,fontWeight:800,fontSize:15}}>📁 {cat}</span>
              <span style={{color:C.muted,fontSize:12}}>{groups[cat].length} producto{groups[cat].length!==1?"s":""}</span>
            </div>
            {/* Products grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:12}}>
              {groups[cat].map(p=>(
                <Card key={p.id} style={{padding:12,display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{width:"100%",height:100,borderRadius:8,background:C.hi,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",border:`1px solid ${C.border}`}}>
                    {p.image?<img src={p.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:30}}>📦</span>}
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p.name}</div>
                    {p.description&&<div style={{color:C.muted,fontSize:11,marginTop:2,lineHeight:1.4}}>{p.description}</div>}
                  </div>
                  <div style={{marginTop:"auto",background:ac+"22",border:`1px solid ${ac}44`,borderRadius:8,padding:"7px",textAlign:"center"}}>
                    <div style={{color:C.muted,fontSize:10}}>{isW?"MAYORISTA":"PRECIO"}:</div>
                    <div style={{color:ac,fontWeight:900,fontSize:18}}>Bs. {(p[pf]||p.price||0).toLocaleString()}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    {p.stock>0?<Badge color={p.stock<p.min_stock?C.orange:C.green}>✓ Disponible</Badge>:<Badge color={C.red}>✗ Agotado</Badge>}
                  </div>
                </Card>
              ))}
            </div>
          </div>
        ));
      })()}

      {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:50,fontSize:14}}>No hay productos que coincidan con la búsqueda.</div>}
    </div>
  );
}

function PurchasePrices({products}){
  const inv=products.reduce((s,p)=>s+p.stock*(p.cost_price||0),0);
  const pot=products.reduce((s,p)=>s+p.stock*(p.price||0),0);
  const margin=pot?Math.round((1-inv/pot)*100):0;
  return(
    <div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        {[["💸 Capital Invertido",`Bs. ${inv.toLocaleString()}`,C.red],["💰 Valor de Venta",`Bs. ${pot.toLocaleString()}`,C.green],["📈 Margen Bruto",`${margin}%`,C.accent]].map(([l,v,c])=>(
          <Card key={l} style={{flex:1,minWidth:130}}><div style={{color:C.muted,fontSize:12}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:22}}>{v}</div></Card>
        ))}
      </div>
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>💲 Precios de Compra — Solo visible para el Jefe</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr>{["Producto","Compra Bs.","Minorista Bs.","Mayorista Bs.","Margen","Stock","Inv.Bs."].map(h=>(
              <th key={h} style={{color:C.muted,textAlign:"left",padding:"6px 10px",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
            ))}</tr></thead>
            <tbody>{products.map(p=>{
              const m=p.price&&p.cost_price?Math.round((1-p.cost_price/p.price)*100):0;
              return(<tr key={p.id} style={{borderBottom:`1px solid ${C.border}22`}}>
                <td style={{padding:"8px 10px",fontWeight:600}}>{p.name}</td>
                <td style={{padding:"8px 10px",color:C.red}}>Bs. {p.cost_price||0}</td>
                <td style={{padding:"8px 10px",color:C.accent}}>Bs. {p.price||0}</td>
                <td style={{padding:"8px 10px",color:C.blue}}>Bs. {p.wholesale_price||"—"}</td>
                <td style={{padding:"8px 10px"}}><Badge color={m>40?C.green:C.accent}>{m}%</Badge></td>
                <td style={{padding:"8px 10px",color:p.stock<p.min_stock?C.red:C.text}}>{p.stock}</td>
                <td style={{padding:"8px 10px",color:C.blue}}>Bs. {((p.stock||0)*(p.cost_price||0)).toLocaleString()}</td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// CAJA CHICA
// ══════════════════════════════════════════
function CajaChica(){
  const [movs,setMovs]=useLS("inv_caja",[]);
  const [form,setForm]=useState({tipo:"egreso",concepto:"",monto:"",categoria:"Gastos",fecha:new Date().toISOString().split("T")[0]});
  const [showAdd,setShowAdd]=useState(false);
  const [filtro,setFiltro]=useState("todos");
  const f=k=>e=>setForm(v=>({...v,[k]:e.target.value}));

  const categorias=["Gastos","Transporte","Limpieza","Servicios","Compras","Comida","Otros"];

  const add=()=>{
    if(!form.concepto||!form.monto)return;
    setMovs(m=>[{...form,monto:+form.monto,id:Date.now()},...m]);
    setForm({tipo:"egreso",concepto:"",monto:"",categoria:"Gastos",fecha:new Date().toISOString().split("T")[0]});
    setShowAdd(false);
  };

  const now=new Date();
  const thisMon=movs.filter(m=>{const d=new Date(m.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const ingresos=thisMon.filter(m=>m.tipo==="ingreso").reduce((s,m)=>s+m.monto,0);
  const egresos=thisMon.filter(m=>m.tipo==="egreso").reduce((s,m)=>s+m.monto,0);
  const saldo=ingresos-egresos;

  const filtered=filtro==="todos"?movs:movs.filter(m=>m.tipo===filtro);

  // Group by category for summary
  const bycat={};
  thisMon.filter(m=>m.tipo==="egreso").forEach(m=>{bycat[m.categoria]=(bycat[m.categoria]||0)+m.monto;});

  return(
    <div>
      {/* Summary cards */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
        {[
          ["💰 Ingresos del Mes",`Bs. ${ingresos.toLocaleString()}`,C.green],
          ["💸 Egresos del Mes",`Bs. ${egresos.toLocaleString()}`,C.red],
          ["🏦 Saldo Actual",`Bs. ${saldo.toLocaleString()}`,saldo>=0?C.accent:C.red],
        ].map(([l,v,c])=>(
          <Card key={l} style={{flex:1,minWidth:130}}>
            <div style={{color:C.muted,fontSize:12}}>{l}</div>
            <div style={{color:c,fontWeight:800,fontSize:22}}>{v}</div>
          </Card>
        ))}
      </div>

      {/* Category breakdown */}
      {Object.keys(bycat).length>0&&(
        <Card style={{marginBottom:16}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:10}}>📊 Egresos por Categoría (este mes)</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Object.entries(bycat).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>(
              <div key={cat} style={{background:C.hi,borderRadius:8,padding:"6px 12px",fontSize:13}}>
                <span style={{color:C.muted}}>{cat}: </span>
                <span style={{color:C.red,fontWeight:700}}>Bs. {val.toLocaleString()}</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Controls */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",background:C.hi,borderRadius:10,padding:3,gap:3}}>
          {[{v:"todos",l:"Todos"},{v:"ingreso",l:"💚 Ingresos"},{v:"egreso",l:"🔴 Egresos"}].map(({v,l})=>(
            <button key={v} onClick={()=>setFiltro(v)} style={{background:filtro===v?C.accent:"transparent",color:filtro===v?"#000":C.muted,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:filtro===v?700:400,fontSize:12}}>{l}</button>
          ))}
        </div>
        <div style={{flex:1}}/>
        <Btn small onClick={()=>setShowAdd(s=>!s)}>+ Movimiento</Btn>
      </div>

      {/* Add form */}
      {showAdd&&(
        <Card style={{marginBottom:14,background:C.hi}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>➕ Nuevo Movimiento</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:130}}>
              <div style={{color:C.muted,fontSize:11,marginBottom:4}}>Tipo *</div>
              <select value={form.tipo} onChange={f("tipo")} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}>
                <option value="egreso">💸 Egreso (Gasto)</option>
                <option value="ingreso">💰 Ingreso</option>
              </select>
            </div>
            <Inp label="Concepto *" value={form.concepto} onChange={f("concepto")} placeholder="ej: Pago de luz"/>
            <Inp label="Monto Bs." value={form.monto} onChange={f("monto")} type="number"/>
            <div style={{flex:1,minWidth:130}}>
              <div style={{color:C.muted,fontSize:11,marginBottom:4}}>Categoría</div>
              <select value={form.categoria} onChange={f("categoria")} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}>
                {categorias.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <Inp label="Fecha" value={form.fecha} onChange={f("fecha")} type="date"/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <Btn onClick={add} color={C.green}>💾 Guardar</Btn>
            <Btn onClick={()=>setShowAdd(false)} outline color={C.muted}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {/* Movements list */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>📋 Movimientos ({filtered.length})</div>
        {filtered.length===0&&<div style={{color:C.muted,textAlign:"center",padding:30}}>Sin movimientos registrados.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.slice(0,50).map(m=>(
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:C.hi,borderRadius:10}}>
              <span style={{fontSize:20}}>{m.tipo==="ingreso"?"💰":"💸"}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{m.concepto}</div>
                <div style={{color:C.muted,fontSize:11}}>{m.categoria} · {m.fecha}</div>
              </div>
              <div style={{fontWeight:800,fontSize:16,color:m.tipo==="ingreso"?C.green:C.red}}>
                {m.tipo==="ingreso"?"+":"-"}${m.monto.toLocaleString()}
              </div>
              <Btn small onClick={()=>setMovs(ms=>ms.filter(x=>x.id!==m.id))} color={C.red} outline>🗑️</Btn>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════
// METAS DE VENTAS
// ══════════════════════════════════════════
function MetasVentas({salesLog,products}){
  const [metas,setMetas]=useLS("inv_metas",{mensual:0,semanal:0,diaria:0});
  const [editing,setEditing]=useState(false);
  const [tempMetas,setTempMetas]=useState(metas);

  const now=new Date();
  const hoy=now.toISOString().split("T")[0];
  const startWeek=new Date(now);
  startWeek.setDate(now.getDate()-now.getDay());

  // Calculate actual sales
  const ventasDia=salesLog.filter(s=>s.sale_date===hoy).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
  const ventasSemana=salesLog.filter(s=>{const d=new Date(s.sale_date);return d>=startWeek&&d<=now;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
  const ventasMes=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);

  const gananciaMes=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,x)=>s+(x.profit||0),0);

  const pct=(actual,meta)=>meta>0?Math.min(100,Math.round((actual/meta)*100)):0;
  const statusColor=p=>p>=100?C.green:p>=70?C.accent:p>=40?C.orange:C.red;
  const statusLabel=p=>p>=100?"🏆 ¡Meta lograda!":p>=70?"💪 Muy bien":p>=40?"📈 En camino":"⚡ Necesita impulso";

  const ProgressBar=({label,actual,meta,color})=>{
    const p=pct(actual,meta);
    return(
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:15}}>{label}</div>
          <div style={{textAlign:"right"}}>
            <div style={{color:color||statusColor(p),fontWeight:800,fontSize:18}}>Bs. {actual.toLocaleString()}</div>
            <div style={{color:C.muted,fontSize:11}}>meta: ${meta.toLocaleString()}</div>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:14,background:C.border,borderRadius:7,marginBottom:8,overflow:"hidden"}}>
          <div style={{width:`${p}%`,height:"100%",background:statusColor(p),borderRadius:7,transition:"width 1s ease",position:"relative"}}>
            {p>15&&<span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,fontWeight:700,color:"#fff"}}>{p}%</span>}
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:statusColor(p),fontSize:12,fontWeight:600}}>{statusLabel(p)}</span>
          {meta>0&&actual<meta&&<span style={{color:C.muted,fontSize:11}}>Faltan: ${(meta-actual).toLocaleString()}</span>}
        </div>
      </Card>
    );
  };

  const save=()=>{setMetas(tempMetas);setEditing(false);};

  // Top products this month
  const topThisMonth=[...products].sort((a,b)=>{
    const av=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&s.product_id===a.id;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
    const bv=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&s.product_id===b.id;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
    return bv-av;
  }).slice(0,3);

  return(
    <div>
      {/* Edit metas */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{color:C.accent,fontWeight:700,fontSize:16}}>🎯 Metas de Ventas</div>
        <Btn small onClick={()=>{setTempMetas(metas);setEditing(s=>!s);}} color={editing?C.muted:C.blue} outline={editing}>{editing?"Cancelar":"✏️ Editar Metas"}</Btn>
      </div>

      {editing&&(
        <Card style={{marginBottom:16,background:C.hi}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>✏️ Configura tus Metas</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Inp label="Meta Diaria Bs." value={tempMetas.diaria} onChange={e=>setTempMetas(m=>({...m,diaria:+e.target.value}))} type="number"/>
            <Inp label="Meta Semanal Bs." value={tempMetas.semanal} onChange={e=>setTempMetas(m=>({...m,semanal:+e.target.value}))} type="number"/>
            <Inp label="Meta Mensual Bs." value={tempMetas.mensual} onChange={e=>setTempMetas(m=>({...m,mensual:+e.target.value}))} type="number"/>
          </div>
          <div style={{marginTop:12}}><Btn onClick={save} color={C.green}>💾 Guardar Metas</Btn></div>
        </Card>
      )}

      {/* Progress bars */}
      <ProgressBar label="📅 Ventas de Hoy" actual={ventasDia} meta={metas.diaria}/>
      <ProgressBar label="📆 Ventas de la Semana" actual={ventasSemana} meta={metas.semanal}/>
      <ProgressBar label="🗓️ Ventas del Mes" actual={ventasMes} meta={metas.mensual}/>

      {/* Ganancia del mes */}
      <Card style={{marginBottom:12,background:C.green+"11",border:`1px solid ${C.green}44`}}>
        <div style={{color:C.muted,fontSize:12}}>💰 Ganancia neta este mes</div>
        <div style={{color:C.green,fontWeight:800,fontSize:28}}>Bs. {gananciaMes.toLocaleString()}</div>
        <div style={{color:C.muted,fontSize:11,marginTop:4}}>Después de descontar costos de productos</div>
      </Card>

      {/* Motivational message */}
      {metas.mensual>0&&(
        <Card style={{background:C.accent+"11",border:`1px solid ${C.accent}44`,marginBottom:12}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:6}}>🤖 Consejo ARIA</div>
          <div style={{color:C.text,fontSize:13,lineHeight:1.6}}>
            {pct(ventasMes,metas.mensual)>=100
              ? `¡Felicidades! 🏆 Superaste tu meta mensual de Bs. ${metas.mensual.toLocaleString()}. Considera aumentarla para el próximo mes.`
              : pct(ventasMes,metas.mensual)>=70
              ? `¡Vas muy bien! Te faltan Bs. ${(metas.mensual-ventasMes).toLocaleString()} para tu meta mensual. ¡Sigue así!`
              : `Para alcanzar tu meta mensual de Bs. ${metas.mensual.toLocaleString()}, necesitas vender Bs. ${Math.round((metas.mensual-ventasMes)/(30-now.getDate()+1)).toLocaleString()} por día los días restantes del mes.`
            }
          </div>
        </Card>
      )}

      {/* Top products this month */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>⭐ Top Productos este Mes</div>
        {topThisMonth.length===0
          ?<div style={{color:C.muted,textAlign:"center",padding:20}}>Sin ventas registradas este mes.</div>
          :topThisMonth.map((p,i)=>{
            const venta=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&s.product_id===p.id;}).reduce((s,x)=>s+(x.sale_price*x.quantity),0);
            return(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:i<2?`1px solid ${C.border}`:""}}>
                <span style={{color:C.accent,fontWeight:800,width:24}}>#{i+1}</span>
                {p.image&&<img src={p.image} style={{width:32,height:32,borderRadius:6,objectFit:"cover"}}/>}
                <span style={{flex:1,fontWeight:600}}>{p.name}</span>
                <Badge color={C.green}>Bs. {venta.toLocaleString()}</Badge>
              </div>
            );
          })
        }
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════
// DEUDAS POR COBRAR
// ══════════════════════════════════════════
function Creditos({salesLog}){
  const [debts,setDebts]=useLS("inv_debts",[]);
  const [form,setForm]=useState({client:"",concept:"",amount:"",date:new Date().toISOString().split("T")[0],due_date:"",notes:""});
  const [showAdd,setShowAdd]=useState(false);
  const [filter,setFilter]=useState("pending");
  const f=k=>e=>setForm(v=>({...v,[k]:e.target.value}));

  const add=()=>{
    if(!form.client||!form.amount)return;
    setDebts(d=>[...d,{...form,id:Date.now(),amount:+form.amount,paid:false,paid_date:"",paid_amount:0}]);
    setForm({client:"",concept:"",amount:"",date:new Date().toISOString().split("T")[0],due_date:"",notes:""});
    setShowAdd(false);
  };

  const markPaid=(id,partial=false)=>{
    if(partial){
      const amt=prompt("¿Cuánto pagó? (Bs.)");
      if(!amt||isNaN(+amt))return;
      setDebts(d=>d.map(x=>x.id===id?{...x,paid_amount:(x.paid_amount||0)+(+amt),paid:(x.paid_amount||0)+(+amt)>=x.amount,paid_date:new Date().toISOString().split("T")[0]}:x));
    }else{
      setDebts(d=>d.map(x=>x.id===id?{...x,paid:true,paid_amount:x.amount,paid_date:new Date().toISOString().split("T")[0]}:x));
    }
  };

  const openWA=(debt)=>{
    const msg=encodeURIComponent(`Hola ${debt.client}, te recuerdo que tienes una deuda pendiente de Bs. ${debt.amount} por concepto de "${debt.concept}". ${debt.due_date?`Fecha límite: ${debt.due_date}.`:""} Por favor comunícate para coordinar el pago. Gracias 🙏`);
    window.open(`https://wa.me/?text=${msg}`,"_blank");
  };

  const now=new Date();
  const filtered=debts.filter(d=>filter==="all"||filter==="pending"?!d.paid:d.paid);
  const totalPending=debts.filter(d=>!d.paid).reduce((s,d)=>s+(d.amount-(d.paid_amount||0)),0);
  const totalCollected=debts.filter(d=>d.paid).reduce((s,d)=>s+d.amount,0);
  const overdue=debts.filter(d=>!d.paid&&d.due_date&&new Date(d.due_date)<now);

  return(
    <div>
      {/* Summary */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
        {[["💸 Por Cobrar",`Bs. ${totalPending.toLocaleString()}`,C.red],["✅ Cobrado",`Bs. ${totalCollected.toLocaleString()}`,C.green],["⚠️ Vencidas",overdue.length,C.orange]].map(([l,v,c])=>(
          <Card key={l} style={{flex:1,minWidth:120}}><div style={{color:C.muted,fontSize:12}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div></Card>
        ))}
      </div>

      {overdue.length>0&&(
        <div style={{background:C.orange+"22",border:`1px solid ${C.orange}55`,borderRadius:12,padding:"10px 16px",marginBottom:14}}>
          <div style={{color:C.orange,fontWeight:700,marginBottom:4}}>⚠️ Deudas vencidas — {overdue.length}</div>
          {overdue.map(d=><div key={d.id} style={{color:C.text,fontSize:13}}>• <b>{d.client}</b>: Bs. {d.amount-(d.paid_amount||0)} (venció {d.due_date})</div>)}
        </div>
      )}

      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",background:C.hi,borderRadius:10,padding:3,gap:3}}>
          {[{v:"pending",l:"⏳ Pendientes"},{v:"paid",l:"✅ Cobradas"},{v:"all",l:"Todas"}].map(({v,l})=>(
            <button key={v} onClick={()=>setFilter(v)} style={{background:filter===v?C.accent:"transparent",color:filter===v?"#fff":C.muted,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:filter===v?700:400,fontSize:12}}>{l}</button>
          ))}
        </div>
        <div style={{flex:1}}/>
        <Btn small onClick={()=>setShowAdd(s=>!s)}>+ Agregar Deuda</Btn>
      </div>

      {showAdd&&(
        <Card style={{marginBottom:14,background:C.hi}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>➕ Nueva Deuda por Cobrar</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Inp label="Cliente *" value={form.client} onChange={f("client")} placeholder="Nombre del cliente"/>
            <Inp label="Concepto *" value={form.concept} onChange={f("concept")} placeholder="ej: Mercadería fiada"/>
            <Inp label="Monto Bs. *" value={form.amount} onChange={f("amount")} type="number"/>
            <Inp label="Fecha" value={form.date} onChange={f("date")} type="date"/>
            <Inp label="Fecha límite pago" value={form.due_date} onChange={f("due_date")} type="date"/>
            <Inp label="Notas" value={form.notes} onChange={f("notes")} placeholder="opcional" style={{minWidth:200}}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <Btn onClick={add} color={C.green}>💾 Guardar</Btn>
            <Btn onClick={()=>setShowAdd(false)} outline color={C.muted}>Cancelar</Btn>
          </div>
        </Card>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:30}}>No hay deudas en esta sección.</div>}
        {filtered.map(d=>{
          const pending=d.amount-(d.paid_amount||0);
          const pct=Math.round(((d.paid_amount||0)/d.amount)*100);
          const isOverdue=d.due_date&&!d.paid&&new Date(d.due_date)<now;
          return(
            <Card key={d.id} style={{border:`1px solid ${d.paid?C.green:isOverdue?C.orange:C.border}44`}}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontWeight:700,fontSize:15}}>{d.client}</div>
                  <div style={{color:C.muted,fontSize:12}}>{d.concept}</div>
                  <div style={{color:C.muted,fontSize:11,marginTop:2}}>📅 {d.date}{d.due_date&&<span style={{color:isOverdue?C.orange:C.muted}}> · Límite: {d.due_date}</span>}</div>
                  {d.notes&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>📝 {d.notes}</div>}
                  {(d.paid_amount||0)>0&&d.amount>0&&(
                    <div style={{marginTop:6}}>
                      <div style={{height:5,background:C.border,borderRadius:3}}>
                        <div style={{width:`${pct}%`,height:"100%",background:d.paid?C.green:C.accent,borderRadius:3}}/>
                      </div>
                      <div style={{color:C.muted,fontSize:10,marginTop:2}}>Pagado: Bs. {d.paid_amount||0} de Bs. {d.amount} ({pct}%)</div>
                    </div>
                  )}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:d.paid?C.green:C.red,fontWeight:900,fontSize:18}}>Bs. {pending.toLocaleString()}</div>
                  <div style={{color:C.muted,fontSize:11}}>Total: Bs. {d.amount}</div>
                  {d.paid&&<Badge color={C.green}>✅ COBRADO</Badge>}
                  {isOverdue&&!d.paid&&<Badge color={C.orange}>⚠️ VENCIDA</Badge>}
                </div>
              </div>
              {!d.paid&&(
                <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                  <Btn small onClick={()=>markPaid(d.id)} color={C.green}>✅ Cobrado total</Btn>
                  <Btn small onClick={()=>markPaid(d.id,true)} color={C.blue} outline>💰 Cobro parcial</Btn>
                  <Btn small onClick={()=>openWA(d)} color={C.green} outline>📱 WhatsApp</Btn>
                  <Btn small onClick={()=>setDebts(ds=>ds.filter(x=>x.id!==d.id))} color={C.red} outline>🗑️</Btn>
                </div>
              )}
              {d.paid&&(
                <div style={{display:"flex",gap:6,marginTop:10}}>
                  <div style={{color:C.muted,fontSize:12}}>✅ Cobrado el {d.paid_date}</div>
                  <Btn small onClick={()=>setDebts(ds=>ds.filter(x=>x.id!==d.id))} color={C.red} outline>🗑️</Btn>
                </div>
              )}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// GENERADOR DE RECIBOS
// ══════════════════════════════════════════
function Receipts({products,salesLog}){
  const [negocioName]=useLS("inv_negocio_name","Mi Negocio");
  const [negocioPhone,setNegocioPhone]=useLS("inv_negocio_phone","");
  const [negocioAddress,setNegocioAddress]=useLS("inv_negocio_address","");
  const [form,setForm]=useState({client:"",date:new Date().toISOString().split("T")[0],items:[],notes:""});
  const [selProduct,setSelProduct]=useState("");
  const [selQty,setSelQty]=useState("1");
  const [selPrice,setSelPrice]=useState("");
  const [msg,setMsg]=useState("");

  const addItem=()=>{
    const p=products.find(x=>x.id===+selProduct);
    if(!p&&!selProduct)return;
    const name=p?p.name:selProduct;
    const price=+selPrice||(p?p.price:0);
    setForm(f=>({...f,items:[...f.items,{name,qty:+selQty,price,total:price*(+selQty)}]}));
    setSelProduct("");setSelQty("1");setSelPrice("");
  };

  const total=form.items.reduce((s,i)=>s+i.total,0);

  const genReceipt=()=>{
    if(!form.items.length){setMsg("❌ Agrega al menos un producto");return;}
    const date=new Date(form.date).toLocaleDateString("es-ES",{year:"numeric",month:"long",day:"numeric"});
    const receiptNum=`R-${Date.now().toString().slice(-6)}`;
    const rows=form.items.map(i=>`
      <tr style="border-bottom:1px solid #f3f4f6;">
        <td style="padding:10px 12px;">${i.name}</td>
        <td style="padding:10px 12px;text-align:center;">${i.qty}</td>
        <td style="padding:10px 12px;text-align:right;">Bs. ${i.price.toLocaleString()}</td>
        <td style="padding:10px 12px;text-align:right;font-weight:700;">Bs. ${i.total.toLocaleString()}</td>
      </tr>`).join("");

    const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<meta name="app-version" content="20260524_020033"/>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
    <title>Recibo ${receiptNum}</title>
    <style>body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;margin:0;padding:20px;color:#111827;}
    @media print{@page{size:80mm auto;margin:5mm;}body{padding:5px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
    </head><body>
    <div style="max-width:400px;margin:0 auto;border:2px solid #E91E8C;border-radius:12px;overflow:hidden;">
      <div style="background:#E91E8C;color:white;padding:16px 20px;text-align:center;">
        <div style="font-size:22px;font-weight:900;">📦 ${negocioName}</div>
        ${negocioAddress?`<div style="font-size:12px;opacity:.85;margin-top:2px;">📍 ${negocioAddress}</div>`:""}
        ${negocioPhone?`<div style="font-size:12px;opacity:.85;">📞 ${negocioPhone}</div>`:""}
      </div>
      <div style="padding:16px 20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;color:#6b7280;">
          <span>📋 Recibo: <b style="color:#111;">${receiptNum}</b></span>
          <span>📅 ${date}</span>
        </div>
        ${form.client?`<div style="margin-bottom:12px;padding:8px 12px;background:#f9fafb;border-radius:8px;font-size:13px;">👤 Cliente: <b>${form.client}</b></div>`:""}
        <table style="width:100%;border-collapse:collapse;margin-bottom:12px;">
          <thead><tr style="background:#f3f4f6;">
            <th style="padding:8px 12px;text-align:left;font-size:12px;color:#6b7280;">Producto</th>
            <th style="padding:8px 12px;text-align:center;font-size:12px;color:#6b7280;">Cant.</th>
            <th style="padding:8px 12px;text-align:right;font-size:12px;color:#6b7280;">Precio</th>
            <th style="padding:8px 12px;text-align:right;font-size:12px;color:#6b7280;">Total</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="border-top:2px solid #E91E8C;padding-top:12px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:16px;font-weight:700;">TOTAL</span>
          <span style="font-size:22px;font-weight:900;color:#E91E8C;">Bs. ${total.toLocaleString()}</span>
        </div>
        ${form.notes?`<div style="margin-top:10px;padding:8px 12px;background:#f9fafb;border-radius:8px;font-size:12px;color:#6b7280;">📝 ${form.notes}</div>`:""}
        <div style="margin-top:16px;text-align:center;font-size:11px;color:#9ca3af;">¡Gracias por su compra! · ${negocioName}</div>
      </div>
    </div>
    <script>window.onload=()=>{window.print();setTimeout(()=>window.close(),1200);}<\/script>
    </body></html>`;
    const w=window.open("","_blank");
    if(w){w.document.write(html);w.document.close();}
    else alert("Permite ventanas emergentes.");
  };

  return(
    <div>
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>⚙️ Datos del Negocio en el Recibo</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Inp label="📞 Teléfono del negocio" value={negocioPhone} onChange={e=>setNegocioPhone(e.target.value)} placeholder="ej: 77712345"/>
          <Inp label="📍 Dirección" value={negocioAddress} onChange={e=>setNegocioAddress(e.target.value)} placeholder="ej: Av. Principal #123"/>
        </div>
      </Card>

      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>🧾 Crear Nuevo Recibo</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
          <Inp label="👤 Cliente (opcional)" value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Nombre del cliente"/>
          <Inp label="📅 Fecha" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} type="date"/>
          <Inp label="📝 Notas" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="ej: Pago con tarjeta"/>
        </div>

        <div style={{background:C.hi,borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{color:C.text,fontWeight:600,fontSize:13,marginBottom:10}}>➕ Agregar producto al recibo</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:2,minWidth:160}}>
              <div style={{color:C.muted,fontSize:11,marginBottom:4}}>Producto</div>
              <select value={selProduct} onChange={e=>{setSelProduct(e.target.value);const p=products.find(x=>x.id===+e.target.value);if(p)setSelPrice(p.price);}}
                style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}>
                <option value="">-- Selecciona o escribe abajo --</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.name} — Bs. {p.price}</option>)}
              </select>
            </div>
            <Inp label="Cantidad" value={selQty} onChange={e=>setSelQty(e.target.value)} type="number"/>
            <Inp label="Precio Bs." value={selPrice} onChange={e=>setSelPrice(e.target.value)} type="number"/>
          </div>
          <div style={{marginTop:10}}><Btn small onClick={addItem} color={C.blue}>+ Agregar</Btn></div>
        </div>

        {form.items.length>0&&(
          <div>
            <div style={{color:C.text,fontWeight:600,fontSize:13,marginBottom:8}}>🧾 Productos del recibo:</div>
            {form.items.map((item,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:C.hi,borderRadius:8,marginBottom:6}}>
                <span style={{flex:1,fontSize:13}}>{item.name}</span>
                <span style={{color:C.muted,fontSize:12}}>x{item.qty}</span>
                <span style={{color:C.accent,fontWeight:700}}>Bs. {item.total.toLocaleString()}</span>
                <button onClick={()=>setForm(f=>({...f,items:f.items.filter((_,j)=>j!==i)}))} style={{background:"transparent",border:"none",color:C.red,cursor:"pointer"}}>✕</button>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:8,padding:"8px 10px",background:C.accent+"22",borderRadius:8}}>
              <span style={{fontWeight:900,fontSize:18,color:C.accent}}>TOTAL: Bs. {total.toLocaleString()}</span>
            </div>
          </div>
        )}

        {msg&&<div style={{color:C.red,marginTop:10,fontSize:13}}>{msg}</div>}
        <div style={{marginTop:14,display:"flex",gap:8}}>
          <Btn onClick={genReceipt} color={C.green}>🖨️ Generar Recibo PDF</Btn>
          <Btn onClick={()=>setForm({client:"",date:new Date().toISOString().split("T")[0],items:[],notes:""})} outline color={C.muted}>🗑️ Limpiar</Btn>
        </div>
      </Card>
    </div>
  );
}

// REPORTES DIARIO Y MENSUAL
// ══════════════════════════════════════════
function Reports({salesLog,products}){
  const [negocioName]=useLS("inv_negocio_name","Mi Negocio");
  const [reportType,setReportType]=useState("daily");
  const [selDate,setSelDate]=useState(new Date().toISOString().split("T")[0]);
  const [selMonth,setSelMonth]=useState(new Date().toISOString().slice(0,7));
  const now=new Date();

  const dailySales=salesLog.filter(s=>s.sale_date===selDate);
  const [sm,sy]=selMonth.split("-").map(Number);
  const monthlySales=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===sm-1&&d.getFullYear()===sy;});

  const calcStats=sales=>({
    total:sales.reduce((s,x)=>s+(x.sale_price*x.quantity),0),
    profit:sales.reduce((s,x)=>s+(x.profit||0),0),
    transactions:sales.length,
    units:sales.reduce((s,x)=>s+x.quantity,0),
    discount:sales.reduce((s,x)=>s+(x.discount||0),0),
    topProducts:[...sales.reduce((m,s)=>{const k=s.product_name;if(!m.has(k))m.set(k,{name:k,qty:0,total:0});const v=m.get(k);v.qty+=s.quantity;v.total+=s.sale_price*s.quantity;return m;},new Map()).values()].sort((a,b)=>b.total-a.total).slice(0,5),
    clients:[...new Set(sales.map(s=>s.client_name).filter(Boolean))].slice(0,5),
  });

  const genReportPDF=(sales,title,subtitle)=>{
    const stats=calcStats(sales);
    const date=new Date().toLocaleDateString("es-ES",{year:"numeric",month:"long",day:"numeric"});
    const rows=sales.slice(0,50).map(s=>`
      <tr style="border-bottom:1px solid #f3f4f6;">
        <td style="padding:8px 10px;font-size:12px;">${s.sale_date}</td>
        <td style="padding:8px 10px;font-size:12px;font-weight:600;">${s.product_name}</td>
        <td style="padding:8px 10px;font-size:12px;">${s.client_name||"General"}</td>
        <td style="padding:8px 10px;font-size:12px;text-align:center;">${s.quantity}</td>
        <td style="padding:8px 10px;font-size:12px;text-align:right;">Bs. ${s.sale_price}</td>
        <td style="padding:8px 10px;font-size:12px;text-align:right;color:#059669;font-weight:700;">Bs. ${(s.profit||0).toFixed(2)}</td>
      </tr>`).join("");

    const topRows=stats.topProducts.map((p,i)=>`
      <tr style="border-bottom:1px solid #f3f4f6;">
        <td style="padding:8px 12px;">#${i+1}</td>
        <td style="padding:8px 12px;font-weight:600;">${p.name}</td>
        <td style="padding:8px 12px;text-align:center;">${p.qty} uds</td>
        <td style="padding:8px 12px;text-align:right;font-weight:700;color:#E91E8C;">Bs. ${p.total.toLocaleString()}</td>
      </tr>`).join("");

    const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<meta name="app-version" content="20260524_020033"/>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
    <title>${title}</title>
    <style>body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;margin:0;padding:24px;color:#111827;}
    @media print{@page{margin:12mm 15mm;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
    </head><body>
    <div style="max-width:800px;margin:0 auto;">
      <div style="background:linear-gradient(135deg,#E91E8C,#E91E8Cbb);border-radius:14px;padding:24px 28px;margin-bottom:22px;color:white;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
          <div><div style="font-size:24px;font-weight:900;">📦 ${negocioName}</div><div style="font-size:16px;opacity:.9;margin-top:3px;">${title}</div><div style="font-size:13px;opacity:.8;">${subtitle}</div></div>
          <div style="text-align:right;opacity:.9;"><div style="font-size:13px;">Generado: ${date}</div><div style="font-size:13px;margin-top:2px;">${stats.transactions} ventas · ${stats.units} unidades</div></div>
        </div>
      </div>
      
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;">
        ${[["💰 Total Ventas",`Bs. ${stats.total.toLocaleString()}`,"#E91E8C"],["📈 Ganancia Neta",`Bs. ${stats.profit.toFixed(2)}`,"#059669"],["🛒 Transacciones",stats.transactions,"#3B82F6"],["🏷️ Descuentos",`Bs. ${stats.discount.toFixed(2)}`,"#F59E0B"]].map(([l,v,c])=>`<div style="background:#f9fafb;border-radius:10px;padding:14px;border-left:4px solid ${c};"><div style="font-size:11px;color:#6b7280;">${l}</div><div style="font-size:18px;font-weight:800;color:${c};margin-top:4px;">${v}</div></div>`).join("")}
      </div>
      
      ${stats.topProducts.length>0?`<div style="margin-bottom:22px;"><div style="font-size:15px;font-weight:700;margin-bottom:10px;color:#111;">⭐ Top Productos</div><table style="width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);"><thead><tr style="background:#E91E8C;color:white;"><th style="padding:10px 12px;text-align:left;font-size:12px;">#</th><th style="padding:10px 12px;text-align:left;font-size:12px;">Producto</th><th style="padding:10px 12px;text-align:center;font-size:12px;">Unidades</th><th style="padding:10px 12px;text-align:right;font-size:12px;">Total</th></tr></thead><tbody>${topRows}</tbody></table></div>`:""}
      
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;color:#111;">📋 Detalle de Ventas${sales.length>50?" (primeras 50)":""}</div>
      <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);">
        <thead><tr style="background:#f3f4f6;"><th style="padding:10px;text-align:left;font-size:11px;color:#6b7280;">Fecha</th><th style="padding:10px;text-align:left;font-size:11px;color:#6b7280;">Producto</th><th style="padding:10px;text-align:left;font-size:11px;color:#6b7280;">Cliente</th><th style="padding:10px;text-align:center;font-size:11px;color:#6b7280;">Cant.</th><th style="padding:10px;text-align:right;font-size:11px;color:#6b7280;">Precio</th><th style="padding:10px;text-align:right;font-size:11px;color:#6b7280;">Ganancia</th></tr></thead>
        <tbody>${rows||"<tr><td colspan='6' style='padding:20px;text-align:center;color:#9ca3af;'>Sin ventas en este período</td></tr>"}</tbody>
      </table>
      <div style="margin-top:20px;text-align:center;font-size:11px;color:#d1d5db;">Generado con InventarioPRO · ${date}</div>
    </div>
    <script>window.onload=()=>{window.print();setTimeout(()=>window.close(),1200);}<\/script>
    </body></html>`;
    const w=window.open("","_blank");
    if(w){w.document.write(html);w.document.close();}
    else alert("Permite ventanas emergentes.");
  };

  const sales=reportType==="daily"?dailySales:monthlySales;
  const stats=calcStats(sales);
  const monthNames=["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  return(
    <div>
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",background:C.hi,borderRadius:10,padding:3,gap:3}}>
            {[{v:"daily",l:"📅 Diario"},{v:"monthly",l:"📆 Mensual"}].map(({v,l})=>(
              <button key={v} onClick={()=>setReportType(v)} style={{background:reportType===v?C.accent:"transparent",color:reportType===v?"#fff":C.muted,border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:reportType===v?700:400,fontSize:13}}>{l}</button>
            ))}
          </div>
          {reportType==="daily"
            ?<Inp label="" value={selDate} onChange={e=>setSelDate(e.target.value)} type="date" style={{minWidth:0,flex:1}}/>
            :<Inp label="" value={selMonth} onChange={e=>setSelMonth(e.target.value)} type="month" style={{minWidth:0,flex:1}}/>}
          <Btn onClick={()=>genReportPDF(sales,reportType==="daily"?`Reporte Diario — ${selDate}`:`Reporte Mensual — ${monthNames[sm]} ${sy}`,`${stats.transactions} ventas · ${stats.units} unidades`)} color={C.accent}>📄 Descargar PDF</Btn>
        </div>
      </Card>

      {/* KPI cards */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
        {[["💰 Total Ventas",`Bs. ${stats.total.toLocaleString()}`,C.accent],["📈 Ganancia",`Bs. ${stats.profit.toFixed(2)}`,C.green],["🛒 Transacciones",stats.transactions,C.blue],["📦 Unidades",stats.units,C.purple]].map(([l,v,c])=>(
          <Card key={l} style={{flex:1,minWidth:130}}><div style={{color:C.muted,fontSize:12}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div></Card>
        ))}
      </div>

      {/* Top products */}
      {stats.topProducts.length>0&&(
        <Card style={{marginBottom:14}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>⭐ Top Productos del {reportType==="daily"?"Día":"Mes"}</div>
          {stats.topProducts.map((p,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:i<stats.topProducts.length-1?`1px solid ${C.border}`:""}}>
              <span style={{color:C.accent,fontWeight:800,width:24}}>#{i+1}</span>
              <span style={{flex:1,fontWeight:600}}>{p.name}</span>
              <span style={{color:C.muted,fontSize:12}}>{p.qty} uds</span>
              <span style={{color:C.green,fontWeight:700}}>Bs. {p.total.toLocaleString()}</span>
            </div>
          ))}
        </Card>
      )}

      {/* Sales list */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>📋 Ventas del {reportType==="daily"?selDate:`${monthNames[sm]} ${sy}`} ({sales.length})</div>
        {sales.length===0&&<div style={{color:C.muted,textAlign:"center",padding:24}}>Sin ventas en este período.</div>}
        <div style={{overflowX:"auto"}}>
          {sales.length>0&&<table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Hora/Fecha","Producto","Cliente","Cant.","Precio","Ganancia"].map(h=><th key={h} style={{color:C.muted,textAlign:"left",padding:"6px 8px",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{sales.map((s,i)=>(
              <tr key={i} style={{borderBottom:`1px solid ${C.border}22`}}>
                <td style={{padding:"7px 8px",color:C.muted,fontSize:11}}>{s.sale_date}</td>
                <td style={{padding:"7px 8px",fontWeight:600}}>{s.product_name}</td>
                <td style={{padding:"7px 8px",color:C.muted}}>{s.client_name||"General"}</td>
                <td style={{padding:"7px 8px",textAlign:"center"}}>{s.quantity}</td>
                <td style={{padding:"7px 8px",color:C.accent}}>Bs. {s.sale_price}</td>
                <td style={{padding:"7px 8px",color:C.green}}>Bs. {(s.profit||0).toFixed(2)}</td>
              </tr>
            ))}</tbody>
          </table>}
        </div>
      </Card>
    </div>
  );
}

// GOOGLE DRIVE SYNC

function GoogleDriveSync({products,setProducts,clients,setClients,salesLog,setSalesLog}){
  const [driveStatus,setDriveStatus]=useLS("inv_drive_status",{connected:false,email:"",lastSync:""});
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");
  const [msgColor,setMsgColor]=useState(C.green);
  const CLIENT_ID="YOUR_GOOGLE_CLIENT_ID"; // User needs to set this
  const API_KEY="YOUR_GOOGLE_API_KEY";
  const FOLDER_NAME="InventarioPRO";
  const FILE_NAME="inventariopro_data.json";

  const showMsg=(text,color=C.green)=>{setMsg(text);setMsgColor(color);setTimeout(()=>setMsg(""),4000);};

  // Load Google API
  const loadGAPI=()=>new Promise((resolve,reject)=>{
    if(window.gapi){resolve();return;}
    const s=document.createElement("script");
    s.src="https://apis.google.com/js/api.js";
    s.onload=()=>{
      window.gapi.load("client:auth2",async()=>{
        try{
          await window.gapi.client.init({apiKey:API_KEY,clientId:CLIENT_ID,scope:"https://www.googleapis.com/auth/drive.file",discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
          resolve();
        }catch(e){reject(e);}
      });
    };
    s.onerror=reject;
    document.body.appendChild(s);
  });

  const connectDrive=async()=>{
    setLoading(true);
    try{
      await loadGAPI();
      const auth=window.gapi.auth2.getAuthInstance();
      const user=await auth.signIn();
      const email=user.getBasicProfile().getEmail();
      setDriveStatus({connected:true,email,lastSync:""});
      showMsg(`✅ Conectado como ${email}`);
    }catch(e){
      showMsg("❌ Error al conectar. Verifica tu conexión.",""+C.red);
    }
    setLoading(false);
  };

  const disconnectDrive=()=>{
    try{window.gapi?.auth2?.getAuthInstance()?.signOut();}catch{}
    setDriveStatus({connected:false,email:"",lastSync:""});
    showMsg("✅ Desconectado de Google Drive");
  };

  // Manual backup: download JSON and instruct user to save to Drive
  const manualBackupDrive=()=>{
    const data={version:"InventarioPRO_v2",fecha:new Date().toISOString(),products,clients,salesLog};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`InventarioPRO_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
    setDriveStatus(s=>({...s,lastSync:new Date().toLocaleString("es-ES")}));
    showMsg("✅ Archivo descargado — súbelo manualmente a tu Google Drive");
  };

  const restoreFromFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.products)throw new Error();
        if(!window.confirm(`¿Restaurar backup del ${data.fecha?new Date(data.fecha).toLocaleString("es-ES"):"?"}?\n\nProductos: ${data.products?.length}\nVentas: ${data.salesLog?.length}\n\n⚠️ Reemplazará todos los datos actuales.`))return;
        setProducts(data.products||[]);
        setClients(data.clients||[]);
        setSalesLog(data.salesLog||[]);
        showMsg("✅ Datos restaurados correctamente");
      }catch{showMsg("❌ Archivo inválido",""+C.red);}
    };
    reader.readAsText(file);e.target.value="";
  };

  const fileRef=useRef();

  return(
    <div>
      {/* Status */}
      <Card style={{marginBottom:14,background:driveStatus.connected?C.green+"11":C.hi,border:`1px solid ${driveStatus.connected?C.green:C.border}44`}}>
        <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontSize:36}}>☁️</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:driveStatus.connected?C.green:C.text}}>
              {driveStatus.connected?"✅ Conectado a Google Drive":"Google Drive — No conectado"}
            </div>
            {driveStatus.connected&&<div style={{color:C.muted,fontSize:12,marginTop:2}}>📧 {driveStatus.email}</div>}
            {driveStatus.lastSync&&<div style={{color:C.muted,fontSize:12}}>🕐 Último respaldo: {driveStatus.lastSync}</div>}
            {!driveStatus.connected&&<div style={{color:C.muted,fontSize:12,marginTop:2}}>Conecta tu cuenta para sincronizar tus datos</div>}
          </div>
          {driveStatus.connected
            ?<Btn small onClick={disconnectDrive} color={C.red} outline>Desconectar</Btn>
            :<Btn small onClick={connectDrive} disabled={loading} color={C.blue}>{loading?"Conectando...":"🔗 Conectar"}</Btn>
          }
        </div>
        {msg&&<div style={{marginTop:10,color:msgColor,fontWeight:600,fontSize:13}}>{msg}</div>}
      </Card>

      {/* Instructions */}
      <Card style={{marginBottom:14,background:C.blue+"11",border:`1px solid ${C.blue}33`}}>
        <div style={{color:C.blue,fontWeight:700,marginBottom:8}}>💡 Cómo funciona el respaldo con Google Drive</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[
            ["1️⃣","Toca 'Descargar Backup'","Se descarga un archivo JSON con todos tus datos"],
            ["2️⃣","Abre Google Drive","drive.google.com o la app de Google Drive"],
            ["3️⃣","Sube el archivo","Crea una carpeta 'InventarioPRO' y guarda ahí el archivo"],
            ["4️⃣","Para restaurar","Descarga el archivo de Drive y usa 'Importar desde archivo'"],
          ].map(([n,t,d])=>(
            <div key={n} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:18,flexShrink:0}}>{n}</span>
              <div><div style={{fontWeight:600,fontSize:13,color:C.text}}>{t}</div><div style={{color:C.muted,fontSize:12}}>{d}</div></div>
            </div>
          ))}
        </div>
      </Card>

      {/* Actions */}
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>💾 Acciones de Respaldo</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:28}}>⬇️</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Descargar Backup Completo</div>
              <div style={{color:C.muted,fontSize:12}}>Descarga JSON con productos, ventas, clientes y fotos</div>
            </div>
            <Btn small onClick={manualBackupDrive} color={C.green}>⬇️ Descargar</Btn>
          </div>

          <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 14px",background:C.hi,borderRadius:10}}>
            <span style={{fontSize:28}}>📂</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>Restaurar desde Archivo</div>
              <div style={{color:C.muted,fontSize:12}}>Importa un backup descargado desde Drive o este celular</div>
            </div>
            <Btn small onClick={()=>fileRef.current?.click()} color={C.orange}>📂 Importar</Btn>
            <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={restoreFromFile}/>
          </div>
        </div>
      </Card>

      {/* Auto backup reminder */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:10}}>⏰ Recordatorio de Respaldo</div>
        {[
          ["📅","Cada semana","Descarga el backup y guárdalo en Google Drive"],
          ["☁️","Carpeta sugerida","Crea 'InventarioPRO' en Drive para organizar"],
          ["📱","Si cambias de celular","Descarga el archivo de Drive → Importar en la nueva app"],
          ["🔒","Seguridad","El archivo JSON tiene todos tus datos encriptados en Base64"],
          ["⚠️","Importante","Si limpias Chrome se borran los datos — el backup en Drive es tu seguro"],
        ].map(([ic,t,d],i)=>(
          <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:i<4?`1px solid ${C.border}`:"",alignItems:"flex-start"}}>
            <span style={{fontSize:16,flexShrink:0}}>{ic}</span>
            <div><div style={{fontWeight:600,fontSize:13}}>{t}</div><div style={{color:C.muted,fontSize:12}}>{d}</div></div>
          </div>
        ))}
      </Card>
    </div>
  );
}

function PushNotifications({products,salesLog,clients}){
  const [permission,setPermission]=useState(Notification?.permission||"default");
  const [notifSettings,setNotifSettings]=useLS("inv_notif_settings",{
    stock_low:true, expiry:true, birthday:true,
    daily_summary:true, daily_time:"08:00",
    weekly_summary:true,
  });
  const [msg,setMsg]=useState("");
  const [testLoading,setTestLoading]=useState(false);

  const ns=k=>e=>setNotifSettings(s=>({...s,[k]:typeof e==="boolean"?e:e.target.type==="checkbox"?e.target.checked:e.target.value}));

  const requestPermission=async()=>{
    if(!("Notification" in window)){setMsg("❌ Tu navegador no soporta notificaciones");return;}
    const result=await Notification.requestPermission();
    setPermission(result);
    if(result==="granted")setMsg("✅ ¡Notificaciones activadas!");
    else setMsg("❌ Permiso denegado. Actívalo en configuración del navegador.");
  };

  const sendNotif=(title,body,icon="📦")=>{
    if(permission!=="granted")return false;
    try{new Notification(title,{body,icon:"https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f4e6.png"});return true;}
    catch{return false;}
  };

  const testNotif=()=>{
    setTestLoading(true);
    const sent=sendNotif("🧪 InventarioPRO — Prueba","¡Las notificaciones funcionan correctamente! ✅");
    setTimeout(()=>{
      setMsg(sent?"✅ Notificación enviada — revisa tu barra de notificaciones":"❌ Activa los permisos primero");
      setTestLoading(false);
    },500);
  };

  // Check and send pending notifications
  const checkAndNotify=useRef(null);
  useEffect(()=>{
    if(permission!=="granted")return;
    const check=()=>{
      const now=new Date();
      const today=now.toISOString().split("T")[0];
      const todayMMDD=`${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
      const lastKey="inv_last_notif_check";
      const last=localStorage.getItem(lastKey)||"";
      if(last===today)return; // Already checked today

      // Stock low
      if(notifSettings.stock_low){
        const low=products.filter(p=>p.stock<p.min_stock);
        if(low.length>0)sendNotif(`🚨 Stock Bajo — ${low.length} producto(s)`,low.slice(0,3).map(p=>`${p.name}: ${p.stock}/${p.min_stock}`).join(", "));
      }
      // Expiry
      if(notifSettings.expiry){
        const exp=products.filter(p=>{if(!p.has_expiry||!p.expiry_date)return false;const d=Math.ceil((new Date(p.expiry_date)-now)/(1000*60*60*24));return d<=7&&d>=0;});
        if(exp.length>0)sendNotif(`⏰ Productos por vencer — ${exp.length}`,exp.map(p=>`${p.name}: ${p.expiry_date}`).join(", "));
      }
      // Birthdays
      if(notifSettings.birthday){
        const bdays=clients.filter(c=>{if(!c.birthday)return false;return c.birthday.slice(5)===todayMMDD;});
        if(bdays.length>0)sendNotif(`🎂 Cumpleaños hoy!`,bdays.map(c=>c.name).join(", ")+" cumplen años hoy");
      }
      // Daily summary
      if(notifSettings.daily_summary){
        const todaySales=salesLog.filter(s=>s.sale_date===today);
        const profit=todaySales.reduce((s,x)=>s+(x.profit||0),0);
        if(todaySales.length>0)sendNotif(`📊 Resumen del día`,`${todaySales.length} ventas · Ganancia: Bs. ${profit.toFixed(2)}`);
      }

      localStorage.setItem(lastKey,today);
    };

    check();
    checkAndNotify.current=setInterval(check,1000*60*60); // Check every hour
    return()=>clearInterval(checkAndNotify.current);
  },[permission,notifSettings,products,salesLog,clients]);

  const Switch2=({value,onChange,label})=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
      <span style={{color:C.text,fontSize:14}}>{label}</span>
      <div onClick={()=>onChange(!value)} style={{width:44,height:24,background:value?C.green:C.border,borderRadius:12,cursor:"pointer",position:"relative",transition:"all .25s",flexShrink:0}}>
        <div style={{position:"absolute",top:3,left:value?22:3,width:18,height:18,background:"#fff",borderRadius:"50%",transition:"all .25s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
      </div>
    </div>
  );

  return(
    <div>
      {/* Permission status */}
      <Card style={{marginBottom:14,background:permission==="granted"?C.green+"11":C.orange+"11",border:`1px solid ${permission==="granted"?C.green:C.orange}44`}}>
        <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:36}}>{permission==="granted"?"🔔":"🔕"}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:permission==="granted"?C.green:C.orange}}>
              {permission==="granted"?"✅ Notificaciones Activadas":"⚠️ Notificaciones Desactivadas"}
            </div>
            <div style={{color:C.muted,fontSize:12,marginTop:2}}>
              {permission==="granted"?"Recibirás alertas aunque la app esté cerrada":"Activa los permisos para recibir alertas automáticas"}
            </div>
          </div>
          {permission!=="granted"&&<Btn small onClick={requestPermission} color={C.accent}>🔔 Activar</Btn>}
          {permission==="granted"&&<Btn small onClick={testNotif} disabled={testLoading} color={C.blue} outline>{testLoading?"...":"🧪 Probar"}</Btn>}
        </div>
        {msg&&<div style={{marginTop:8,color:msg.startsWith("✅")?C.green:C.red,fontWeight:600,fontSize:13}}>{msg}</div>}
      </Card>

      {/* Notification settings */}
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:4}}>⚙️ Qué notificaciones recibir</div>
        <Switch2 value={notifSettings.stock_low} onChange={v=>ns("stock_low")(v)} label="🚨 Alertas de stock bajo"/>
        <Switch2 value={notifSettings.expiry} onChange={v=>ns("expiry")(v)} label="⏰ Productos por vencer (7 días)"/>
        <Switch2 value={notifSettings.birthday} onChange={v=>ns("birthday")(v)} label="🎂 Cumpleaños de clientes"/>
        <Switch2 value={notifSettings.daily_summary} onChange={v=>ns("daily_summary")(v)} label="📊 Resumen diario de ventas"/>
        <Switch2 value={notifSettings.weekly_summary} onChange={v=>ns("weekly_summary")(v)} label="📈 Resumen semanal del negocio"/>
      </Card>

      {/* Info */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:10}}>💡 Cómo funcionan</div>
        {[
          ["🔔","Aparecen en la barra de notificaciones del celular"],
          ["⏰","Se verifican automáticamente cada hora"],
          ["📱","Funcionan aunque tengas Chrome minimizado"],
          ["🔕","Si Chrome está cerrado completamente no llegarán — instala la app en pantalla de inicio para mejor experiencia"],
          ["⚙️","Puedes activar/desactivar cada tipo individualmente"],
        ].map(([ic,txt],i)=>(
          <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:i<4?`1px solid ${C.border}`:"",alignItems:"flex-start"}}>
            <span style={{fontSize:16,flexShrink:0}}>{ic}</span>
            <span style={{color:C.text,fontSize:13}}>{txt}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

          <Inp label="Contraseña actual" value={form.empCurrent} onChange={f("empCurrent")} type="password" placeholder="Contraseña actual del empleado"/>
          <Inp label="Nueva contraseña" value={form.empNew} onChange={f("empNew")} type="password" placeholder="Mínimo 4 caracteres"/>
          <Inp label="Confirmar nueva" value={form.empConfirm} onChange={f("empConfirm")} type="password" placeholder="Repite la nueva contraseña"/>
        </div>
        {msg.employee&&<div style={{marginTop:8,color:msg.employee.startsWith("✅")?C.green:C.red,fontWeight:600,fontSize:13}}>{msg.employee}</div>}
        <div style={{marginTop:12}}><Btn onClick={()=>changePass("employee")} color={C.blue}>🔑 Cambiar Contraseña Empleado</Btn></div>
      </Card>

      {/* Current passwords hint */}
      <Card style={{background:C.hi}}>
        <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>🔐 Contraseñas actuales guardadas</div>
        <div style={{color:C.muted,fontSize:12}}>👑 Jefe: <b style={{color:C.text}}>{"•".repeat(passes.owner.length)}</b> ({passes.owner.length} caracteres)</div>
        <div style={{color:C.muted,fontSize:12,marginTop:4}}>👤 Empleado: <b style={{color:C.text}}>{"•".repeat(passes.employee.length)}</b> ({passes.employee.length} caracteres)</div>
      </Card>
    </div>
  );
}
