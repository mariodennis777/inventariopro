function getDaysUntil(month,day){
  const now=new Date();
  let target=new Date(now.getFullYear(),month-1,day);
  if(target<=now)target=new Date(now.getFullYear()+1,month-1,day);
  return Math.ceil((target-now)/(1000*60*60*24));
}
function getUpcoming(maxDays=90){
  return BOLIVIA_DATES.map(e=>({...e,daysLeft:getDaysUntil(e.month,e.day)}))
    .filter(e=>e.daysLeft<=maxDays).sort((a,b)=>a.daysLeft-b.daysLeft);
}

function useLS(key,init){
  const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
  return [v,setV];
}

// ── DASHBOARD ──
function Dashboard({products,salesLog,role}){
  const low=products.filter(p=>p.stock<p.min_stock);
  const now=new Date();
  // Expiry alerts
  const expiring=products.filter(p=>{
    if(!p.has_expiry||!p.expiry_date)return false;
    const exp=new Date(p.expiry_date);
    const days=Math.ceil((exp-now)/(1000*60*60*24));
    return days<=30&&days>=0;
  });
  const expired=products.filter(p=>{
    if(!p.has_expiry||!p.expiry_date)return false;
    return new Date(p.expiry_date)<now;
  });
  const monthP=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,x)=>s+(x.profit||0),0);
  const yearP=salesLog.reduce((s,x)=>s+(x.profit||0),0);
  const top5=[...products].sort((a,b)=>b.sales-a.sales).slice(0,5);

  const daysLeft=d=>{const days=Math.ceil((new Date(d)-now)/(1000*60*60*24));return days;};

  return(
    <div>
      {/* Stock bajo */}
      {low.length>0&&(
        <div style={{background:"#7C1D1D22",border:"1px solid #EF444466",borderRadius:12,padding:"12px 18px",marginBottom:12,display:"flex",gap:12}}>
          <span style={{fontSize:22}}>🚨</span>
          <div>
            <div style={{color:C.red,fontWeight:700,marginBottom:4}}>¡Stock Bajo — {low.length} producto(s)!</div>
            {low.map(p=><div key={p.id} style={{color:"#FCA5A5",fontSize:13}}>• <b>{p.name}</b>: {p.stock} uds (mín {p.min_stock}){p.supplier_phone&&<span> — 📞 {p.supplier_phone}</span>}</div>)}
          </div>
        </div>
      )}
      {/* Productos vencidos */}
      {expired.length>0&&(
        <div style={{background:"#1a0a0022",border:"1px solid #92400E66",borderRadius:12,padding:"12px 18px",marginBottom:12,display:"flex",gap:12}}>
          <span style={{fontSize:22}}>☠️</span>
          <div>
            <div style={{color:"#E91E8C",fontWeight:700,marginBottom:4}}>¡VENCIDOS — {expired.length} producto(s)!</div>
            {expired.map(p=><div key={p.id} style={{color:"#FCD34D",fontSize:13}}>• <b>{p.name}</b>: venció el {p.expiry_date}</div>)}
          </div>
        </div>
      )}
      {/* Por vencer */}
      {expiring.length>0&&(
        <div style={{background:"#1C1A0022",border:"1px solid #D9770666",borderRadius:12,padding:"12px 18px",marginBottom:12,display:"flex",gap:12}}>
          <span style={{fontSize:22}}>⏰</span>
          <div>
            <div style={{color:C.orange,fontWeight:700,marginBottom:4}}>¡Por Vencer — {expiring.length} producto(s)!</div>
            {expiring.map(p=>{const d=daysLeft(p.expiry_date);return(
              <div key={p.id} style={{color:"#FED7AA",fontSize:13}}>• <b>{p.name}</b>: vence en <b style={{color:d<=7?C.red:C.orange}}>{d} día{d!==1?"s":""}</b> ({p.expiry_date})</div>
            );})}
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
        {[["📦 Productos",products.length,C.blue],["⚠️ Stock Bajo",low.length,C.red],
          ...(role==="owner"?[["💰 Ganancia Mes",`Bs. ${monthP.toLocaleString()}`,C.green],["📈 Ganancia Año",`Bs. ${yearP.toLocaleString()}`,C.accent]]:[])
        ].map(([l,v,c])=>(
          <Card key={l} style={{flex:1,minWidth:140}}>
            <div style={{color:C.muted,fontSize:12,marginBottom:6}}>{l}</div>
            <div style={{color:c,fontSize:22,fontWeight:800}}>{v}</div>
          </Card>
        ))}
      </div>
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14}}>🏆 Top 5 Más Vendidos</div>
        {top5.map((p,i)=>(
          <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:i<4?`1px solid ${C.border}`:"none"}}>
            <span style={{color:C.accent,fontWeight:800,width:24}}>#{i+1}</span>
            {p.image&&<img src={p.image} style={{width:28,height:28,borderRadius:5,objectFit:"cover"}}/>}
            <span style={{flex:1}}>{p.name}</span>
            {p.has_expiry&&p.expiry_date&&(()=>{const d=daysLeft(p.expiry_date);return d<=30?<Badge color={d<=0?C.red:d<=7?C.red:C.orange}>{d<=0?"VENCIDO":`${d}d`}</Badge>:null;})()}
            <Badge color={C.green}>{p.sales} ventas</Badge>
            <span style={{color:p.stock<p.min_stock?C.red:C.green,fontWeight:700,width:55,textAlign:"right"}}>{p.stock} uds</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

  const [newImage,setNewImage]=useState(null);
  const empty={name:"",category:"",stock:"",min_stock:"",price:"",cost_price:"",supplier_name:"",supplier_phone:"",barcode:"",has_expiry:false,expiry_date:""};
  const [form,setForm]=useState(empty);
  const fileRefs=useRef({});
  const addImgRef=useRef();
  const barcodeRef=useRef();
  const [msg,setMsg]=useState("");
  const f=k=>e=>setForm(v=>({...v,[k]:e.target.value}));
  const filtered=products.filter(p=>
    p.name.toLowerCase().includes(search.toLowerCase())||
    p.category?.toLowerCase().includes(search.toLowerCase())||
    (p.barcode&&p.barcode.includes(search))
  );

  const now=new Date();
  const daysLeft=d=>{if(!d)return null;return Math.ceil((new Date(d)-now)/(1000*60*60*24));};
  const expiryColor=d=>{if(d===null)return null;if(d<=0)return C.red;if(d<=7)return C.red;if(d<=30)return C.orange;return C.green;};
  const expiryLabel=d=>{if(d===null)return"";if(d<=0)return"☠️ VENCIDO";if(d===1)return"⚠️ Vence mañana";if(d<=30)return`⏰ Vence en ${d}d`;return`✅ ${d} días`;};

  const save=async()=>{
    if(!form.name.trim())return;
    const data={...form,stock:+form.stock,min_stock:+form.min_stock,price:+form.price,cost_price:+form.cost_price,image:newImage||null,has_expiry:form.has_expiry,expiry_date:form.has_expiry?form.expiry_date:""};
    if(editId){
      if(online)await sb.from("products").update(data).eq("id",editId);
      setProducts(ps=>ps.map(p=>p.id===editId?{...p,...data}:p));
      setEditId(null);
    }else{
      if(online){const{data:ins}=await sb.from("products").insert([{...data,sales:0}]).select().single();if(ins)setProducts(ps=>[...ps,ins]);}
      else setProducts(ps=>[...ps,{...data,id:Date.now(),sales:0}]);
      setShowAdd(false);
    }
    setForm(empty);setNewImage(null);
  };

  const del=async(id)=>{
    if(!window.confirm("¿Eliminar este producto?"))return;
    if(online)await sb.from("products").delete().eq("id",id);
    setProducts(ps=>ps.filter(p=>p.id!==id));
  };

  const updStock=async(id,delta)=>{
    const p=products.find(x=>x.id===id);
    const ns=Math.max(0,p.stock+delta);
    if(online)await sb.from("products").update({stock:ns}).eq("id",id);
    setProducts(ps=>ps.map(x=>x.id===id?{...x,stock:ns}:x));
  };

  const uploadImg=(id,e)=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      const img=ev.target.result;
      if(online)await sb.from("products").update({image:img}).eq("id",id);
      setProducts(ps=>ps.map(p=>p.id===id?{...p,image:img}:p));
    };
    r.readAsDataURL(file);
  };

  const uploadNewImg=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>setNewImage(ev.target.result);
    r.readAsDataURL(file);
  };

  const handleBarcodeScan=e=>{
    const val=e.target.value;
    setForm(v=>({...v,barcode:val}));
    if(val.length>=8){
      const existing=products.find(p=>p.barcode===val);
      if(existing){
        setMsg(`✅ Encontrado: ${existing.name}`);
        setEditId(existing.id);
        setForm({name:existing.name,category:existing.category||"",stock:existing.stock,min_stock:existing.min_stock,price:existing.price,cost_price:existing.cost_price,supplier_name:existing.supplier_name||"",supplier_phone:existing.supplier_phone||"",barcode:val,has_expiry:existing.has_expiry||false,expiry_date:existing.expiry_date||""});
        setShowAdd(false);setBarcodeMode(false);
      }
    }
  };

  // Switch component
  const Switch=({value,onChange,label,color=C.green})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>onChange(!value)}>
      <div style={{width:42,height:24,background:value?color:C.border,borderRadius:12,position:"relative",transition:"all .25s",flexShrink:0}}>
        <div style={{position:"absolute",top:3,left:value?20:3,width:18,height:18,background:"#fff",borderRadius:"50%",transition:"all .25s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>
      </div>
      <span style={{color:value?color:C.muted,fontSize:13,fontWeight:value?600:400}}>{label}</span>
    </div>
  );

  const [aiDescLoading,setAiDescLoading]=useState(false);
  const [aiSuggest,setAiSuggest]=useState(null);

  const generateAIDesc=async()=>{
    if(!form.name.trim()){setMsg("❌ Escribe primero el nombre del producto");return;}
    setAiDescLoading(true);setAiSuggest(null);
    const businessContext=products.slice(0,10).map(p=>`${p.name}(${p.category||"?"},Bs.${p.price})`).join(",");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:600,
          messages:[{role:"user",content:`Eres asistente de un negocio boliviano. El dueño está agregando este producto al inventario:
Nombre: "${form.name}"
Categoría: "${form.category||"no especificada"}"
Precio venta: Bs. ${form.price||"no definido"}
Otros productos del negocio: ${businessContext}

Genera en JSON:
{
  "descripcion": "descripción atractiva de 1-2 líneas para el catálogo, sin mencionar precio ni fecha de vencimiento",
  "categoria_sugerida": "categoría si no está definida",
  "precio_sugerido": número en bolivianos si el precio parece bajo o alto para Bolivia,
  "precio_ok": true/false,
  "min_stock_sugerido": número,
  "tags": ["etiqueta1","etiqueta2"],
  "consejo": "un consejo corto de venta o marketing para este producto específico en Bolivia"
}
Responde SOLO el JSON.`}]
        })
      });
      const data=await res.json();
      const text=data.content?.[0]?.text||"{}";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setAiSuggest(parsed);
    }catch{
      // Fallback offline suggestion
      setAiSuggest({
        descripcion:`${form.name} de alta calidad${form.category?` para ${form.category}`:""}. Producto disponible en stock.`,
        categoria_sugerida:form.category||"General",
        precio_ok:true,
        min_stock_sugerido:5,
        consejo:"Coloca este producto en un lugar visible y ofrece descuento por volumen para aumentar ventas."
      });
    }
    setAiDescLoading(false);
  };

  const applyAISuggest=()=>{
    if(!aiSuggest)return;
    setForm(f=>({
      ...f,
      description:aiSuggest.descripcion||f.description,
      category:(!f.category&&aiSuggest.categoria_sugerida)?aiSuggest.categoria_sugerida:f.category,
      min_stock:(!f.min_stock&&aiSuggest.min_stock_sugerido)?aiSuggest.min_stock_sugerido:f.min_stock,
      price:(!f.price&&aiSuggest.precio_sugerido)?aiSuggest.precio_sugerido:f.price,
    }));
    setAiSuggest(null);
  };

  const FormPanel=({title})=>(
    <Card style={{marginBottom:14,background:C.hi}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700}}>{title}</div>
        <Btn small onClick={generateAIDesc} disabled={aiDescLoading} color={C.purple}>
          {aiDescLoading?"⏳ Analizando...":"🤖 Ayuda con IA"}
        </Btn>
      </div>

      {/* AI Suggestion Panel */}
      {aiSuggest&&(
        <div style={{background:C.purple+"11",border:`1px solid ${C.purple}44`,borderRadius:10,padding:12,marginBottom:14}}>
          <div style={{color:C.purple,fontWeight:700,marginBottom:8,fontSize:13}}>🤖 ARIA sugiere para "{form.name}":</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {aiSuggest.descripcion&&(
              <div style={{background:C.card,borderRadius:8,padding:"8px 10px"}}>
                <div style={{color:C.muted,fontSize:10,marginBottom:2}}>📝 DESCRIPCIÓN SUGERIDA:</div>
                <div style={{color:C.text,fontSize:13}}>{aiSuggest.descripcion}</div>
              </div>
            )}
            {aiSuggest.consejo&&(
              <div style={{background:C.card,borderRadius:8,padding:"8px 10px"}}>
                <div style={{color:C.muted,fontSize:10,marginBottom:2}}>💡 CONSEJO DE VENTAS:</div>
                <div style={{color:C.green,fontSize:13,fontWeight:600}}>{aiSuggest.consejo}</div>
              </div>
            )}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12}}>
              {aiSuggest.categoria_sugerida&&!form.category&&<span style={{background:C.blue+"22",color:C.blue,borderRadius:6,padding:"3px 8px"}}>📁 Categoría: {aiSuggest.categoria_sugerida}</span>}
              {aiSuggest.min_stock_sugerido&&<span style={{background:C.orange+"22",color:C.orange,borderRadius:6,padding:"3px 8px"}}>📦 Stock mín sugerido: {aiSuggest.min_stock_sugerido}</span>}
              {!aiSuggest.precio_ok&&aiSuggest.precio_sugerido&&<span style={{background:C.red+"22",color:C.red,borderRadius:6,padding:"3px 8px"}}>💲 Precio sugerido: Bs. {aiSuggest.precio_sugerido}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn small onClick={applyAISuggest} color={C.purple}>✅ Aplicar sugerencias</Btn>
            <Btn small onClick={()=>setAiSuggest(null)} outline color={C.muted}>✕ Ignorar</Btn>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
        {/* FOTO */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <div onClick={()=>addImgRef.current?.click()}
            style={{width:90,height:90,borderRadius:12,background:C.card,border:`2px dashed ${C.accent}55`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",flexShrink:0}}>
            {newImage
              ?<img src={newImage} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<div style={{textAlign:"center"}}><div style={{fontSize:28}}>📷</div><div style={{color:C.accent,fontSize:10,marginTop:2}}>Agregar foto</div></div>}
          </div>
          <input ref={addImgRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={uploadNewImg}/>
          {newImage&&<Btn small onClick={()=>setNewImage(null)} color={C.red} outline>✕ Quitar</Btn>}
        </div>
        {/* CAMPOS */}
        <div style={{flex:1,display:"flex",gap:10,flexWrap:"wrap"}}>
          <Inp label="Nombre *" value={form.name} onChange={f("name")} placeholder="Nombre del producto"/>
          <Inp label="Categoría" value={form.category} onChange={f("category")} placeholder="ej: Bebidas"/>
          {/* Descripción con IA */}
          <div style={{width:"100%"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{color:C.muted,fontSize:11}}>Descripción</div>
              <span style={{color:C.purple,fontSize:10,cursor:"pointer"}} onClick={generateAIDesc}>🤖 Generar con IA</span>
            </div>
            <textarea value={form.description||""} onChange={e=>setForm(v=>({...v,description:e.target.value}))}
              placeholder="Descripción del producto para el catálogo..."
              rows={2}
              style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
          </div>
          <Inp label="Stock actual" value={form.stock} onChange={f("stock")} type="number"/>
          <Inp label="Stock mínimo" value={form.min_stock} onChange={f("min_stock")} type="number"/>
          <Inp label="Precio Venta Bs." value={form.price} onChange={f("price")} type="number"/>
          <Inp label="Precio Compra Bs." value={form.cost_price} onChange={f("cost_price")} type="number"/>
          <Inp label="Proveedor" value={form.supplier_name} onChange={f("supplier_name")}/>
          <Inp label="📞 Tel. Proveedor" value={form.supplier_phone} onChange={f("supplier_phone")}/>
          {/* Código de barras */}
          <div style={{flex:1,minWidth:200}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:4}}>📊 Código de Barras (opcional)</div>
            <div style={{display:"flex",gap:6}}>
              <input value={form.barcode} onChange={f("barcode")} placeholder="Escanea o escribe el código"
                ref={barcodeRef}
                style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}/>
            </div>
          </div>

          {/* FECHA DE VENCIMIENTO — SWITCH */}
          <div style={{width:"100%",background:C.card,borderRadius:10,padding:12,border:`1px solid ${C.border}`}}>
            <div style={{marginBottom:form.has_expiry?12:0}}>
              <Switch
                value={form.has_expiry}
                onChange={v=>setForm(f=>({...f,has_expiry:v,expiry_date:v?f.expiry_date:""}))}
                label="📅 Este producto tiene fecha de vencimiento"
                color={C.orange}
              />
            </div>
            {form.has_expiry&&(
              <div>
                <div style={{color:C.muted,fontSize:11,marginBottom:6}}>Fecha de vencimiento *</div>
                <input
                  type="date"
                  value={form.expiry_date}
                  onChange={f("expiry_date")}
                  min={new Date().toISOString().split("T")[0]}
                  style={{width:"100%",background:C.hi,border:`2px solid ${C.orange}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:14,fontWeight:600,boxSizing:"border-box"}}
                />
                {form.expiry_date&&(()=>{
                  const d=daysLeft(form.expiry_date);
                  return<div style={{color:expiryColor(d),fontSize:12,marginTop:6,fontWeight:600}}>{expiryLabel(d)}</div>;
                })()}
                <div style={{color:C.muted,fontSize:11,marginTop:6}}>
                  ⏰ Se creará automáticamente una alarma 30 días antes de vencer
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap",alignItems:"center"}}>
        <Btn onClick={save} color={C.green}>💾 Guardar Producto</Btn>
        <Btn onClick={()=>{setShowAdd(false);setEditId(null);setForm(empty);setNewImage(null);}} outline color={C.muted}>Cancelar</Btn>
        {msg&&<span style={{color:C.green,fontSize:13,fontWeight:600}}>{msg}</span>}
      </div>
    </Card>
  );

  return(
    <div>
      {/* BANNER INVENTARIO */}
      <div style={{borderRadius:14,overflow:"hidden",marginBottom:18,boxShadow:"0 6px 24px rgba(0,0,0,.25)",cursor:"pointer",position:"relative",transition:"transform .15s,box-shadow .15s"}}
        onClick={()=>{setShowAdd(s=>!s);setEditId(null);setNewImage(null);}}
        onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.01)";e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,.35)";}}
        onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 6px 24px rgba(0,0,0,.25)";}}

      </div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input placeholder="🔍 Buscar nombre, categoría o código..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{flex:1,minWidth:180,background:C.hi,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",color:C.text,fontSize:14}}/>
        {role==="owner"&&(
          <div style={{display:"flex",alignItems:"center",gap:8,background:C.hi,borderRadius:10,padding:"6px 12px"}}>
            <span style={{fontSize:14}}>📊</span>
            <span style={{color:C.muted,fontSize:12}}>Código de barras</span>
            <div onClick={()=>setBarcodeMode(b=>!b)}
              style={{width:40,height:22,background:barcodeMode?C.green:C.border,borderRadius:11,cursor:"pointer",position:"relative",transition:"all .2s"}}>
              <div style={{position:"absolute",top:3,left:barcodeMode?20:3,width:16,height:16,background:"#fff",borderRadius:"50%",transition:"all .2s"}}/>
            </div>
          </div>
        )}
        {role==="owner"&&<Btn onClick={()=>{setShowAdd(s=>!s);setEditId(null);setNewImage(null);}}>+ Agregar</Btn>}
      </div>

      {barcodeMode&&role==="owner"&&(
        <Card style={{marginBottom:14,background:C.blue+"11",border:`1px solid ${C.blue}44`}}>
          <div style={{color:C.blue,fontWeight:700,marginBottom:8}}>📊 Modo Código de Barras ACTIVADO</div>
          <input autoFocus placeholder="📊 Escanea aquí el código de barras..." onChange={handleBarcodeScan}
            style={{width:"100%",background:C.card,border:`2px solid ${C.blue}`,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:15,fontWeight:600,boxSizing:"border-box"}}/>
          <div style={{color:C.muted,fontSize:11,marginTop:8}}>Si el producto ya existe lo encontrará automáticamente.</div>
        </Card>
      )}

      {showAdd&&!editId&&<FormPanel title="➕ Nuevo Producto"/>}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(p=>{
          const dl=p.has_expiry&&p.expiry_date?daysLeft(p.expiry_date):null;
          return(
            <div key={p.id}>
              {editId===p.id&&<FormPanel title={`✏️ Editando: ${p.name}`}/>}
              <Card style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",border:dl!==null&&dl<=30?`1px solid ${expiryColor(dl)}55`:`1px solid ${C.border}`}}>
                {/* Photo */}
                <div onClick={()=>role==="owner"&&fileRefs.current[p.id]?.click()}
                  style={{width:58,height:58,borderRadius:10,background:C.hi,display:"flex",alignItems:"center",justifyContent:"center",cursor:role==="owner"?"pointer":"default",overflow:"hidden",border:`2px dashed ${C.border}`,flexShrink:0,position:"relative"}}>
                  {p.image?<img src={p.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:24}}>📦</span>}
                  {role==="owner"&&<div style={{position:"absolute",bottom:0,right:0,background:C.accent,borderRadius:"3px 0 8px 0",padding:"1px 4px",fontSize:9}}>📷</div>}
                  {role==="owner"&&<input ref={el=>fileRefs.current[p.id]=el} type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadImg(p.id,e)}/>}
                </div>
                {/* Info */}
                <div style={{flex:1,minWidth:130}}>
                  <div style={{fontWeight:700,fontSize:15}}>{p.name}</div>
                  <div style={{color:C.muted,fontSize:12}}>{p.category}</div>
                  {p.barcode&&<div style={{color:C.blue,fontSize:10}}>📊 {p.barcode}</div>}
                  {p.supplier_name&&<div style={{color:C.blue,fontSize:11}}>🏭 {p.supplier_name}{p.supplier_phone&&<span> · 📞 {p.supplier_phone}</span>}</div>}
                  {/* Expiry date display */}
                  {p.has_expiry&&p.expiry_date&&(
                    <div style={{color:expiryColor(dl),fontSize:12,fontWeight:600,marginTop:2}}>
                      📅 Vence: {p.expiry_date} · {expiryLabel(dl)}
                    </div>
                  )}
                </div>
                {/* Stock */}
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {role==="owner"&&<button onClick={()=>updStock(p.id,-1)} style={{background:C.red+"33",color:C.red,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",fontWeight:900,fontSize:18}}>−</button>}
                  <div style={{textAlign:"center",minWidth:52}}>
                    <div style={{fontWeight:800,fontSize:22,color:p.stock<p.min_stock?C.red:C.green}}>{p.stock}</div>
                    <div style={{fontSize:10,color:C.muted}}>mín {p.min_stock}</div>
                  </div>
                  {role==="owner"&&<button onClick={()=>updStock(p.id,1)} style={{background:C.green+"33",color:C.green,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",fontWeight:900,fontSize:18}}>+</button>}
                </div>
                {/* Price */}
                {role==="owner"&&(
                  <div style={{textAlign:"right",minWidth:90}}>
                    <div style={{color:C.accent,fontWeight:700,fontSize:15}}>Bs. {p.price}</div>
                    <div style={{color:C.muted,fontSize:11}}>Costo: Bs. {p.cost_price}</div>
                  </div>
                )}
                {/* Badges */}
                <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                  {p.stock<p.min_stock?<Badge color={C.red}>⚠ BAJO</Badge>:<Badge color={C.green}>✓ OK</Badge>}
                  {dl!==null&&dl<=30&&<Badge color={expiryColor(dl)}>{dl<=0?"☠️ VENCIDO":dl<=7?"🔴 PRONTO":"⏰ "+dl+"d"}</Badge>}
                </div>
                {/* Actions */}
                {role==="owner"&&(
                  <div style={{display:"flex",gap:6}}>
                    <Btn small onClick={()=>{
                      setForm({name:p.name,category:p.category||"",stock:p.stock,min_stock:p.min_stock,price:p.price,cost_price:p.cost_price,supplier_name:p.supplier_name||"",supplier_phone:p.supplier_phone||"",barcode:p.barcode||"",has_expiry:p.has_expiry||false,expiry_date:p.expiry_date||""});
                      setNewImage(p.image||null);setEditId(p.id);setShowAdd(false);
                    }} color={C.blue} outline>✏️</Btn>
                    <Btn small onClick={()=>del(p.id)} color={C.red} outline>🗑️</Btn>
                  </div>
                )}
              </Card>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:40}}>No hay productos. {role==="owner"&&"¡Agrega el primero!"}</div>}
      </div>
    </div>
  );
}

// ── VENTAS ──
function SalesRegister({products,setProducts,salesLog,setSalesLog,clients,setClients,online}){
  const [cart,setCart]=useState([]);
  const [clientName,setClientName]=useState("");
  const [selectedClientId,setSelectedClientId]=useState("");
  const [saleDate,setSaleDate]=useState(new Date().toISOString().split("T")[0]);
  const [msg,setMsg]=useState("");
  const [showHistory,setShowHistory]=useState(false);
  const [usePoints,setUsePoints]=useState(0);

  const selectedClient=clients?.find(c=>c.id===+selectedClientId);
  const availablePoints=selectedClient?.points||0;

  // Form for adding to cart
  const emptyItem={product_id:"",quantity:"1",sale_price:"",discount_reason:""};
  const [item,setItem]=useState(emptyItem);
  const fi=k=>e=>setItem(v=>({...v,[k]:e.target.value}));
  const selProd=products.find(p=>p.id===+item.product_id);
  useEffect(()=>{if(selProd)setItem(v=>({...v,sale_price:selProd.price}));},[item.product_id]);

  // Cart calculations
  const cartTotal=cart.reduce((s,i)=>s+(i.sale_price*i.quantity),0);
  const cartProfit=cart.reduce((s,i)=>s+((i.sale_price-i.cost_price)*i.quantity),0);
  const cartDiscount=cart.reduce((s,i)=>s+((i.original_price-i.sale_price)*i.quantity),0);
  const pointsToEarn=Math.floor(cartTotal/15); // Bs.15 = 1 point
  const finalTotal=Math.max(0,cartTotal-usePoints);

  const addToCart=()=>{
    if(!item.product_id||!item.quantity||!item.sale_price){setMsg("❌ Selecciona producto, cantidad y precio");setTimeout(()=>setMsg(""),2000);return;}
    const p=selProd;
    const qty=+item.quantity;
    if(qty>p.stock){setMsg(`❌ Stock insuficiente. Solo hay ${p.stock} unidades.`);setTimeout(()=>setMsg(""),2500);return;}
    const existing=cart.find(c=>c.product_id===p.id);
    if(existing){
      setCart(c=>c.map(x=>x.product_id===p.id?{...x,quantity:x.quantity+qty}:x));
    } else {
      setCart(c=>[...c,{
        product_id:p.id,product_name:p.name,
        quantity:qty,original_price:p.price,
        sale_price:+item.sale_price,
        discount:(p.price-+item.sale_price),
        discount_reason:item.discount_reason,
        cost_price:p.cost_price||0,
        image:p.image,
      }]);
    }
    setItem(emptyItem);
    setMsg("✅ Agregado al carrito");
    setTimeout(()=>setMsg(""),1500);
  };

  const removeFromCart=id=>setCart(c=>c.filter(x=>x.product_id!==id));
  const updateCartQty=(id,delta)=>setCart(c=>c.map(x=>x.product_id===id?{...x,quantity:Math.max(1,x.quantity+delta)}:x));

  const confirmSale=async()=>{
    if(cart.length===0){setMsg("❌ El carrito está vacío");setTimeout(()=>setMsg(""),2000);return;}
    const now=Date.now();
    const name=selectedClient?selectedClient.name:(clientName||"Cliente general");
    const entries=cart.map((ci,idx)=>({
      id:now+idx,
      product_id:ci.product_id,product_name:ci.product_name,
      quantity:ci.quantity,original_price:ci.original_price,
      sale_price:ci.sale_price,discount:ci.discount*ci.quantity+(usePoints>0?usePoints/cart.length:0),
      discount_reason:ci.discount_reason||(usePoints>0?`Canje ${usePoints} puntos`:""),
      cost_price:ci.cost_price,
      profit:(ci.sale_price-ci.cost_price)*ci.quantity,
      sale_date:saleDate,
      client_name:name,
      sale_group:now,
    }));
    setSalesLog(s=>[...entries,...s]);
    setProducts(ps=>ps.map(p=>{
      const ci=cart.find(c=>c.product_id===p.id);
      return ci?{...p,stock:Math.max(0,p.stock-ci.quantity),sales:(p.sales||0)+ci.quantity}:p;
    }));

    // Update client points
    if(selectedClient&&setClients){
      setClients(cs=>cs.map(c=>{
        if(c.id!==selectedClient.id)return c;
        const newPoints=Math.max(0,(c.points||0)-usePoints+pointsToEarn);
        const hist=[...(c.points_history||[]),
          ...(usePoints>0?[{date:saleDate,action:`Canje ${usePoints} pts en compra`,pts_earned:-usePoints,balance:(c.points||0)-usePoints}]:[]),
          {date:saleDate,action:`Compra Bs. ${cartTotal} → +${pointsToEarn} pts`,pts_earned:pointsToEarn,balance:newPoints}
        ];
        return{...c,total:(+c.total||0)+cartTotal,orders:(c.orders||0)+1,last_order:saleDate,points:newPoints,points_used:(c.points_used||0)+usePoints,points_history:hist};
      }));
    }

    if(online){
      try{
        for(const e of entries){
          await sb.from("sales_log").insert([e]);
          await sb.from("products").update({stock:products.find(p=>p.id===e.product_id)?.stock-e.quantity}).eq("id",e.product_id);
        }
      }catch(err){console.log("Sync error",err);}
    }
    const pointsMsg=usePoints>0?` · Canjeó ${usePoints} pts · Ganó ${pointsToEarn} pts`:`· Ganó ${pointsToEarn} pts⭐`;
    setMsg(`✅ ¡Venta registrada! Total: Bs. ${finalTotal.toLocaleString()}${pointsMsg}`);
    setCart([]);setClientName("");setSelectedClientId("");setUsePoints(0);
    setTimeout(()=>setMsg(""),5000);
  };

  // Group sales by sale_group for history
  const groupedSales=[];
  const seen=new Set();
  salesLog.forEach(s=>{
    const key=s.sale_group||s.id;
    if(!seen.has(key)){
      seen.add(key);
      const group=salesLog.filter(x=>(x.sale_group||x.id)===key);
      groupedSales.push({key,date:s.sale_date,client:s.client_name||"General",items:group,total:group.reduce((a,x)=>a+x.sale_price*x.quantity,0),profit:group.reduce((a,x)=>a+(x.profit||0),0)});
    }
  });

  return(
    <div>
      {/* ADD TO CART */}
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:14,fontSize:15}}>🛒 Nueva Venta con Carrito</div>

        {/* Client + Date */}
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
          <Inp label="👤 Nombre del Cliente" value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="ej: Juan Pérez (opcional)"/>
          {/* Client selector with points */}
          <div style={{flex:1,minWidth:180}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:4}}>⭐ Cliente registrado (con puntos)</div>
            <select value={selectedClientId} onChange={e=>{setSelectedClientId(e.target.value);setUsePoints(0);const c=clients?.find(x=>x.id===+e.target.value);if(c)setClientName(c.name);}}
              style={{width:"100%",background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}>
              <option value="">-- Seleccionar cliente registrado --</option>
              {(clients||[]).sort((a,b)=>a.name.localeCompare(b.name)).map(c=><option key={c.id} value={c.id}>{c.name} · ⭐{c.points||0} pts</option>)}
            </select>
          </div>
          <Inp label="📅 Fecha" value={saleDate} onChange={e=>setSaleDate(e.target.value)} type="date"/>
        </div>

        {/* Product selector */}
        <div style={{background:C.hi,borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{color:C.text,fontWeight:600,fontSize:13,marginBottom:10}}>➕ Agregar producto al carrito</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:2,minWidth:160}}>
              <div style={{color:C.muted,fontSize:11,marginBottom:4}}>Producto *</div>
              <select value={item.product_id} onChange={fi("product_id")} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}>
                <option value="">-- Selecciona producto --</option>
                {products.map(p=><option key={p.id} value={p.id} disabled={p.stock===0}>{p.name} — Stock: {p.stock} uds | Bs. {p.price}{p.stock===0?" (AGOTADO)":""}</option>)}
              </select>
            </div>
            <Inp label="Cantidad" value={item.quantity} onChange={fi("quantity")} type="number"/>
            <Inp label="Precio Bs." value={item.sale_price} onChange={fi("sale_price")} type="number"/>
            <Inp label="Motivo desc." value={item.discount_reason} onChange={fi("discount_reason")} placeholder="opcional"/>
          </div>
          {selProd&&item.sale_price&&(
            <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
              {(selProd.price-+item.sale_price)>0&&<div style={{background:C.red+"22",borderRadius:6,padding:"4px 10px",fontSize:12,color:C.red}}>Desc: Bs. {(selProd.price-+item.sale_price).toFixed(2)}</div>}
              <div style={{background:C.green+"22",borderRadius:6,padding:"4px 10px",fontSize:12,color:C.green}}>Ganancia: Bs. {((+item.sale_price-(selProd.cost_price||0))*(+item.quantity)).toFixed(2)}</div>
            </div>
          )}
          <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
            <Btn onClick={addToCart} color={C.blue}>🛒 Agregar al Carrito</Btn>
            {msg&&<span style={{color:msg.startsWith("✅")?C.green:C.red,fontSize:13,fontWeight:600}}>{msg}</span>}
          </div>
        </div>

        {/* CART */}
        {cart.length>0&&(
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:13,marginBottom:8}}>🧺 Carrito — {cart.length} producto(s)</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
              {cart.map(ci=>(
                <div key={ci.product_id} style={{display:"flex",alignItems:"center",gap:10,background:C.hi,borderRadius:10,padding:"10px 12px"}}>
                  {ci.image&&<img src={ci.image} style={{width:36,height:36,borderRadius:6,objectFit:"cover",flexShrink:0}}/>}
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13}}>{ci.product_name}</div>
                    <div style={{color:C.muted,fontSize:11}}>Bs. {ci.sale_price} c/u{ci.discount>0?<span style={{color:C.red}}> · Desc: Bs. {ci.discount}</span>:""}</div>
                  </div>
                  {/* Qty controls */}
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <button onClick={()=>updateCartQty(ci.product_id,-1)} style={{background:C.red+"33",color:C.red,border:"none",borderRadius:5,width:24,height:24,cursor:"pointer",fontWeight:900}}>−</button>
                    <span style={{fontWeight:700,minWidth:20,textAlign:"center"}}>{ci.quantity}</span>
                    <button onClick={()=>updateCartQty(ci.product_id,1)} style={{background:C.green+"33",color:C.green,border:"none",borderRadius:5,width:24,height:24,cursor:"pointer",fontWeight:900}}>+</button>
                  </div>
                  <div style={{color:C.accent,fontWeight:800,minWidth:70,textAlign:"right"}}>Bs. {(ci.sale_price*ci.quantity).toLocaleString()}</div>
                  <button onClick={()=>removeFromCart(ci.product_id)} style={{background:"transparent",border:"none",color:C.red,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
                </div>
              ))}
            </div>

            {/* Points panel */}
            {selectedClient&&cart.length>0&&(
              <div style={{background:C.accent+"11",border:`1px solid ${C.accent}44`,borderRadius:10,padding:12,marginBottom:12}}>
                <div style={{color:C.accent,fontWeight:700,marginBottom:8}}>⭐ Puntos de {selectedClient.name}</div>
                <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:8,fontSize:13}}>
                  <div>Disponibles: <b style={{color:C.accent}}>{availablePoints} pts = Bs. {availablePoints}</b></div>
                  <div>Esta compra ganará: <b style={{color:C.green}}>+{pointsToEarn} pts</b></div>
                </div>
                {availablePoints>0&&(
                  <div>
                    <div style={{color:C.muted,fontSize:11,marginBottom:6}}>¿Canjear puntos como descuento?</div>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                      <input type="number" value={usePoints} min="0" max={availablePoints}
                        onChange={e=>setUsePoints(Math.min(+e.target.value,availablePoints,cartTotal))}
                        style={{width:80,background:C.card,border:`2px solid ${C.accent}`,borderRadius:8,padding:"6px 10px",color:C.text,fontSize:14,fontWeight:700}}/>
                      <span style={{color:C.muted,fontSize:13}}>puntos = Bs. {usePoints} descuento</span>
                      <div style={{display:"flex",gap:4}}>
                        {[5,10,20].filter(n=>n<=availablePoints).map(n=>(
                          <button key={n} onClick={()=>setUsePoints(n)} style={{background:usePoints===n?C.accent:C.hi,color:usePoints===n?"#fff":C.muted,border:`1px solid ${usePoints===n?C.accent:C.border}`,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11}}>{n}</button>
                        ))}
                        <button onClick={()=>setUsePoints(Math.min(availablePoints,cartTotal))} style={{background:C.hi,color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11}}>Max</button>
                        <button onClick={()=>setUsePoints(0)} style={{background:C.hi,color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11}}>✕</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            <div style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${C.border}`,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div style={{textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:11}}>Productos</div>
                  <div style={{color:C.text,fontWeight:700}}>{cart.reduce((s,c)=>s+c.quantity,0)} uds</div>
                </div>
                {cartDiscount>0&&<div style={{textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:11}}>Descuento total</div>
                  <div style={{color:C.red,fontWeight:700}}>-Bs. {cartDiscount.toFixed(2)}</div>
                </div>}
                <div style={{textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:11}}>Ganancia</div>
                  <div style={{color:C.green,fontWeight:700}}>Bs. {cartProfit.toFixed(2)}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:11}}>TOTAL</div>
                  <div style={{color:C.accent,fontWeight:900,fontSize:22}}>Bs. {cartTotal.toLocaleString()}</div>
                </div>
              </div>
            </div>

            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Btn onClick={confirmSale} color={C.green} style={{flex:1}}>
                ✅ Confirmar Venta — Bs. {finalTotal.toLocaleString()}
                {usePoints>0&&` (${usePoints} pts desc.)`}
              </Btn>
              <Btn onClick={()=>setCart([])} color={C.red} outline>🗑️ Vaciar</Btn>
            </div>
          </div>
        )}

        {cart.length===0&&(
          <div style={{textAlign:"center",color:C.muted,padding:"16px 0",fontSize:13}}>
            El carrito está vacío. Agrega productos arriba. 🛒
          </div>
        )}
      </Card>

      {/* HISTORY */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{color:C.accent,fontWeight:700}}>📋 Historial de Ventas ({groupedSales.length})</div>
          <Btn small onClick={()=>setShowHistory(s=>!s)} outline color={C.blue}>{showHistory?"Ocultar":"Ver historial"}</Btn>
        </div>
        {showHistory&&(
          groupedSales.length===0
          ?<div style={{color:C.muted,textAlign:"center",padding:20}}>Sin ventas registradas.</div>
          :groupedSales.slice(0,20).map((g,i)=>(
            <div key={g.key} style={{marginBottom:10,background:C.hi,borderRadius:10,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:g.items.length>1?8:0}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>👤 {g.client}</div>
                  <div style={{color:C.muted,fontSize:11}}>📅 {g.date} · {g.items.length} producto(s)</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.accent,fontWeight:800,fontSize:16}}>Bs. {g.total.toLocaleString()}</div>
                  <div style={{color:C.green,fontSize:12}}>Gan: Bs. {g.profit.toFixed(2)}</div>
                </div>
              </div>
              {g.items.length>1&&(
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {g.items.map((it,j)=>(
                    <div key={j} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,paddingLeft:8,borderLeft:`2px solid ${C.border}`}}>
                      <span>{it.product_name} × {it.quantity}</span>
                      <span style={{color:C.text}}>Bs. {(it.sale_price*it.quantity).toLocaleString()}</span>
                    </div>
                  ))}
                </div>
              )}
              {g.items.length===1&&<div style={{color:C.muted,fontSize:12}}>{g.items[0].product_name} × {g.items[0].quantity}{g.items[0].discount_reason?` · ${g.items[0].discount_reason}`:""}</div>}
            </div>
          ))
        )}
      </Card>
    </div>
  );
}

// ── GANANCIAS ──
function Profits({salesLog}){
  const now=new Date();
  const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const [chartType,setChartType]=useState("bar"); // bar, line, area
  const [metric,setMetric]=useState("profit"); // profit, sales, transactions

  const byMonth=Array.from({length:12},(_,i)=>{
    const entries=salesLog.filter(s=>{const d=new Date(s.sale_date);return d.getMonth()===i&&d.getFullYear()===now.getFullYear();});
    return{month:months[i],profit:entries.reduce((s,x)=>s+(x.profit||0),0),sales:entries.reduce((s,x)=>s+(x.sale_price*x.quantity),0),transactions:entries.length,units:entries.reduce((s,x)=>s+x.quantity,0)};
  });

  // Weekly data (last 8 weeks)
  const byWeek=Array.from({length:8},(_,i)=>{
    const end=new Date();end.setDate(end.getDate()-(i*7));
    const start=new Date(end);start.setDate(start.getDate()-7);
    const entries=salesLog.filter(s=>{const d=new Date(s.sale_date);return d>=start&&d<=end;});
    const label=`S-${8-i}`;
    return{label,profit:entries.reduce((s,x)=>s+(x.profit||0),0),sales:entries.reduce((s,x)=>s+(x.sale_price*x.quantity),0),transactions:entries.length};
  }).reverse();

  // Top products
  const topProds=[...salesLog.reduce((m,s)=>{const k=s.product_name;if(!m.has(k))m.set(k,{name:k,profit:0,sales:0,qty:0});const v=m.get(k);v.profit+=(s.profit||0);v.sales+=s.sale_price*s.quantity;v.qty+=s.quantity;return m;},new Map()).values()].sort((a,b)=>b.profit-a.profit).slice(0,6);

  const yearP=byMonth.reduce((s,m)=>s+m.profit,0);
  const yearS=byMonth.reduce((s,m)=>s+m.sales,0);
  const thisM=byMonth[now.getMonth()];
  const prevM=byMonth[now.getMonth()-1]||{profit:0,sales:0};
  const growth=prevM.profit>0?Math.round(((thisM.profit-prevM.profit)/prevM.profit)*100):0;

  const data=byMonth;
  const maxVal=Math.max(...data.map(m=>m[metric]),1);
  const accentColors=["#E91E8C","#3B82F6","#10B981","#F97316","#8B5CF6","#EF4444"];

  // SVG Line/Area chart
  const ChartSVG=({data,metric,color})=>{
    const w=300,h=80,pad=8;
    const vals=data.map(d=>d[metric]);
    const mx=Math.max(...vals,1);
    const pts=vals.map((v,i)=>({x:pad+(i/(vals.length-1))*(w-pad*2),y:h-pad-(v/mx)*(h-pad*2)}));
    const pathD="M"+pts.map(p=>`${p.x},${p.y}`).join(" L");
    const areaD=pathD+` L${pts[pts.length-1].x},${h} L${pts[0].x},${h} Z`;
    return(
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:80,display:"block"}}>
        {chartType==="area"&&<path d={areaD} fill={color+"33"}/>}
        {(chartType==="line"||chartType==="area")&&<path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>}
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color}/>)}
      </svg>
    );
  };

  const metricLabel={profit:"Ganancia Bs.",sales:"Ventas Bs.",transactions:"Transacciones"};
  const metricColor={profit:C.green,sales:C.accent,transactions:C.blue};

  return(
    <div>
      {/* KPI cards */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
        <Card style={{flex:1,minWidth:140}}>
          <div style={{color:C.muted,fontSize:11}}>💰 Ganancia este Mes</div>
          <div style={{color:C.green,fontWeight:800,fontSize:22}}>Bs. {thisM.profit.toLocaleString()}</div>
          {prevM.profit>0&&<div style={{color:growth>=0?C.green:C.red,fontSize:11,marginTop:3}}>{growth>=0?"▲":"▼"} {Math.abs(growth)}% vs mes anterior</div>}
        </Card>
        <Card style={{flex:1,minWidth:140}}>
          <div style={{color:C.muted,fontSize:11}}>📈 Ganancia Año</div>
          <div style={{color:C.accent,fontWeight:800,fontSize:22}}>Bs. {yearP.toLocaleString()}</div>
          <div style={{color:C.muted,fontSize:11,marginTop:3}}>{thisM.transactions} ventas este mes</div>
        </Card>
        <Card style={{flex:1,minWidth:140}}>
          <div style={{color:C.muted,fontSize:11}}>🛒 Ventas Año</div>
          <div style={{color:C.blue,fontWeight:800,fontSize:22}}>Bs. {yearS.toLocaleString()}</div>
          <div style={{color:C.muted,fontSize:11,marginTop:3}}>{byMonth.reduce((s,m)=>s+m.transactions,0)} transacciones</div>
        </Card>
      </div>

      {/* Chart controls */}
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
          <div style={{color:C.accent,fontWeight:700,flex:1}}>📊 Gráficas del Negocio</div>
          {/* Chart type */}
          <div style={{display:"flex",background:C.hi,borderRadius:8,padding:2,gap:2}}>
            {[{v:"bar",l:"📊"},{v:"line",l:"📈"},{v:"area",l:"🌊"}].map(({v,l})=>(
              <button key={v} onClick={()=>setChartType(v)} style={{background:chartType===v?C.accent:"transparent",color:chartType===v?"#fff":C.muted,border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>{l}</button>
            ))}
          </div>
          {/* Metric */}
          <div style={{display:"flex",background:C.hi,borderRadius:8,padding:2,gap:2}}>
            {[{v:"profit",l:"💰"},{v:"sales",l:"🛒"},{v:"transactions",l:"🔢"}].map(({v,l})=>(
              <button key={v} onClick={()=>setMetric(v)} style={{background:metric===v?metricColor[v]:"transparent",color:metric===v?"#fff":C.muted,border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13}}>{l}</button>
            ))}
          </div>
        </div>

        {/* Monthly chart */}
        <div style={{color:C.muted,fontSize:12,marginBottom:8,fontWeight:600}}>📅 {metricLabel[metric]} — Mensual {now.getFullYear()}</div>

        {chartType==="bar"&&(
          <div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100,paddingBottom:4}}>
              {byMonth.map((m,i)=>{
                const h=Math.max(4,(m[metric]/maxVal)*90);
                const isCur=i===now.getMonth();
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:8,color:isCur?metricColor[metric]:C.muted,fontWeight:isCur?700:400,textAlign:"center"}}>
                      {m[metric]>0?(metric==="transactions"?m[metric]:`${Math.round(m[metric]/1000)}k`||""):""}
                    </div>
                    <div style={{width:"100%",height:h,background:isCur?metricColor[metric]:metricColor[metric]+"66",borderRadius:"3px 3px 0 0",transition:"height .5s"}}/>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:3}}>
              {byMonth.map((m,i)=>(
                <div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:i===now.getMonth()?metricColor[metric]:C.muted,fontWeight:i===now.getMonth()?700:400}}>{m.month}</div>
              ))}
            </div>
          </div>
        )}

        {(chartType==="line"||chartType==="area")&&(
          <div>
            <ChartSVG data={byMonth} metric={metric} color={metricColor[metric]}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              {byMonth.filter((_,i)=>i%3===0||i===11).map((m,i)=>(
                <span key={i} style={{fontSize:9,color:C.muted}}>{m.month}</span>
              ))}
            </div>
          </div>
        )}
      </Card>

      {/* Weekly chart */}
      <Card style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:10}}>📅 Últimas 8 Semanas</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,paddingBottom:4}}>
          {byWeek.map((w,i)=>{
            const maxW=Math.max(...byWeek.map(x=>x[metric]),1);
            const h=Math.max(4,(w[metric]/maxW)*70);
            const isLast=i===byWeek.length-1;
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <div style={{fontSize:8,color:isLast?metricColor[metric]:C.muted}}>{w[metric]>0?(metric==="transactions"?w[metric]:`${Math.round(w[metric])}`):"" }</div>
                <div style={{width:"100%",height:h,background:isLast?metricColor[metric]:metricColor[metric]+"55",borderRadius:"3px 3px 0 0"}}/>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:4}}>
          {byWeek.map((w,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:C.muted}}>{w.label}</div>)}
        </div>
      </Card>

      {/* Top products chart */}
      {topProds.length>0&&(
        <Card style={{marginBottom:14}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>🏆 Top Productos — Ganancia Total</div>
          {topProds.map((p,i)=>{
            const maxPr=topProds[0].profit||1;
            const pct=Math.round((p.profit/maxPr)*100);
            return(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{color:accentColors[i],fontWeight:800,fontSize:13}}>#{i+1}</span>
                    <span style={{color:C.text,fontSize:13,fontWeight:600}}>{p.name}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:C.green,fontWeight:700,fontSize:13}}>Bs. {p.profit.toFixed(0)}</div>
                    <div style={{color:C.muted,fontSize:10}}>{p.qty} uds · Bs. {p.sales.toFixed(0)}</div>
                  </div>
                </div>
                <div style={{height:6,background:C.border,borderRadius:3}}>
                  <div style={{width:`${pct}%`,height:"100%",background:accentColors[i],borderRadius:3,transition:"width .8s"}}/>
                </div>
              </div>
            );
          })}
        </Card>
      )}

      {/* Monthly detail table */}
      <Card>
        <div style={{color:C.accent,fontWeight:700,marginBottom:12}}>📋 Detalle Mensual {now.getFullYear()}</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Mes","Ventas","Ganancia","Trans.","Margen"].map(h=><th key={h} style={{color:C.muted,padding:"6px 8px",textAlign:"right",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>
              {byMonth.map((m,i)=>{
                const margin=m.sales>0?Math.round((m.profit/m.sales)*100):0;
                const isCur=i===now.getMonth();
                return(
                  <tr key={i} style={{background:isCur?C.accent+"11":"",borderBottom:`1px solid ${C.border}22`}}>
                    <td style={{padding:"7px 8px",color:isCur?C.accent:C.text,fontWeight:isCur?700:400}}>{m.month}{isCur?" ✦":""}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",color:C.blue}}>Bs. {m.sales.toLocaleString()}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",color:m.profit>0?C.green:C.muted,fontWeight:700}}>Bs. {m.profit.toLocaleString()}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",color:C.muted}}>{m.transactions}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",color:margin>=30?C.green:margin>=15?C.accent:C.red}}>{margin}%</td>
                  </tr>
                );
              })}
              <tr style={{borderTop:`2px solid ${C.border}`,fontWeight:700}}>
                <td style={{padding:"7px 8px",color:C.accent}}>TOTAL</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:C.blue}}>Bs. {yearS.toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:C.green}}>Bs. {yearP.toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:C.muted}}>{byMonth.reduce((s,m)=>s+m.transactions,0)}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:C.accent}}>{yearS>0?Math.round((yearP/yearS)*100):0}%</td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// ── CLIENTES ──
// ══════════════════════════════════════════
// CLIENTES CON SISTEMA DE PUNTOS
// Bs. 15 gastados = 1 punto = Bs. 1 descuento
// ══════════════════════════════════════════
const POINTS_RATE = 15;   // Bs. 15 = 1 punto
const MIN_REDEEM   = 100; // Mínimo 100 puntos para canjear

function Clients({clients,setClients,role,online}){
  const [showAdd,setShowAdd]=useState(false);
  const [showDetail,setShowDetail]=useState(null);
  const [redeemId,setRedeemId]=useState(null);
  const [redeemQty,setRedeemQty]=useState("100");
  const [search,setSearch]=useState("");
  const [redeemMsg,setRedeemMsg]=useState("");
  const [negocioName]=useLS("inv_negocio_name","Mi Negocio");
  const [negocioPhone]=useLS("inv_negocio_phone","");
  const [form,setForm]=useState({name:"",phone:"",total:"",orders:"",last_order:"",birthday:"",points:0,points_history:[]});
  const f=k=>e=>setForm(v=>({...v,[k]:e.target.value}));

  const now=new Date();
  const todayMMDD=`${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  const isBirthday=c=>{if(!c.birthday)return false;return c.birthday.slice(5)===todayMMDD;};
  const birthdayToday=clients.filter(isBirthday);
  const calcPoints=total=>Math.floor((+total)/POINTS_RATE);

  const add=async()=>{
    if(!form.name.trim())return;
    const pts=calcPoints(form.total);
    const entry={...form,total:+form.total,orders:+form.orders,points:pts,points_used:0,
      points_history:pts>0?[{date:new Date().toISOString().split("T")[0],action:"Registro inicial",pts_earned:pts,balance:pts}]:[]};
    if(online){const{data}=await sb.from("clients").insert([entry]).select().single();if(data)setClients(c=>[...c,data]);}
    else setClients(c=>[...c,{...entry,id:Date.now()}]);
    setForm({name:"",phone:"",total:"",orders:"",last_order:"",birthday:"",points:0,points_history:[]});setShowAdd(false);
  };

  const del=async(id)=>{if(!window.confirm("¿Eliminar?"))return;if(online)await sb.from("clients").delete().eq("id",id);setClients(c=>c.filter(x=>x.id!==id));};

  const addPoints=(id,amount)=>{
    const earned=calcPoints(amount);if(earned<=0)return;
    setClients(cs=>cs.map(c=>{
      if(c.id!==id)return c;
      const nb=(c.points||0)+earned;
      return{...c,total:(+c.total||0)+(+amount),orders:(c.orders||0)+1,last_order:now.toISOString().split("T")[0],points:nb,
        points_history:[...(c.points_history||[]),{date:now.toISOString().split("T")[0],action:`Compra Bs. ${amount}`,pts_earned:earned,balance:nb}]};
    }));
  };

  const redeemPoints=(id)=>{
    const qty=+redeemQty;
    const client=clients.find(c=>c.id===id);if(!client)return;
    if(qty<MIN_REDEEM){setRedeemMsg(`❌ Mínimo ${MIN_REDEEM} puntos para canjear`);return;}
    if(qty>(client.points||0)){setRedeemMsg(`❌ Solo tiene ${client.points||0} puntos`);return;}
    setClients(cs=>cs.map(c=>{
      if(c.id!==id)return c;
      const nb=(c.points||0)-qty;
      return{...c,points:nb,points_used:(c.points_used||0)+qty,
        points_history:[...(c.points_history||[]),{date:now.toISOString().split("T")[0],action:`Canje ${qty} pts = Bs. ${qty} desc.`,pts_earned:-qty,balance:nb}]};
    }));
    setRedeemMsg(`✅ Canjeados ${qty} pts = Bs. ${qty} de descuento`);
    setTimeout(()=>{setRedeemMsg("");setRedeemId(null);setRedeemQty("100");},3000);
  };

  const sendBirthdayWA=(c)=>{
    const msg=`🎂 ¡Feliz Cumpleaños ${c.name}! 🎉\n\n`+
      `De parte de todo el equipo de *${negocioName}* te deseamos un día lleno de alegría. 🎁\n\n`+
      `🎀 Como regalo especial tienes un *15% de descuento* en tu próxima compra hoy. ¡Solo por hoy!\n`+
      ((c.points||0)>=MIN_REDEEM?`⭐ Además tienes *${c.points} puntos* = *Bs. ${c.points} de descuento* disponibles.\n\n`:"")+
      `¡Te esperamos! 😊\n_${negocioName}_${negocioPhone?" · 📞 "+negocioPhone:""}`;
    const phone=(c.phone||"").replace(/\D/g,"");
    window.open((phone?`https://wa.me/${phone}`:"https://wa.me")+"?text="+encodeURIComponent(msg),"_blank");
  };

  const sendPointsWA=(c)=>{
    const canR=(c.points||0)>=MIN_REDEEM;
    const msg=`¡Hola ${c.name}! 👋\n\n`+
      `Tienes *${c.points||0} puntos* acumulados en *${negocioName}* = *Bs. ${c.points||0} de descuento*.\n`+
      (canR?`✅ ¡Ya puedes canjearlos! Mínimo ${MIN_REDEEM} puntos.\n`:`⏳ Te faltan ${MIN_REDEEM-(c.points||0)} pts para canjear.\n`)+
      `\n🛍️ ¡Te esperamos en ${negocioName}!${negocioPhone?"\n📞 "+negocioPhone:""}`;
    const phone=(c.phone||"").replace(/\D/g,"");
    window.open((phone?`https://wa.me/${phone}`:"https://wa.me")+"?text="+encodeURIComponent(msg),"_blank");
  };

  const getLevelInfo=pts=>{
    if(pts>=500)return{name:"💎 Diamante",color:"#06B6D4",next:null,needed:0};
    if(pts>=200)return{name:"🥇 Oro",color:"#F59E0B",next:"Diamante",needed:500-pts};
    if(pts>=50) return{name:"🥈 Plata",color:"#9CA3AF",next:"Oro",needed:200-pts};
    return{name:"🥉 Bronce",color:"#CD7C2F",next:"Plata",needed:50-pts};
  };

  const filtered=[...clients].filter(c=>c.name?.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>(b.points||0)-(a.points||0));
  const totalPoints=clients.reduce((s,c)=>s+(c.points||0),0);
  const totalRedeemed=clients.reduce((s,c)=>s+(c.points_used||0),0);
  const canRedeemCount=clients.filter(c=>(c.points||0)>=MIN_REDEEM).length;

  return(
    <div>
      {/* Birthday alert */}
      {birthdayToday.length>0&&(
        <div style={{background:"#7C3AED22",border:"1px solid #7C3AED66",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:26}}>🎂</span>
          <div style={{flex:1}}>
            <div style={{color:"#7C3AED",fontWeight:700,marginBottom:6}}>¡Cumpleaños hoy! ({birthdayToday.length})</div>
            {birthdayToday.map(c=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{color:C.text,fontSize:13}}>🎉 <b>{c.name}</b> · ⭐{c.points||0} pts</span>
                {c.phone&&<Btn small onClick={()=>sendBirthdayWA(c)} color="#7C3AED">📱 Felicitar WA</Btn>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        {[["👥 Clientes",clients.length,C.blue],["⭐ Puntos activos",totalPoints,C.accent],["🎁 Canjeados",totalRedeemed,C.green],["🔓 Pueden canjear",canRedeemCount,C.purple]].map(([l,v,c])=>(
          <Card key={l} style={{flex:1,minWidth:110}}><div style={{color:C.muted,fontSize:11}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div></Card>
        ))}
      </div>

      {/* Rules */}
      <Card style={{marginBottom:14,background:C.accent+"11",border:`1px solid ${C.accent}44`}}>
        <div style={{color:C.accent,fontWeight:700,marginBottom:6}}>⭐ Sistema de Puntos</div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:13}}>
          <span>💰 Bs. {POINTS_RATE} = <b>1 punto</b></span>
          <span>🎁 1 punto = <b>Bs. 1</b> descuento</span>
          <span>🔒 Mínimo <b>{MIN_REDEEM} pts</b> para canjear</span>
          <span>🎂 Cumpleaños = <b>15% descuento especial</b></span>
        </div>
        <div style={{color:C.muted,fontSize:11,marginTop:4}}>💡 El cliente puede acumular más de {MIN_REDEEM} puntos para obtener mayor descuento antes de canjear.</div>
      </Card>

      {/* Search + Add */}
      <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}>
        <input placeholder="🔍 Buscar cliente..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{flex:1,background:C.hi,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",color:C.text,fontSize:14}}/>
        {role==="owner"&&<Btn small onClick={()=>setShowAdd(s=>!s)}>+ Cliente</Btn>}
      </div>

      {/* Add form */}
      {showAdd&&(
        <Card style={{marginBottom:14,background:C.hi}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:14,fontSize:15}}>➕ Nuevo Cliente</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {/* Columna izquierda */}
            <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
              <Inp label="👤 Nombre completo *" value={form.name} onChange={f("name")} placeholder="ej: Juan Mamani"/>
              <div>
                <div style={{color:C.muted,fontSize:11,marginBottom:4}}>📞 Número de Celular</div>
                <div style={{display:"flex",gap:6}}>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.muted,fontSize:13,flexShrink:0}}>+591</div>
                  <input value={(form.phone||"").replace("+591","")} onChange={e=>setForm(v=>({...v,phone:"+591"+e.target.value.replace(/\D/g,"").slice(0,8)}))}
                    placeholder="77712345" maxLength={8}
                    style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13}}/>
                </div>
                <div style={{color:C.muted,fontSize:10,marginTop:3}}>Para enviar mensajes por WhatsApp</div>
              </div>
              <div>
                <div style={{color:C.muted,fontSize:11,marginBottom:4}}>🎂 Fecha de Nacimiento</div>
                <input type="date" value={form.birthday} onChange={f("birthday")}
                  style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,boxSizing:"border-box"}}/>
                <div style={{color:C.muted,fontSize:10,marginTop:3}}>Para enviar descuento especial de cumpleaños</div>
              </div>
            </div>
            {/* Columna derecha */}
            <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
              <Inp label="💰 Total Bs. comprado (historial)" value={form.total} onChange={f("total")} type="number"/>
              <Inp label="🛒 Órdenes anteriores" value={form.orders} onChange={f("orders")} type="number"/>
              <Inp label="📅 Última compra" value={form.last_order} onChange={f("last_order")} type="date"/>
              {form.total&&(
                <div style={{background:C.accent+"11",border:`1px solid ${C.accent}33`,borderRadius:10,padding:"10px 12px"}}>
                  <div style={{color:C.accent,fontSize:13,fontWeight:700}}>
                    ⭐ Recibirá {calcPoints(form.total)} puntos iniciales
                  </div>
                  <div style={{color:C.muted,fontSize:11,marginTop:3}}>
                    {calcPoints(form.total)>=MIN_REDEEM?"✅ Ya puede canjear desde el inicio":`Necesita ${MIN_REDEEM-calcPoints(form.total)} pts más para canjear`}
                  </div>
                  <div style={{color:C.muted,fontSize:11,marginTop:2}}>
                    = Bs. {calcPoints(form.total)} de descuento disponible
                  </div>
                </div>
              )}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            <Btn onClick={add} color={C.green}>💾 Guardar Cliente</Btn>
            <Btn onClick={()=>setShowAdd(false)} outline color={C.muted}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {/* Client cards */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map((c,i)=>{
          const level=getLevelInfo(c.points||0);
          const pct=Math.min(100,Math.round(((c.points||0)/500)*100));
          const isDetail=showDetail===c.id;
          const birthday=isBirthday(c);
          const canRedeem=(c.points||0)>=MIN_REDEEM;
          return(
            <Card key={c.id} style={{border:`1px solid ${birthday?"#7C3AED":canRedeem?C.green:level.color}33`}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:level.color+"33",display:"flex",alignItems:"center",justifyContent:"center",color:level.color,fontWeight:800,fontSize:12,flexShrink:0}}>#{i+1}</div>
                <div style={{flex:1,minWidth:150}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                    <span style={{fontWeight:700,fontSize:14}}>{c.name}</span>
                    {birthday&&<Badge color="#7C3AED">🎂 ¡Hoy!</Badge>}
                    <Badge color={level.color}>{level.name}</Badge>
                    {canRedeem&&<Badge color={C.green}>🔓 Puede canjear</Badge>}
                  </div>
                  <div style={{color:C.muted,fontSize:11}}>{c.orders||0} compras · {c.last_order||"—"}{c.phone&&` · 📞 ${c.phone}`}</div>
                  {c.birthday&&<div style={{color:"#7C3AED",fontSize:11,marginTop:1}}>🎂 {new Date(c.birthday+"T12:00").toLocaleDateString("es-ES",{day:"numeric",month:"long"})}</div>}
                  {/* Points bar */}
                  <div style={{marginTop:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={{color:canRedeem?C.green:level.color,fontWeight:700,fontSize:12}}>
                        ⭐ {c.points||0} pts {canRedeem?`= Bs. ${c.points} disponible`:`(faltan ${MIN_REDEEM-(c.points||0)} para canjear)`}
                      </span>
                    </div>
                    <div style={{height:6,background:C.border,borderRadius:3,position:"relative"}}>
                      <div style={{width:`${pct}%`,height:"100%",background:canRedeem?C.green:level.color,borderRadius:3}}/>
                      <div style={{position:"absolute",top:-2,left:`${(MIN_REDEEM/500)*100}%`,width:2,height:10,background:C.green,borderRadius:1}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:1,fontSize:9,color:C.muted}}>
                      <span>0</span><span style={{color:C.green}}>🔓{MIN_REDEEM}</span><span>500💎</span>
                    </div>
                  </div>
                </div>
                <div style={{textAlign:"right",minWidth:75}}>
                  <div style={{color:C.green,fontWeight:800,fontSize:14}}>Bs. {(+c.total||0).toLocaleString()}</div>
                  <div style={{color:C.muted,fontSize:10}}>total gastado</div>
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  <Btn small onClick={()=>setShowDetail(isDetail?null:c.id)} color={C.blue} outline>📋</Btn>
                  {role==="owner"&&<Btn small onClick={()=>setRedeemId(redeemId===c.id?null:c.id)} color={canRedeem?C.green:C.muted} outline={!canRedeem}>🎁</Btn>}
                  {c.phone&&<Btn small onClick={()=>birthday?sendBirthdayWA(c):sendPointsWA(c)} color={birthday?"#7C3AED":C.green} outline>{birthday?"🎂":"📱"}</Btn>}
                  {role==="owner"&&<Btn small onClick={()=>del(c.id)} color={C.red} outline>🗑️</Btn>}
                </div>
              </div>

              {/* Redeem panel */}
              {redeemId===c.id&&(
                <div style={{marginTop:12,background:canRedeem?C.green+"11":C.orange+"11",borderRadius:10,padding:14,border:`1px solid ${canRedeem?C.green:C.orange}44`}}>
                  {canRedeem?(
                    <div>
                      <div style={{color:C.green,fontWeight:700,marginBottom:8}}>🎁 Canjear Puntos — {c.name}</div>
                      <div style={{color:C.muted,fontSize:13,marginBottom:10}}>
                        Disponibles: <b style={{color:C.green}}>{c.points} pts = Bs. {c.points}</b><br/>
                        <span style={{fontSize:11}}>Puedes canjear {MIN_REDEEM}+ pts o guardar más para mayor descuento</span>
                      </div>
                      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
                        <div style={{flex:1,minWidth:120}}>
                          <div style={{color:C.muted,fontSize:11,marginBottom:4}}>Puntos a canjear (mín. {MIN_REDEEM})</div>
                          <input type="number" value={redeemQty} onChange={e=>setRedeemQty(e.target.value)} min={MIN_REDEEM} max={c.points}
                            style={{width:"100%",background:C.card,border:`2px solid ${C.green}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:15,fontWeight:700,boxSizing:"border-box"}}/>
                        </div>
                        <div style={{flex:1,background:C.card,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                          <div style={{color:C.muted,fontSize:11}}>Descuento</div>
                          <div style={{color:C.green,fontWeight:900,fontSize:24}}>Bs. {+redeemQty||0}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                        {[100,200,300,500].filter(n=>n<=(c.points||0)).map(n=>(
                          <button key={n} onClick={()=>setRedeemQty(String(n))} style={{background:+redeemQty===n?C.green:C.hi,color:+redeemQty===n?"#fff":C.muted,border:`1px solid ${+redeemQty===n?C.green:C.border}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:+redeemQty===n?700:400}}>
                            {n}pts=Bs.{n}
                          </button>
                        ))}
                        <button onClick={()=>setRedeemQty(String(c.points))} style={{background:C.hi,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12}}>Todo({c.points})</button>
                      </div>
                      {redeemMsg&&<div style={{color:redeemMsg.startsWith("✅")?C.green:C.red,fontWeight:600,fontSize:13,marginBottom:8}}>{redeemMsg}</div>}
                      <div style={{display:"flex",gap:8}}>
                        <Btn small onClick={()=>redeemPoints(c.id)} color={C.green}>✅ Confirmar Canje</Btn>
                        <Btn small onClick={()=>{setRedeemId(null);setRedeemQty("100");setRedeemMsg("");}} outline color={C.muted}>Cancelar</Btn>
                      </div>
                    </div>
                  ):(
                    <div>
                      <div style={{color:C.orange,fontWeight:700,marginBottom:4}}>⏳ Aún no puede canjear</div>
                      <div style={{color:C.muted,fontSize:13}}>Tiene {c.points||0} puntos — necesita {MIN_REDEEM-(c.points||0)} más para llegar al mínimo de {MIN_REDEEM}.</div>
                      <div style={{color:C.muted,fontSize:12,marginTop:4}}>Cada Bs. {POINTS_RATE} que compre le da 1 punto más. Puede guardar cuantos quiera antes de canjear.</div>
                    </div>
                  )}
                </div>
              )}

              {/* Detail panel */}
              {isDetail&&(
                <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                  <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:160}}>
                      <div style={{color:C.muted,fontSize:11,marginBottom:4}}>➕ Registrar compra manual</div>
                      <div style={{display:"flex",gap:6}}>
                        <input type="number" placeholder="Monto Bs." id={`pur_${c.id}`}
                          style={{flex:1,background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:13}}/>
                        <Btn small onClick={()=>{const el=document.getElementById(`pur_${c.id}`);const v=+el.value;if(v>0){addPoints(c.id,v);el.value="";}}} color={C.green}>+Pts</Btn>
                      </div>
                    </div>
                    {c.phone&&<Btn small onClick={()=>sendPointsWA(c)} color={C.green} outline>📱 Recordar puntos</Btn>}
                    {c.phone&&birthday&&<Btn small onClick={()=>sendBirthdayWA(c)} color="#7C3AED">🎂 Felicitar</Btn>}
                  </div>
                  <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>📋 Historial ({(c.points_history||[]).length})</div>
                  <div style={{maxHeight:150,overflowY:"auto"}}>
                    {(c.points_history||[]).slice().reverse().map((h,j)=>(
                      <div key={j} style={{display:"flex",gap:8,padding:"4px 6px",background:j%2===0?C.hi:"transparent",borderRadius:6,fontSize:11,alignItems:"center"}}>
                        <span style={{color:C.muted,minWidth:78}}>{h.date}</span>
                        <span style={{color:C.text,flex:1}}>{h.action}</span>
                        <span style={{color:h.pts_earned>=0?C.green:C.red,fontWeight:700,minWidth:50,textAlign:"right"}}>{h.pts_earned>=0?"+":""}{h.pts_earned}</span>
                        <span style={{color:C.accent,minWidth:60,textAlign:"right"}}>{h.balance} total</span>
                      </div>
                    ))}
                    {!(c.points_history||[]).length&&<div style={{color:C.muted,fontSize:12}}>Sin historial.</div>}
                  </div>
                </div>
              )}
            </Card>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:40}}>Sin clientes. ¡Agrega el primero!</div>}
      </div>
    </div>
  );
}
